name: Daily QT Backup (Worker 실패 대비)

# Cloudflare Worker가 KST 05:00 에 자동 생성에 실패했을 경우를 대비한 백업입니다.
# Worker가 이미 오늘 파일을 생성했으면 즉시 종료하고, 없으면 기존 Python 스크립트로 재시도합니다.

on:
  schedule:
    # KST 06:00 = UTC 21:00 (전날) — Worker(KST 05:00)보다 1시간 늦게 가드 통과 시에만 실행
    - cron: '0 21 * * *'
  workflow_dispatch:   # 수동 실행 버튼

concurrency:
  group: daily-qt-backup
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"
      TZ: Asia/Seoul
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip if Worker already wrote today's file
        id: check
        run: |
          DATE=$(TZ=Asia/Seoul date '+%Y-%m-%d')
          echo "today_kst=${DATE}" >> $GITHUB_OUTPUT
          if [ -f "data/qt/${DATE}.json" ] && [ -f "data/ai/${DATE}.json" ]; then
            echo "✅ Worker가 이미 ${DATE} 파일을 생성함 — 백업 건너뜀"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️  ${DATE} 파일 없음 — 백업 파이프라인 실행"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml openai python-dotenv

      - name: Fetch QT (오륜교회 주만나 크롤링)
        if: steps.check.outputs.skip != 'true'
        run: python scripts/fetch_qt.py

      - name: Generate AI meditation
        if: steps.check.outputs.skip != 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "::warning::OPENAI_API_KEY 미설정 → mock 모드로 실행 (샘플 묵상)"
            python scripts/generate_ai.py --mock
          else
            echo "실제 OpenAI API 호출로 묵상 생성"
            python scripts/generate_ai.py
          fi

      - name: Commit and push changes
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "QT Bot Backup (yeseong000)"
          git config user.email "271984505+yeseong000@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "변경 사항 없음 — 커밋 건너뜀"
          else
            DATE=$(date '+%Y-%m-%d')
            git commit -m "chore(data): 백업 자동 크롤링 · ${DATE} QT + AI 묵상"
            git push
            echo "✅ ${DATE} 백업 데이터 커밋 & 푸시 완료"
          fi
