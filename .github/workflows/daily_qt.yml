name: Daily QT (주만나 자동 크롤링 + AI 묵상 생성)

on:
  schedule:
    # 매일 새벽 5시 KST = UTC 20:00 (전날)
    - cron: '0 20 * * *'
  workflow_dispatch:   # GitHub Actions 탭에서 수동 실행 버튼

concurrency:
  group: daily-qt
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write    # 커밋/푸시 권한
    env:
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"
      TZ: Asia/Seoul
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml openai python-dotenv

      - name: Fetch QT (오륜교회 주만나 크롤링)
        run: python scripts/fetch_qt.py

      - name: Generate AI meditation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "::warning::OPENAI_API_KEY 미설정 → mock 모드로 실행 (샘플 묵상)"
            python scripts/generate_ai.py --mock
          else
            echo "실제 OpenAI API 호출로 묵상 생성"
            python scripts/generate_ai.py
          fi

      - name: Commit and push changes
        run: |
          git config user.name "QT Bot (yeseong000)"
          git config user.email "271984505+yeseong000@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "변경 사항 없음 — 커밋 건너뜀"
          else
            DATE=$(date '+%Y-%m-%d')
            git commit -m "chore(data): 자동 크롤링 · ${DATE} QT + AI 묵상"
            git push
            echo "✅ ${DATE} 데이터 커밋 & 푸시 완료"
          fi

      - name: Discord 성공 알림
        if: success()
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          [ -z "${DISCORD_WEBHOOK_URL}" ] && exit 0
          DATE=$(TZ=Asia/Seoul date '+%Y-%m-%d')
          TITLE=$(python -c "import json;d=json.load(open('data/qt/${DATE}.json',encoding='utf-8'));print(d.get('title','알 수 없음'))" 2>/dev/null || echo "알 수 없음")
          REF=$(python -c "import json;d=json.load(open('data/qt/${DATE}.json',encoding='utf-8'));print(d.get('scripture_ref',''))" 2>/dev/null || echo "")
          export DATE TITLE REF
          python -c "import json,os,urllib.request as u;url=os.environ['DISCORD_WEBHOOK_URL'].lstrip('﻿').strip();msg='✅ **'+os.environ['DATE']+'** · '+os.environ['TITLE']+' ('+os.environ['REF']+') 묵상 생성 완료';data=json.dumps({'content':msg}).encode('utf-8');u.urlopen(u.Request(url,data=data,headers={'Content-Type':'application/json','User-Agent':'Mozilla/5.0 (compatible; QTBot/1.0)'},method='POST'));print('Discord 전송:',msg)"

      - name: Discord 실패 알림
        if: failure()
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          [ -z "${DISCORD_WEBHOOK_URL}" ] && exit 0
          DATE=$(TZ=Asia/Seoul date '+%Y-%m-%d') && export DATE
          python -c "import json,os,urllib.request as u;url=os.environ['DISCORD_WEBHOOK_URL'].lstrip('﻿').strip();d=os.environ['DATE'];msg='❌ **주만나 QT 자동 생성 실패** ('+d+')\nGitHub Actions 로그를 확인하세요.';data=json.dumps({'content':msg}).encode('utf-8');u.urlopen(u.Request(url,data=data,headers={'Content-Type':'application/json','User-Agent':'Mozilla/5.0 (compatible; QTBot/1.0)'},method='POST'))"
