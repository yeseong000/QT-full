name = "jumanna-qt-daily"
main = "src/index.js"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

# Smart Placement: Cloudflare가 GitHub API 서버와 가까운 데이터센터에서 실행
[placement]
mode = "smart"

# UTC 19:00 = KST 04:00 (다음 날)
[triggers]
crons = ["0 19 * * *"]

# 시크릿은 코드/파일에 적지 않습니다.
# 배포 전 다음 명령으로 등록하세요:
#
#   wrangler secret put GITHUB_TOKEN       # Actions R/W 권한 포함 PAT
#   wrangler secret put GITHUB_REPO        # 예: "yeseong000/QT-full"
#   wrangler secret put DISCORD_WEBHOOK_URL  # (선택) 실패 알림
