<!DOCTYPE html>
<html lang="ko" data-font-size="md">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1">
  <meta name="theme-color" content="#F0F4F2">

  <!-- PWA (Android/Chrome) -->
  <link rel="manifest" href="manifest.json">

  <!-- iOS PWA (홈 화면에 추가 시 앱처럼 동작) -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="함께 만나">
  <meta name="format-detection" content="telephone=no">
  <link rel="apple-touch-icon" href="images/Icon.png">
  <link rel="icon" type="image/png" href="images/Icon.png">

  <title>함께 만나</title>

  <!-- 카카오톡 / SNS 공유 미리보기 -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="주만나">
  <meta property="og:description" content="오늘의 말씀과 묵상을 함께해요">
  <meta property="og:url" content="https://hainaqt.vercel.app">
  <meta property="og:image" content="https://hainaqt.vercel.app/src/images/og-image-v2.jpg">
  <meta property="og:image:type" content="image/jpeg">
  <meta property="og:image:width" content="1210">
  <meta property="og:image:height" content="634">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="styles/design-tokens.css">
  <link rel="stylesheet" href="styles/common.css">

  <!-- 레이아웃 모드 토글 (CSSOM 적용 전 실행되어야 첫 페인트부터 정확) -->
  <script>
    // 레이아웃 모드: URL ?mode=adaptive|letterbox 또는 localStorage 저장값, 기본 adaptive
    (function () {
      try {
        var params = new URLSearchParams(location.search);
        var stored = localStorage.getItem('layoutMode');
        var mode = params.get('mode') || stored || 'adaptive';
        if (mode !== 'adaptive' && mode !== 'letterbox') mode = 'adaptive';
        document.documentElement.setAttribute('data-layout-mode', mode);
        localStorage.setItem('layoutMode', mode);
      } catch (e) { /* SSR/private mode 등 */ }
    })();
  </script>

  <style>
    /* ========== 홈 전용 스타일 ========== */

    /* 시간대별 배경 (3-layer):
       - layer 2 (PNG): center -130px → 화면 위로 약 15% 시프트
       - layer 3 (fallback gradient): PNG 없는 영역 채움
       - layer 1 (단순 2-stop linear 페이드): 위쪽 45%는 완전 투명(PNG 그대로),
         45%~100% 55% 폭에서 매끈하게 색상 alpha 0 → 1로 보간
         (multi-stop의 alpha 점프로 인한 끊김 제거) */
    /* 4-layer 배경 (위→아래 순):
       - layer 0 (NEW): PNG 위쪽 80px 영역에 SKY 색으로 fade-out 깔아 PNG 첫 픽셀과
         status bar(SKY 단색) 사이 미세 색차를 매끄럽게 흡수.
         디바이스 viewport 비율이 PNG와 달라 cover 시 다른 픽셀이 보여도 항상 자연스러움.
       - layer 1 : 하단 GROUND 페이드 (45%~100% 구간 alpha 0→1)
       - layer 2 : PNG 일러스트 (cover, -130px 시프트)
       - layer 3 : PNG 미로드 시 fallback 그라디언트 (SKY → mid → GROUND)
       fallback 그라디언트 시작색은 PNG 화면 상단 실제 픽셀색과 동일 매핑. */
    /* layer 0 (PNG 위쪽 fade): alpha를 1이 아닌 0.55로 깔아 PNG 채도가 비치도록.
       이전 alpha 1은 PNG 위쪽 60px가 SKY 단색에 거의 가려져 "탁한/답답한" 느낌 발생. */
    .app-container[data-time-slot="dawn"] {
      background-color: #E5D0C0;
      background-image:
        linear-gradient(180deg, rgba(124, 116, 162, 0.55) 0%, rgba(124, 116, 162, 0) 100%),
        linear-gradient(to bottom, rgba(229, 208, 192, 0) 45%, rgba(229, 208, 192, 1) 100%),
        url('images/%EA%B1%B0%EB%A3%A9%ED%95%9C%20%EC%83%88%EB%B2%BD%20%EB%AA%A8%EB%B0%94%EC%9D%BC%20.png'),
        linear-gradient(180deg, #7C74A2 0%, #B8A0BC 50%, #E5D0C0 100%);
      background-size: 100% 60px, 100% 100%, cover, 100% 100%;
      background-position: top, center, center -130px, center;
      background-repeat: no-repeat;
    }
    .app-container[data-time-slot="morning"] {
      background-color: #EFE6CD;
      background-image:
        linear-gradient(180deg, rgba(241, 216, 203, 0.55) 0%, rgba(241, 216, 203, 0) 100%),
        linear-gradient(to bottom, rgba(239, 230, 205, 0) 45%, rgba(239, 230, 205, 1) 100%),
        url('images/%EC%9D%80%ED%98%9C%EB%A1%9C%EC%9A%B4%20%EC%95%84%EC%B9%A8%20%EB%AA%A8%EB%B0%94%EC%9D%BC%20.png'),
        linear-gradient(180deg, #F1D8CB 0%, #F5DECC 50%, #EFE6CD 100%);
      background-size: 100% 60px, 100% 100%, cover, 100% 100%;
      background-position: top, center, center -130px, center;
      background-repeat: no-repeat;
    }
    .app-container[data-time-slot="afternoon"] {
      background-color: #ECE3D2;
      background-image:
        linear-gradient(180deg, rgba(230, 233, 237, 0.55) 0%, rgba(230, 233, 237, 0) 100%),
        linear-gradient(to bottom, rgba(236, 227, 210, 0) 45%, rgba(236, 227, 210, 1) 100%),
        url('images/%ED%8F%89%EC%95%88%ED%95%9C%20%EC%98%A4%ED%9B%84%20%EB%AA%A8%EB%B0%94%EC%9D%BC.png'),
        linear-gradient(180deg, #E6E9ED 0%, #E0E2D8 50%, #ECE3D2 100%);
      background-size: 100% 60px, 100% 100%, cover, 100% 100%;
      background-position: top, center, center -130px, center;
      background-repeat: no-repeat;
    }
    .app-container[data-time-slot="evening"] {
      background-color: #F5C672;
      background-image:
        linear-gradient(180deg, rgba(222, 173, 152, 0.55) 0%, rgba(222, 173, 152, 0) 100%),
        linear-gradient(to bottom, rgba(245, 198, 114, 0) 45%, rgba(245, 198, 114, 1) 100%),
        url('images/%EC%98%A8%EC%9C%A0%ED%95%9C%20%EC%A0%80%EB%85%81%20%EB%AA%A8%EB%B0%94%EC%9D%BC.png'),
        linear-gradient(180deg, #DEAD98 0%, #DFA982 60%, #F5C672 100%);
      background-size: 100% 60px, 100% 100%, cover, 100% 100%;
      background-position: top, center, center -130px, center;
      background-repeat: no-repeat;
    }
    .app-container[data-time-slot="night"] {
      background-color: #2A3A5C;
      background-image:
        linear-gradient(180deg, rgba(8, 34, 82, 0.55) 0%, rgba(8, 34, 82, 0) 100%),
        linear-gradient(to bottom, rgba(42, 58, 92, 0) 45%, rgba(42, 58, 92, 1) 100%),
        url('images/%EA%B3%A0%EC%9A%94%ED%95%9C%20%EB%B0%A4%20%EB%AA%A8%EB%B0%94%EC%9D%BC%20.png'),
        linear-gradient(180deg, #082252 0%, #1B2A4A 50%, #2A3A5C 100%);
      background-size: 100% 60px, 100% 100%, cover, 100% 100%;
      background-position: top, center, center -130px, center;
      background-repeat: no-repeat;
    }

    /* 콘텐츠는 PNG 배경 위에 layered + flex column으로 카드를 하단 안전 영역에 자동 정렬 */
    .app-scroll {
      position: relative;
      z-index: 1;
      background: transparent;
      display: flex;
      flex-direction: column;
    }

    /* ---------- 홈 헤더 ---------- */
    .home-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      margin-top: 0;
      margin-bottom: var(--space-4);
      min-height: 44px;
    }

    /* date pill (날짜 + N회 완료 알약, 항상 표시)
       사용자 피드백 — 모바일/iPad/PC 전반적으로 키움 */
    .date-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 16px;
      min-height: 40px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 999px;
      font-size: 14px;
      font-weight: 500;
      color: #2D3A32;
      border: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform var(--duration-fast);
      letter-spacing: -0.01em;
      font-family: inherit;
      white-space: nowrap;
    }
    .date-pill:active { transform: scale(0.96); }
    .date-pill__sep { opacity: 0.5; }
    .date-pill__count { font-weight: 600; }
    /* spacer: date-pill과 우측 아이콘 그룹(qr + settings) 사이 공간을 항상 차지 */
    .home-header__spacer { flex: 1; }

    /* iPad — date pill 한 단계 크게 + 헤더 아이콘 버튼도 같이 키움 */
    @media (min-width: 768px) {
      .date-pill {
        gap: 9px;
        padding: 11px 20px;
        min-height: 48px;
        font-size: 16px;
      }
      .home-header .icon-btn {
        width: 56px;
        height: 56px;
      }
      .home-header { min-height: 56px; }
    }

    /* PC — 더 크게 */
    @media (min-width: 1024px) {
      .date-pill {
        gap: 10px;
        padding: 14px 24px;
        min-height: 56px;
        font-size: 18px;
      }
      .home-header .icon-btn {
        width: 64px;
        height: 64px;
      }
      .home-header { min-height: 64px; }
    }

    /* 어두운 시간대(dawn/evening/night): 다크 pill */
    .app-container[data-time-slot="dawn"]   .date-pill,
    .app-container[data-time-slot="evening"] .date-pill,
    .app-container[data-time-slot="night"]   .date-pill {
      background: rgba(0, 0, 0, 0.28);
      color: #FFFFFF;
    }

    /* 설정 버튼 (홈 전용: 투명, 어두운 시간대엔 흰색 톤) */
    .home-header .icon-btn {
      background: transparent;
      color: var(--text-secondary);
    }
    .app-container[data-time-slot="dawn"]   .home-header .icon-btn,
    .app-container[data-time-slot="evening"] .home-header .icon-btn,
    .app-container[data-time-slot="night"]   .home-header .icon-btn {
      color: rgba(255, 255, 255, 0.92);
    }
    .home-header .icon-btn:hover,
    .home-header .icon-btn:active {
      background: rgba(255, 255, 255, 0.18);
      color: var(--text-primary);
    }
    .app-container[data-time-slot="dawn"]   .home-header .icon-btn:active,
    .app-container[data-time-slot="evening"] .home-header .icon-btn:active,
    .app-container[data-time-slot="night"]   .home-header .icon-btn:active {
      background: rgba(255, 255, 255, 0.22);
      color: #FFFFFF;
    }

    /* ---------- 인사말 (이모지/호칭 제거) ---------- */
    .greeting-section {
      margin-top: var(--space-2);
      margin-bottom: var(--space-4);
    }
    .greeting-text {
      font-size: var(--text-hero);
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.025em;
      line-height: 1.25;
      margin-bottom: var(--space-1);
    }
    /* 어두운 시간대: 흰색 톤 + 부드러운 그림자 */
    .app-container[data-time-slot="dawn"]   .greeting-text,
    .app-container[data-time-slot="evening"] .greeting-text,
    .app-container[data-time-slot="night"]   .greeting-text {
      color: #FFFFFF;
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.18);
    }

    /* ---------- 오늘의 말씀 카드 ---------- */
    .today-card {
      position: relative;
      background: var(--bg-card);
      border-radius: 22px;
      box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.04);
      padding: 22px;
      /* margin-top: auto → flex column에 의해 카드가 하단 영역으로 자동 푸시됨.
         일러스트가 카드 위 영역 가득히 보임. */
      margin-top: auto;
      margin-bottom: 24px;
      /* 좌측 정렬 (meta/title/ref). CTA는 별도로 width 100% + 텍스트 중앙 */
      text-align: left;
      transition: transform var(--duration-base);
    }
    .today-card:active { transform: scale(0.99); }

    /* 메타필 (⏱ 약 3분 소요) */
    .today-meta {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 12px;
      letter-spacing: -0.01em;
    }
    /* verse 텍스트 — 2줄 보장 (formatVerse + line-clamp fallback) */
    .today-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      line-height: 1.4;
      margin-bottom: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
      word-break: keep-all;
    }
    .today-ref {
      font-size: var(--text-body);
      color: var(--text-secondary);
      line-height: 1.4;
      margin-bottom: 16px;
    }

    /* CTA 버튼 (시간대별 색상으로 자동 변경) */
    .today-cta {
      width: 100%;
      letter-spacing: 0.01em;
      font-size: 16px;
      padding: 14px 32px;
      text-align: center;
      transition: transform var(--duration-fast), background var(--duration-base);
    }
    /* 시간대별 CTA — 라이트 3종(아침·오후·저녁) 핑크-로즈 패밀리,
       다크 2종(새벽·밤) 네이비 — step 페이지의 "다음" 버튼(--accent-sage)과 동일한 밝기로 통일 */
    .app-container[data-time-slot="dawn"]      .today-cta { background: #6E84A8; }
    .app-container[data-time-slot="morning"]   .today-cta { background: #C77E8E; }
    .app-container[data-time-slot="afternoon"] .today-cta { background: #BC7383; }
    .app-container[data-time-slot="evening"]   .today-cta { background: #B5677A; }
    .app-container[data-time-slot="night"]     .today-cta { background: #6E84A8; }
    .app-container[data-time-slot="dawn"]      .today-cta:hover { background: #5A7596; }
    .app-container[data-time-slot="morning"]   .today-cta:hover { background: #A85A6E; }
    .app-container[data-time-slot="afternoon"] .today-cta:hover { background: #9C5A6C; }
    .app-container[data-time-slot="evening"]   .today-cta:hover { background: #9A4F62; }
    .app-container[data-time-slot="night"]     .today-cta:hover { background: #5A7596; }

    /* ---------- 로딩/에러 ---------- */
    .loading, .error {
      text-align: center;
      padding: var(--space-8) var(--space-4);
      color: var(--text-secondary);
    }
    .error { color: #C0392B; }

    /* ========== 설정 모달 ========== */

    /* 헤더: 제목 + 해시 배지 한 줄 */
    .modal-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      margin-bottom: var(--space-2);
    }
    .modal-top .modal-title { margin-bottom: 0; }
    .modal-desc { margin-bottom: var(--space-4); }

    /* 해시 배지 */
    .user-hash-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--bg-soft);
      border: 1px solid var(--border-subtle);
      border-radius: 20px;
      padding: 5px 8px 5px 12px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      flex-shrink: 0;
      letter-spacing: 0.02em;
      font-variant-numeric: tabular-nums;
    }
    .hash-copy-btn {
      background: none;
      border: none;
      padding: 2px;
      cursor: pointer;
      color: var(--accent-sage);
      display: flex;
      align-items: center;
      border-radius: 4px;
      line-height: 1;
      transition: opacity 0.15s;
    }
    .hash-copy-btn:active { opacity: 0.5; }

    /* 설정 항목 공통 */
    .setting-item {
      margin-bottom: var(--space-3);
    }
    .setting-label {
      font-size: var(--text-body);
      color: var(--text-primary);
      margin-bottom: var(--space-2);
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    /* 폰트 — 가로 row + iOS 스타일 세그먼트 */
    .setting-font .font-row {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-top: 6px;
    }
    .font-row__label {
      width: 36px;
      flex-shrink: 0;
      font-size: var(--text-small);
      color: var(--text-secondary);
      font-weight: 500;
      letter-spacing: -0.01em;
    }
    .font-seg {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      padding: 3px;
      background: var(--bg-soft);
      border-radius: var(--radius-md);
    }
    .font-seg__btn {
      appearance: none;
      border: none;
      background: transparent;
      padding: 8px 6px;
      border-radius: calc(var(--radius-md) - 4px);
      font-size: var(--text-small);
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: background var(--duration-base), color var(--duration-base),
                  box-shadow var(--duration-base);
      -webkit-tap-highlight-color: transparent;
      letter-spacing: -0.01em;
    }
    .font-seg__btn:active { transform: scale(0.97); }
    .font-seg__btn.is-selected {
      background: var(--bg-card);
      color: var(--text-primary);
      font-weight: 600;
      box-shadow: var(--shadow-soft);
    }
    /* 다크 모드 — 토글 활성 상태 구분감 강화 (트랙 #252930 위에 명확한 lift) */
    html[data-theme="dark"] .font-seg__btn.is-selected {
      background: #353D4D;
      color: #FFFFFF;
      box-shadow: inset 0 0 0 1px rgba(110, 132, 168, 0.35);
    }


    /* 다른 기기 불러오기 아코디언 */
    .restore-accordion__trigger {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      gap: var(--space-2);
      min-height: 36px;
    }
    .restore-accordion__trigger .setting-label { margin-bottom: 0; }
    .restore-accordion__chevron {
      transition: transform var(--duration-base) var(--ease-out);
      color: var(--text-secondary);
      flex-shrink: 0;
    }
    .restore-accordion.is-open .restore-accordion__chevron {
      transform: rotate(180deg);
    }
    .restore-accordion__body {
      max-height: 0;
      overflow: hidden;
      transition: max-height var(--duration-slow) var(--ease-out),
                  opacity var(--duration-base) var(--ease-out);
      opacity: 0;
    }
    .restore-accordion.is-open .restore-accordion__body {
      max-height: 380px;
      opacity: 1;
    }
    .restore-accordion__desc {
      font-size: var(--text-small);
      color: var(--text-secondary);
      margin: var(--space-3) 0;
      line-height: 1.6;
    }

    /* 아코디언 내부 — 입력 필드 옆에 자연스럽게 붙는 ghost 텍스트 버튼 */
    .btn-link {
      appearance: none;
      background: transparent;
      border: none;
      padding: var(--space-3) var(--space-2);
      color: var(--accent-sage-text);
      font-size: var(--text-small);
      font-weight: 600;
      letter-spacing: -0.01em;
      cursor: pointer;
      white-space: nowrap;
      border-radius: var(--radius-sm);
      transition: background var(--duration-base), transform var(--duration-fast) var(--ease-out);
      -webkit-tap-highlight-color: transparent;
    }
    .btn-link:active { background: var(--accent-sage-soft); transform: scale(0.97); }
    .btn-link:disabled { opacity: 0.5; cursor: default; }

    .restore-row { display: flex; gap: var(--space-3); align-items: center; }
    .restore-row .input-field { flex: 1; min-width: 0; }

    /* 세리프 폰트: 큰 제목 오버플로 방지 */

    /* ==========================================================================
       모바일 레이아웃 모드 (URL ?mode=adaptive|letterbox)
       두 방식을 비교한 뒤 채택할 한쪽만 남기고 정리 예정
       ========================================================================== */

    /* ---------- 접근 A: 풀스크린 적응형 (기본) ----------
       - 컨테이너 height는 common.css의 100dvh 그대로 사용 (동적 viewport 자동 추적)
       - 카드는 PC와 동일하게 margin-top: auto로 하단 자동 정렬
       - PWA standalone 시스템 영역(Dynamic Island 위/홈바 아래/overscroll bounce)
         흰 띠 제거: html은 ground 단색, body는 sky→ground 그라디언트, theme-color는
         JS에서 sky 색으로 동적 변경(meta tag) — 3중 매핑 */
    @media (max-width: 480px) {
      /* 상하단 분리 (사용자 의도):
         - 상단(다이내믹 아일랜드/status bar) = SKY
         - 하단(홈바/overscroll bounce) = GROUND
         - 중앙은 PNG로 가려져 보이지 않으므로 그라디언트의 hard-ish split을 중앙에 배치
         iOS Safari 색 추출 메커니즘이 일정하지 않으므로 양쪽 모두 대응:
         - html background-color = SKY  (status bar 추출 라인)
         - body background-color = GROUND (overscroll bounce 라인)
         - 양쪽 background-image는 위 30% SKY → 70%부터 GROUND 단색 (가운데 부드러운 전환)
         - body에 overscroll-behavior-y: none (iOS 16+ : bounce 자체 차단) */
      html[data-layout-mode="adaptive"] {
        background-image: linear-gradient(
          180deg,
          var(--sky-color, var(--bg-paper)) 0%,
          var(--sky-color, var(--bg-paper)) 30%,
          var(--ground-color, var(--bg-paper)) 70%,
          var(--ground-color, var(--bg-paper)) 100%
        );
        background-color: var(--sky-color, var(--bg-paper));
      }
      html[data-layout-mode="adaptive"] body {
        background-image: linear-gradient(
          180deg,
          var(--sky-color, var(--bg-paper)) 0%,
          var(--sky-color, var(--bg-paper)) 30%,
          var(--ground-color, var(--bg-paper)) 70%,
          var(--ground-color, var(--bg-paper)) 100%
        );
        background-color: var(--ground-color, var(--bg-paper));
        overscroll-behavior-y: none;
      }
      /* 모바일: 카드를 화면 하단에 자동 정렬(원래 PC와 동일).
         스크롤 비활성화 — PWA/네이티브 앱처럼 한 화면에 고정. */
      html[data-layout-mode="adaptive"] #appContainer .today-card {
        margin-top: auto;
        margin-bottom: max(24px, env(safe-area-inset-bottom, 0));
      }
    }

    /* ---------- 접근 B: Letterbox 고정 비율 393:852 ----------
       PC iPhone 프레임과 동일한 비율을 모바일에서도 유지, 남는 공간은 시간대 매칭 단색 */
    @media (max-width: 480px) {
      html[data-layout-mode="letterbox"] body {
        background: var(--letterbox-bg, var(--bg-paper));
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        transition: background var(--duration-base);
      }
      html[data-layout-mode="letterbox"] #appContainer {
        width: 100vw;
        max-width: 100vw;
        height: auto;
        max-height: 100dvh;
        aspect-ratio: 393 / 852;
      }
    }
    /* 화면이 393:852보다 더 세로로 길면 → width 기준으로 height 산출 (letterbox 위/아래 띠) */
    @media (max-width: 480px) and (max-aspect-ratio: 393/852) {
      html[data-layout-mode="letterbox"] #appContainer {
        width: 100vw;
        height: calc(100vw * 852 / 393);
      }
    }
    /* 화면이 더 가로로 길면 → height 기준으로 width 산출 (pillarbox 좌/우 띠) */
    @media (max-width: 480px) and (min-aspect-ratio: 393/852) {
      html[data-layout-mode="letterbox"] #appContainer {
        height: 100dvh;
        width: calc(100dvh * 393 / 852);
      }
    }
  </style>
</head>

  <script>
    // ========== 시간대 판별 (PRD 명세) ==========
    function getTimeSlot(hour) {
      if (hour >= 4  && hour < 7)  return 'dawn';
      if (hour >= 7  && hour < 12) return 'morning';
      if (hour >= 12 && hour < 17) return 'afternoon';
      if (hour >= 17 && hour < 22) return 'evening';
      return 'night';
    }

    // 시간대별 인사말 (호칭 제외 — "어린양님" 표기 X)
    const GREETINGS = {
      dawn:      '거룩한 새벽이네요',
      morning:   '은혜로운 아침이에요',
      afternoon: '평안한 오후예요',
      evening:   '온유한 저녁이네요',
      night:     '고요한 밤입니다',
    };

    /**
     * verse 텍스트를 항상 2줄로 보이도록 처리
     * - 짧은 텍스트(≤12자): 둘째 줄에 빈 칸을 추가해 2줄 영역 확보
     * - 긴 텍스트(>12자): 중간 띄어쓰기 위치에서 줄바꿈
     * - line-clamp: 2가 fallback으로 작동하므로 3줄 이상은 자동 절단
     */
    function formatVerse(text) {
      if (!text) return '';
      const safe = text.replace(/[<>&]/g, ch => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[ch]));
      const maxPerLine = 12;
      if (safe.length <= maxPerLine) {
        return safe + '<br>&nbsp;';
      }
      const mid = Math.floor(safe.length / 2);
      const breakPoint = safe.lastIndexOf(' ', mid);
      if (breakPoint > 0) {
        return safe.slice(0, breakPoint) + '<br>' + safe.slice(breakPoint + 1);
      }
      return safe;
    }

    // ========== 초기화 ==========
    document.addEventListener('DOMContentLoaded', () => {
      const appScroll = document.querySelector('.app-scroll');
      if (appScroll) appScroll.scrollTop = 0;

      // 시간대를 .app-container의 data-time-slot에 적용
      // (그라디언트 + 일러스트 + CTA 색상 + 텍스트 톤이 자동 분기됨)
      const slot = getTimeSlot(new Date().getHours());
      document.getElementById('appContainer').setAttribute('data-time-slot', slot);

      // 시간대별 sky(위)·ground(아래) 색 — PWA standalone 시스템 영역 흰 띠 제거의 단일 출처
      // sky : Dynamic Island 주변 status bar (theme-color로 OS 그림) + letterbox 띠
      // ground: 홈바 아래 / 하단 overscroll bounce (html background-color로 노출)
      // ※ SKY는 각 PNG가 화면 상단에 표시될 때의 실제 픽셀색(샘플링)으로 맞춰
      //    Dynamic Island/Status bar와 PNG 사이의 시각적 잘림(띠 경계)을 제거.
      const SKY_COLOR = {
        dawn: '#7C74A2', morning: '#F1D8CB', afternoon: '#E6E9ED',
        evening: '#DEAD98', night: '#082252',
      };
      const GROUND_COLOR = {
        dawn: '#E5D0C0', morning: '#EFE6CD', afternoon: '#ECE3D2',
        evening: '#F5C672', night: '#2A3A5C',
      };
      document.documentElement.style.setProperty('--sky-color', SKY_COLOR[slot] || '');
      document.documentElement.style.setProperty('--ground-color', GROUND_COLOR[slot] || '');
      document.documentElement.style.setProperty('--letterbox-bg', SKY_COLOR[slot] || '');

      // PWA standalone에서 OS가 그리는 status bar 위쪽 영역은 theme-color meta로만 색이 결정됨
      const themeColorMeta = document.querySelector('meta[name="theme-color"]');
      if (themeColorMeta) themeColorMeta.setAttribute('content', SKY_COLOR[slot] || '#F0F4F2');

      // body 배경 그라디언트 (sky → ground) — 시작색은 SKY_COLOR와 동일하게 유지해
      // 시스템 영역(다이내믹 아일랜드)과 PNG 사이의 색 끊김을 제거
      const TIME_BG_GRADIENT = {
        dawn:      'linear-gradient(180deg, #7C74A2 0%, #E5D0C0 100%)',
        morning:   'linear-gradient(180deg, #F1D8CB 0%, #EFE6CD 100%)',
        afternoon: 'linear-gradient(180deg, #E6E9ED 0%, #ECE3D2 100%)',
        evening:   'linear-gradient(180deg, #DEAD98 0%, #F5C672 100%)',
        night:     'linear-gradient(180deg, #082252 0%, #2A3A5C 100%)',
      };
      document.documentElement.style.setProperty('--time-bg', TIME_BG_GRADIENT[slot] || '');

      renderGreeting(slot);
      renderDatePill();
      loadTodayQT();
      setupFontSizeSelector();
      setupFontStyleSelector();
      setupEventListeners();
      ensureHashSilently();
    });

    // ========== 해시 자동 발급 ==========
    async function ensureHashSilently() {
      if (typeof SupabaseSync === 'undefined' || !SupabaseSync.isConfigured()) return;
      try { await SupabaseSync.ensureUserHash(); }
      catch (e) { console.warn('해시 자동 발급 실패 (무시):', e); }
    }

    // ========== 인사말 렌더링 (이모지/호칭 없음, 날짜는 헤더 알약으로 이동) ==========
    function renderGreeting(slot) {
      const s = slot || getTimeSlot(new Date().getHours());
      document.getElementById('greetingText').textContent = GREETINGS[s];
    }

    // ========== 해시 배지 렌더링 ==========
    function renderHashBadge() {
      const hash = Storage.getUserHash();
      const badge = document.getElementById('userHashBadge');
      if (hash) {
        document.getElementById('userHashText').textContent = hash;
        badge.style.display = 'flex';
      } else {
        badge.style.display = 'none';
      }
    }

    // ========== 날짜 알약 렌더링 ==========
    // 형식: "26년 5월 8일 (금)"  또는  "26년 5월 8일 (금) · 12회 완료"
    // 0회 완료일 때는 "·N회 완료" 부분을 숨김 (첫 사용자 부담 제거)
    function renderDatePill() {
      // Storage 미로드(미리보기 등)나 데이터 이슈 시에도 헤더는 항상 표시
      let total = 0;
      try {
        if (typeof Storage !== 'undefined' && typeof Storage.getStreak === 'function') {
          const streak = Storage.getStreak();
          total = streak.totalCompleted ?? 0;
        }
      } catch (e) {
        console.warn('renderDatePill: Storage 접근 실패, 0회로 폴백', e);
      }

      const now    = new Date();
      const yy     = String(now.getFullYear()).slice(2);
      const month  = now.getMonth() + 1;
      const day    = now.getDate();
      const wd     = ['일','월','화','수','목','금','토'][now.getDay()];

      const dateText = `${yy}년 ${month}월 ${day}일 (${wd})`;
      const text = (total > 0)
        ? `${dateText} <span class="date-pill__sep">·</span> <span class="date-pill__count">${total}회</span> 완료`
        : dateText;

      document.getElementById('datePillText').innerHTML = text;
    }

    // ========== 오늘의 QT 로드 ==========
    async function loadTodayQT() {
      const today   = Common.todayISO();
      const loading = document.getElementById('todayLoading');
      const content = document.getElementById('todayContent');
      const errorEl = document.getElementById('todayError');

      let qt = await Common.loadJSON(`../data/qt/${today}.json`);
      if (!qt) {
        for (let i = 1; i <= 3; i++) {
          const d = new Date(new Date().toLocaleDateString('sv-SE', { timeZone: 'Asia/Seoul' }));
          d.setDate(d.getDate() - i);
          qt = await Common.loadJSON(`../data/qt/${d.toLocaleDateString('sv-SE')}.json`);
          if (qt) break;
        }
      }

      loading.style.display = 'none';
      if (!qt) { errorEl.style.display = 'block'; return; }

      content.style.display = 'block';
      const alreadyDone = Storage.getDailyRecord(today).completed;
      // verse 텍스트를 항상 2줄로 보이게 처리 (XSS 회피: formatVerse 내부에서 escape)
      document.getElementById('todayTitle').innerHTML = formatVerse(qt.title);
      document.getElementById('todayRef').textContent   = qt.scripture_ref;

      const startBtn = document.getElementById('startBtn');
      startBtn.textContent = alreadyDone ? '오늘의 묵상 다시 보기' : '묵상 시작하기';
      startBtn.onclick = () => { window.location.href = 'qt/step-1-scripture.html'; };
    }

    // 모달 시트에 적용된 폰트 미리보기 인라인 스타일을 모두 제거
    function clearModalPreview() {
      const sheet = document.querySelector('#settingsModal .modal-sheet');
      if (!sheet) return;
      sheet.style.removeProperty('--text-body');
      sheet.style.removeProperty('--text-h2');
      sheet.style.removeProperty('font-family');
    }

    // staged 폰트 값을 모달 시트 자체에 즉시 반영 (메인 화면은 건드리지 않음)
    // 배경은 시간대 자동이므로 모달도 메인과 동일한 테마를 그대로 따라감
    function applyPreviewToModal(staged) {
      const sheet = document.querySelector('#settingsModal .modal-sheet');
      if (!sheet || !staged) return;

      if (staged.fontSize === 'lg-xl') {
        sheet.style.setProperty('--text-body', '19.2px');
        sheet.style.setProperty('--text-h2',   '22.5px');
      } else {
        sheet.style.setProperty('--text-body', '16px');
        sheet.style.setProperty('--text-h2',   '19px');
      }

      sheet.style.fontFamily = staged.fontStyle === 'noto-serif'
        ? "'Noto Serif KR', 'Nanum Myeongjo', serif"
        : "'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif";
    }

    // ========== 설정 모달 staged 상태 ==========
    let stagedSettings = null;

    function openSettingsModal() {
      stagedSettings = {
        fontSize:   Storage.get('settings.fontSize',   'md')      || 'md',
        fontStyle:  Storage.get('settings.fontStyle',  'noto-serif') || 'noto-serif',
      };
      syncSelectorUI();
      applyPreviewToModal(stagedSettings);

      // 아코디언 닫힌 상태로 초기화
      document.querySelector('.restore-accordion')?.classList.remove('is-open');

      document.getElementById('nameInput').value = Storage.getUserName();
      renderHashBadge();
      document.getElementById('settingsModal').classList.add('is-open');
    }

    function closeSettingsModal() {
      document.getElementById('settingsModal').classList.remove('is-open');
      clearModalPreview();
      stagedSettings = null;
      // 모달이 숨겨진 뒤 transform/transition 초기화 (다음 열기 때 깔끔하게)
      const sheet = document.querySelector('#settingsModal .modal-sheet');
      if (sheet) {
        sheet.style.transition = '';
        sheet.style.transform = '';
      }
    }

    // ========== QR 모달 ==========
    // 공유 URL은 og:url 메타 태그에서 가져옴 (단일 진실 공급원)
    function getShareUrl() {
      const og = document.querySelector('meta[property="og:url"]');
      return (og && og.content) ? og.content : window.location.origin;
    }

    function openQrModal() {
      const url = getShareUrl();
      // URL 텍스트는 사용자에게 보일 때 'https://' 접두어 제거 (모바일 가독성)
      const displayUrl = url.replace(/^https?:\/\//, '');
      document.getElementById('qrUrlText').textContent = displayUrl;

      // QR SVG 생성 (qr.js의 글로벌 QRCode)
      if (typeof QRCode !== 'undefined' && QRCode.toSVG) {
        const svg = QRCode.toSVG(url, { size: 240, margin: 0 });
        document.getElementById('qrCard').innerHTML = svg;
      }

      document.getElementById('qrModal').classList.add('is-open');
    }

    function closeQrModal() {
      document.getElementById('qrModal').classList.remove('is-open');
      const sheet = document.querySelector('#qrModal .modal-sheet');
      if (sheet) {
        sheet.style.transition = '';
        sheet.style.transform = '';
      }
    }

    // staged 값을 셀렉터 UI에 반영 (본문은 건드리지 않음)
    function syncSelectorUI() {
      if (!stagedSettings) return;
      document.querySelectorAll('#fontSizeGrid .font-seg__btn').forEach(o =>
        o.classList.toggle('is-selected', o.dataset.fontSize === stagedSettings.fontSize));
      document.querySelectorAll('#fontStyleGrid .font-seg__btn').forEach(o =>
        o.classList.toggle('is-selected', o.dataset.fontStyle === stagedSettings.fontStyle));
    }

    // ========== 이벤트 리스너 ==========
    function setupEventListeners() {
      document.getElementById('datePill').addEventListener('click', () => {
        window.location.href = 'history/calendar.html';
      });

      document.getElementById('qrShareBtn').addEventListener('click', openQrModal);

      document.getElementById('settingsBtn').addEventListener('click', openSettingsModal);

      document.getElementById('hashCopyBtn').addEventListener('click', () => {
        const text = document.getElementById('userHashText').textContent;
        navigator.clipboard.writeText(text).then(() => {
          const btn = document.getElementById('hashCopyBtn');
          const COPY  = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
          const CHECK = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
          btn.innerHTML = CHECK;
          setTimeout(() => { btn.innerHTML = COPY; }, 1500);
        });
      });

      document.getElementById('cancelSettingsBtn').addEventListener('click', closeSettingsModal);

      document.getElementById('saveSettingsBtn').addEventListener('click', () => {
        const input   = document.getElementById('nameInput');
        const newName = input.value.trim();
        if (!newName) { input.focus(); return; }

        Storage.setUserName(newName);
        if (stagedSettings) {
          Storage.setSetting('fontSize',   stagedSettings.fontSize);
          Storage.setSetting('fontStyle',  stagedSettings.fontStyle);
          document.documentElement.setAttribute('data-font-size', stagedSettings.fontSize);
          Common.applyFontStyle(stagedSettings.fontStyle);
        }
        closeSettingsModal();
        renderGreeting();
      });

      document.getElementById('settingsModal').addEventListener('click', (e) => {
        if (e.target.id === 'settingsModal') closeSettingsModal();
      });

      // 다른 기기 불러오기 아코디언 토글
      document.getElementById('restoreToggleBtn').addEventListener('click', () => {
        const acc = document.querySelector('.restore-accordion');
        const expanded = acc.classList.toggle('is-open');
        document.getElementById('restoreToggleBtn').setAttribute('aria-expanded', expanded);
      });

      document.getElementById('restoreHashBtn').addEventListener('click', handleRestore);

      // JSON 백업
      document.getElementById('exportJsonBtn').addEventListener('click', handleExportJson);
      document.getElementById('importJsonBtn').addEventListener('click', handleImportJsonClick);
      document.getElementById('importJsonFile').addEventListener('change', handleImportJsonFile);

      // QR 모달 닫기 (백드롭 클릭)
      document.getElementById('qrModal').addEventListener('click', (e) => {
        if (e.target.id === 'qrModal') closeQrModal();
      });

      // QR URL 복사
      document.getElementById('qrCopyBtn').addEventListener('click', () => {
        const text = document.getElementById('qrUrlText').textContent;
        navigator.clipboard.writeText(text).then(() => {
          const btn = document.getElementById('qrCopyBtn');
          const orig = btn.textContent;
          btn.textContent = '복사됨';
          setTimeout(() => { btn.textContent = orig; }, 1500);
        });
      });

      setupModalSwipeDown();
      setupQrModalSwipeDown();
    }

    // ========== 모달 스와이프 다운 닫기 ==========
    function setupModalSwipeDown() {
      const sheet  = document.querySelector('#settingsModal .modal-sheet');
      const handle = sheet?.querySelector('.modal-drag-handle');
      if (!sheet || !handle) return;

      let startY = 0, startTime = 0, deltaY = 0, dragging = false, pointerId = null;

      // 핸들에서만 드래그 시작 — touch-action: none이므로 브라우저 간섭 없음
      handle.addEventListener('pointerdown', (e) => {
        if (e.pointerType === 'mouse' && e.button !== 0) return;
        dragging = true;
        startY = e.clientY;
        startTime = Date.now();
        deltaY = 0;
        pointerId = e.pointerId;
        sheet.classList.add('is-dragging');
        handle.setPointerCapture(e.pointerId);
      });

      handle.addEventListener('pointermove', (e) => {
        if (!dragging || e.pointerId !== pointerId) return;
        deltaY = Math.max(0, e.clientY - startY);
        sheet.style.transform = `translateY(${deltaY}px)`;
      });

      const endDrag = (e) => {
        if (!dragging || e.pointerId !== pointerId) return;
        dragging = false;
        sheet.classList.remove('is-dragging');

        const elapsed  = Math.max(1, Date.now() - startTime);
        const velocity = deltaY / elapsed; // px/ms

        if (deltaY > 80 || (velocity > 0.4 && deltaY > 20)) {
          // 슬라이드 다운 후 닫기
          sheet.style.transition = 'transform 280ms cubic-bezier(0.4, 0, 1, 1)';
          sheet.style.transform  = 'translateY(110%)';
          setTimeout(() => closeSettingsModal(), 285);
        } else {
          // 제자리 복귀
          sheet.style.transition = 'transform 240ms var(--ease-out)';
          sheet.style.transform  = '';
          sheet.addEventListener('transitionend', () => {
            sheet.style.transition = '';
          }, { once: true });
        }
        deltaY = 0; pointerId = null;
      };

      handle.addEventListener('pointerup',     endDrag);
      handle.addEventListener('pointercancel', endDrag);
    }

    // ========== QR 모달 스와이프 다운 닫기 ==========
    function setupQrModalSwipeDown() {
      const sheet  = document.querySelector('#qrModal .modal-sheet');
      const handle = sheet?.querySelector('.modal-drag-handle');
      if (!sheet || !handle) return;

      let startY = 0, startTime = 0, deltaY = 0, dragging = false, pointerId = null;

      handle.addEventListener('pointerdown', (e) => {
        if (e.pointerType === 'mouse' && e.button !== 0) return;
        dragging = true;
        startY = e.clientY;
        startTime = Date.now();
        deltaY = 0;
        pointerId = e.pointerId;
        sheet.classList.add('is-dragging');
        handle.setPointerCapture(e.pointerId);
      });

      handle.addEventListener('pointermove', (e) => {
        if (!dragging || e.pointerId !== pointerId) return;
        deltaY = Math.max(0, e.clientY - startY);
        sheet.style.transform = `translateY(${deltaY}px)`;
      });

      const endDrag = (e) => {
        if (!dragging || e.pointerId !== pointerId) return;
        dragging = false;
        sheet.classList.remove('is-dragging');

        const elapsed  = Math.max(1, Date.now() - startTime);
        const velocity = deltaY / elapsed;

        if (deltaY > 80 || (velocity > 0.4 && deltaY > 20)) {
          sheet.style.transition = 'transform 280ms cubic-bezier(0.4, 0, 1, 1)';
          sheet.style.transform  = 'translateY(110%)';
          setTimeout(() => closeQrModal(), 285);
        } else {
          sheet.style.transition = 'transform 240ms var(--ease-out)';
          sheet.style.transform  = '';
          sheet.addEventListener('transitionend', () => {
            sheet.style.transition = '';
          }, { once: true });
        }
        deltaY = 0; pointerId = null;
      };

      handle.addEventListener('pointerup',     endDrag);
      handle.addEventListener('pointercancel', endDrag);
    }

    // ========== 해시로 기록 복원 ==========
    async function handleRestore() {
      const input  = document.getElementById('restoreHashInput');
      const status = document.getElementById('restoreStatus');
      const btn    = document.getElementById('restoreHashBtn');
      const value  = input.value.trim();

      status.style.color = 'var(--text-secondary)';
      if (!value) { input.focus(); return; }

      if (typeof SupabaseSync === 'undefined' || !SupabaseSync.isConfigured()) {
        status.textContent = '서버 연결이 설정되지 않았어요'; return;
      }

      const existing = Storage.getUserHash();
      if (existing && existing !== value) {
        const yes = confirm(
          `현재 기기에 저장된 해시(${existing})가 있어요.\n"${value}"의 기록으로 덮어쓰시겠어요?\n\n※ 현재 해시의 로컬 기록은 사라질 수 있어요.`
        );
        if (!yes) return;
      }

      btn.disabled = true;
      status.textContent = '동기화 중...';
      const result = await SupabaseSync.restoreFromHash(value);
      btn.disabled = false;

      if (!result.ok) {
        const msgs = {
          empty: '해시를 입력해주세요', format: '형식이 올바르지 않아요 (예: 어린양#1234)',
          not_found: '해당 해시를 찾을 수 없어요', network: '네트워크 오류예요. 잠시 후 다시 시도해주세요',
        };
        status.style.color = 'var(--text-secondary)';
        status.textContent = msgs[result.reason] || '동기화에 실패했어요';
        return;
      }

      status.style.color = 'var(--accent-sage-text)';
      status.textContent = `${result.recordCount}일치 기록을 동기화했어요. 새로고침할게요...`;
      setTimeout(() => window.location.reload(), 800);
    }

    // ========== 로컬 JSON 백업 ==========
    const BACKUP_KEY_PREFIXES = ['user.', 'streak.', 'records.', 'settings.', 'tooltip.'];
    const BACKUP_EXACT_KEYS = new Set(['layoutMode']);

    function collectLocalDump() {
      const dump = {};
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (!key) continue;
        const ok = BACKUP_KEY_PREFIXES.some((p) => key.startsWith(p))
                || BACKUP_EXACT_KEYS.has(key);
        if (ok) dump[key] = localStorage.getItem(key);
      }
      return dump;
    }

    function handleExportJson() {
      const status = document.getElementById('importJsonStatus');
      const payload = {
        schema:     1,
        app:        'jumanna-qt',
        exportedAt: new Date().toISOString(),
        userHash:   Storage.getUserHash() || null,
        data:       collectLocalDump(),
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const d = new Date();
      const yy = String(d.getFullYear()).slice(-2);
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `manna data-${yy}.${mm}.${dd}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(a.href), 1000);

      status.style.color = 'var(--accent-sage-text)';
      status.textContent = '백업 파일을 내려받았어요';
    }

    function handleImportJsonClick() {
      document.getElementById('importJsonFile').click();
    }

    function handleImportJsonFile(ev) {
      const status = document.getElementById('importJsonStatus');
      status.style.color = 'var(--text-secondary)';
      const file = ev.target.files && ev.target.files[0];
      ev.target.value = ''; // 같은 파일 재선택 가능하도록
      if (!file) return;

      const reader = new FileReader();
      reader.onerror = () => { status.textContent = '파일을 읽지 못했어요'; };
      reader.onload  = (e) => {
        let payload;
        try { payload = JSON.parse(e.target.result); }
        catch { status.textContent = '올바른 JSON 파일이 아니에요'; return; }
        if (!payload || typeof payload !== 'object' || !payload.data || typeof payload.data !== 'object') {
          status.textContent = '주만나 백업 파일이 아니에요';
          return;
        }
        const ok = confirm(
          '이 기기의 묵상 기록을 백업 파일로 덮어씁니다.\n현재 기록은 사라질 수 있어요. 진행할까요?'
        );
        if (!ok) return;

        let restored = 0;
        Object.entries(payload.data).forEach(([k, v]) => {
          if (typeof v !== 'string') return;
          const allow = BACKUP_KEY_PREFIXES.some((p) => k.startsWith(p))
                     || BACKUP_EXACT_KEYS.has(k);
          if (!allow) return;
          localStorage.setItem(k, v);
          restored++;
        });
        status.style.color = 'var(--accent-sage-text)';
        status.textContent = `${restored}개 항목 복원 완료. 새로고침할게요...`;
        setTimeout(() => window.location.reload(), 800);
      };
      reader.readAsText(file);
    }

    // ========== 폰트 크기 선택기 ==========
    function setupFontSizeSelector() {
      const current = Storage.get('settings.fontSize', 'md') || 'md';
      const options = document.querySelectorAll('#fontSizeGrid .font-seg__btn');
      options.forEach(opt => {
        if (opt.dataset.fontSize === current) opt.classList.add('is-selected');
        opt.addEventListener('click', () => {
          if (!stagedSettings) return;
          stagedSettings.fontSize = opt.dataset.fontSize;
          options.forEach(o => o.classList.remove('is-selected'));
          opt.classList.add('is-selected');
          applyPreviewToModal(stagedSettings);
        });
      });
    }

    // ========== 폰트 스타일 선택기 ==========
    function setupFontStyleSelector() {
      const current = Storage.get('settings.fontStyle', 'noto-serif') || 'noto-serif';
      const options = document.querySelectorAll('#fontStyleGrid .font-seg__btn');
      options.forEach(opt => {
        if (opt.dataset.fontStyle === current) opt.classList.add('is-selected');
        opt.addEventListener('click', () => {
          if (!stagedSettings) return;
          stagedSettings.fontStyle = opt.dataset.fontStyle;
          options.forEach(o => o.classList.remove('is-selected'));
          opt.classList.add('is-selected');
          applyPreviewToModal(stagedSettings);
        });
      });
    }
  </script>
