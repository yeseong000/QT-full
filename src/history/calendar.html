<!DOCTYPE html>
<html lang="ko" data-font-size="md">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1">
  <meta name="theme-color" content="#F0F4F2">

  <!-- PWA (Android/Chrome) -->
  <link rel="manifest" href="../manifest.json">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="함께 만나">
  <meta name="format-detection" content="telephone=no">
  <link rel="apple-touch-icon" href="../images/Icon.png">
  <link rel="icon" type="image/png" href="../images/Icon.png">

  <title>묵상 달력 · 주만나</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
  <link rel="stylesheet" href="../styles/design-tokens.css">
  <link rel="stylesheet" href="../styles/common.css">

  <style>
    /* ========== 달력 전용 ========== */

    /* ---------- 시간대별 블러 배경 (iOS 잠금화면 풍) ----------
       app-container에 data-time-slot 속성이 JS로 적용됨
       - layer 1 (.bg-blur): PNG 일러스트 + blur 50px + scale 1.1로 가장자리 잘림 방지
       - layer 2 (.bg-overlay): 시간대별 색상 오버레이로 가독성 확보 */
    .app-container { position: relative; }
    .bg-blur {
      position: absolute;
      inset: -30px;
      z-index: -2;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      filter: blur(50px) saturate(0.85);
      transform: scale(1.1);
      pointer-events: none;
    }
    .bg-overlay {
      position: absolute;
      inset: 0;
      z-index: -1;
      pointer-events: none;
    }
    /* 시간대별 PNG (배포 경로 기준 ../images/...) */
    .app-container[data-time-slot="dawn"]      .bg-blur {
      background-image: url('../images/%EA%B1%B0%EB%A3%A9%ED%95%9C%20%EC%83%88%EB%B2%BD%20%EB%AA%A8%EB%B0%94%EC%9D%BC%20.png');
    }
    .app-container[data-time-slot="morning"]   .bg-blur {
      background-image: url('../images/%EC%9D%80%ED%98%9C%EB%A1%9C%EC%9A%B4%20%EC%95%84%EC%B9%A8%20%EB%AA%A8%EB%B0%94%EC%9D%BC%20.png');
    }
    .app-container[data-time-slot="afternoon"] .bg-blur {
      background-image: url('../images/%ED%8F%89%EC%95%88%ED%95%9C%20%EC%98%A4%ED%9B%84%20%EB%AA%A8%EB%B0%94%EC%9D%BC.png');
    }
    .app-container[data-time-slot="evening"]   .bg-blur {
      background-image: url('../images/%EC%98%A8%EC%9C%A0%ED%95%9C%20%EC%A0%80%EB%85%81%20%EB%AA%A8%EB%B0%94%EC%9D%BC.png');
    }
    .app-container[data-time-slot="night"]     .bg-blur {
      background-image: url('../images/%EA%B3%A0%EC%9A%94%ED%95%9C%20%EB%B0%A4%20%EB%AA%A8%EB%B0%94%EC%9D%BC%20.png');
    }
    /* 오버레이: 낮은 흰색, 밤은 검정 (가독성 확보) */
    .app-container[data-time-slot="dawn"]      .bg-overlay { background: rgba(255, 255, 255, 0.45); }
    .app-container[data-time-slot="morning"]   .bg-overlay { background: rgba(255, 255, 255, 0.50); }
    .app-container[data-time-slot="afternoon"] .bg-overlay { background: rgba(255, 255, 255, 0.45); }
    .app-container[data-time-slot="evening"]   .bg-overlay { background: rgba(255, 255, 255, 0.45); }
    .app-container[data-time-slot="night"]     .bg-overlay { background: rgba(0, 0, 0, 0.40); }

    /* ---------- 글래스 카드 베이스 ----------
       모든 카드(.streak-hero, .calendar, .preview-card, .calendar-empty, .calendar-hint)는
       이 베이스 위에서 렌더됨. 다크 톤(night)에선 글래스 톤만 다르게 분기. */
    .glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: var(--radius-lg);
    }
    .app-container[data-time-slot="night"] .glass-card {
      background: rgba(255, 255, 255, 0.12);
      border: 0.5px solid rgba(255, 255, 255, 0.15);
    }
    /* night 톤일 때 본문 텍스트 흰색 처리 */
    .app-container[data-time-slot="night"] {
      color: #FFFFFF;
    }
    .app-container[data-time-slot="night"] .archive-title { color: #FFFFFF; }
    .app-container[data-time-slot="night"] .back-btn { color: rgba(255, 255, 255, 0.92); }
    .app-container[data-time-slot="night"] .back-btn:active {
      background: rgba(255, 255, 255, 0.15);
    }
    .app-container[data-time-slot="night"] .header-action-btn { color: rgba(255, 255, 255, 0.92); }
    .app-container[data-time-slot="night"] .header-action-btn:active {
      background: rgba(255, 255, 255, 0.15);
    }
    .app-container[data-time-slot="night"] .month-nav__btn { color: rgba(255, 255, 255, 0.92); }
    .app-container[data-time-slot="night"] .month-nav__btn:disabled { color: rgba(255, 255, 255, 0.25); }
    .app-container[data-time-slot="night"] .month-nav__label { color: #FFFFFF; }
    .app-container[data-time-slot="night"] .calendar-weekdays__day { color: rgba(255, 255, 255, 0.65); }
    .app-container[data-time-slot="night"] .calendar-weekdays__day--sun { color: #FFA8A8; }
    .app-container[data-time-slot="night"] .calendar-cell { color: #FFFFFF; }
    .app-container[data-time-slot="night"] .calendar-cell--future { color: rgba(255, 255, 255, 0.3); }
    .app-container[data-time-slot="night"] .calendar-cell--sun { color: #FFA8A8; }
    .app-container[data-time-slot="night"] .calendar-cell--sun.calendar-cell--future { color: rgba(255, 168, 168, 0.3); }
    /* night + completed: sage 배경 위 흰 글자 강제 (sun 셀이라도 동일) */
    .app-container[data-time-slot="night"] .calendar-cell--completed,
    .app-container[data-time-slot="night"] .calendar-cell--completed.calendar-cell--sun { color: #FFFFFF; }
    .app-container[data-time-slot="night"] .streak-hero__message { color: #FFFFFF; }
    .app-container[data-time-slot="night"] .streak-metric__value { color: #FFFFFF; }
    .app-container[data-time-slot="night"] .streak-metric__unit { color: rgba(255, 255, 255, 0.65); }
    .app-container[data-time-slot="night"] .streak-metric__divider { background: rgba(255, 255, 255, 0.18); }
    .app-container[data-time-slot="night"] .preview-card__date { color: rgba(255, 255, 255, 0.65); }
    .app-container[data-time-slot="night"] .preview-card__title { color: #FFFFFF; }
    .app-container[data-time-slot="night"] .preview-card__ref { color: rgba(255, 255, 255, 0.65); }
    .app-container[data-time-slot="night"] .preview-card__section-label { color: #A8B5D0; }
    .app-container[data-time-slot="night"] .preview-card__section-body { color: #FFFFFF; }
    .app-container[data-time-slot="night"] .preview-card__section-q { color: rgba(255, 255, 255, 0.65); }
    .app-container[data-time-slot="night"] .preview-emotion-chip { background: rgba(255, 255, 255, 0.12); color: #FFFFFF; }
    .app-container[data-time-slot="night"] .calendar-hint { color: rgba(255, 255, 255, 0.85); }
    .app-container[data-time-slot="night"] .calendar-empty { color: rgba(255, 255, 255, 0.7); }

    /* 미리보기 카드 등장 시 스크롤바로 인한 폭 변화 방지 */
    .app-scroll {
      scrollbar-gutter: stable;
    }

    .archive-header {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-5);
    }
    .back-btn {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: var(--text-primary);
      background: transparent;
      border: 0;
      -webkit-tap-highlight-color: transparent;
      margin-left: -10px;
      cursor: pointer;
    }
    .back-btn svg { width: 22px; height: 22px; }
    .back-btn:active { background: var(--accent-sage-soft); }
    .archive-title {
      font-size: var(--text-h1);
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }
    /* 헤더 우측 보조 액션 (묵상 모아보기) — back-btn과 시각적 페어 */
    .header-action-btn {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: var(--text-primary);
      background: transparent;
      border: 0;
      -webkit-tap-highlight-color: transparent;
      margin-left: auto;
      margin-right: -10px;
      cursor: pointer;
      transition: background-color 120ms ease;
    }
    .header-action-btn svg { width: 22px; height: 22px; }
    .header-action-btn:active { background: var(--accent-sage-soft); }

    /* 스트릭 히어로 카드 — 성장 일러스트 중심 (큰 일러스트 + 메시지 + 지표) */
    .streak-hero {
      padding: 26px 18px 22px;
      margin-bottom: var(--space-5);
      text-align: center;
    }
    .streak-hero__illust {
      width: 100px;
      height: 100px;
      margin: 0 auto 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .streak-hero__illust svg {
      width: 100%;
      height: 100%;
      display: block;
    }
    .streak-hero__message {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.015em;
      margin-bottom: 18px;
      line-height: 1.5;
    }
    .streak-hero__metrics {
      display: flex;
      align-items: stretch;
      justify-content: center;
    }
    .streak-metric {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      max-width: 50%;
    }
    .streak-metric__value {
      font-size: 26px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.025em;
      line-height: 1;
    }
    .streak-metric__unit {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 500;
      letter-spacing: -0.005em;
    }
    .streak-metric__divider {
      width: 0.5px;
      align-self: center;
      height: 28px;
      background: rgba(0, 0, 0, 0.10);
      flex-shrink: 0;
    }

    /* 월 이동 */
    .month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--space-2);
      margin-bottom: var(--space-3);
    }
    .month-nav__btn {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: transparent;
      border: 0;
      color: var(--accent-sage);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .month-nav__btn:disabled {
      color: var(--border-chip);
      cursor: not-allowed;
    }
    .month-nav__btn:not(:disabled):active {
      background: var(--accent-sage-soft);
    }
    .month-nav__btn svg { width: 20px; height: 20px; }
    .month-nav__label {
      font-size: var(--text-h2);
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    /* 달력 카드 */
    .calendar {
      padding: 18px 14px 14px;
      margin-bottom: var(--space-5);
    }
    .calendar-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-size: 11.5px;
      color: var(--text-secondary);
      font-weight: 500;
      margin-bottom: var(--space-2);
    }
    .calendar-weekdays__day { padding: 4px 0; }
    .calendar-weekdays__day--sun { color: #C27C65; }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .calendar-cell {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      position: relative;
      font-size: 13.5px;
      color: var(--text-body);
      border-radius: 10px;
      background: transparent;
      border: 0;
      padding: 0;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
      transition: background-color 120ms ease;
    }
    .calendar-cell--empty { visibility: hidden; cursor: default; }
    .calendar-cell--future { color: var(--text-placeholder); cursor: default; }
    .calendar-cell--sun { color: #C27C65; }
    .calendar-cell--sun.calendar-cell--future { color: rgba(194, 124, 101, 0.4); }

    /* 완료한 날 — sage 배경 채움 (Streak Pill 베이스) */
    .calendar-cell--completed {
      background: var(--accent-sage);
      color: #FFFFFF;
      font-weight: 600;
    }
    /* 일요일이라도 완료면 흰 글자 우선 */
    .calendar-cell--completed.calendar-cell--sun { color: #FFFFFF; }

    /* Streak 연결: 같은 주 내 인접 완료일과 끊김 없이 이어짐
       ::after로 셀 사이 4px gap을 sage로 메워 한 알약처럼 보이게 함 */
    .calendar-cell--completed.calendar-cell--streak-right {
      border-top-right-radius: 0;
      border-bottom-right-radius: 0;
    }
    .calendar-cell--completed.calendar-cell--streak-right::after {
      content: '';
      position: absolute;
      top: 0;
      right: -4px;
      width: 4px;
      height: 100%;
      background: var(--accent-sage);
      pointer-events: none;
    }
    .calendar-cell--completed.calendar-cell--streak-left {
      border-top-left-radius: 0;
      border-bottom-left-radius: 0;
    }

    /* 오늘 — 세이지 보더 (완료 아닐 때) */
    .calendar-cell--today {
      border: 1.5px solid var(--accent-sage);
      font-weight: 700;
    }
    /* 오늘 ∩ 완료 — 보더 대신 안쪽 흰 ring */
    .calendar-cell--today.calendar-cell--completed {
      border-color: transparent;
      box-shadow: inset 0 0 0 1.5px rgba(255, 255, 255, 0.7);
    }

    /* 선택된 날 — 다크 채움 (선택 액션 피드백 우선, streak 연결 차단) */
    .calendar-cell--selected {
      background: #2D3A32 !important;
      color: #FFFFFF !important;
      font-weight: 700;
      border-color: transparent !important;
      border-radius: 10px !important;
      box-shadow: none !important;
    }
    .calendar-cell--selected::after { display: none !important; }
    /* 오늘 ∩ 선택 = 다크 채움 우선 */
    .calendar-cell--selected.calendar-cell--today {
      background: #2D3A32 !important;
      border-color: transparent !important;
    }

    /* 빈 월 안내 (글래스 카드 안) */
    .calendar-empty {
      text-align: center;
      padding: var(--space-3) 0 var(--space-2);
      color: var(--text-secondary);
      font-size: var(--text-small);
    }

    /* 캘린더 하단 안내 카드 (미선택 시 표시) */
    .calendar-hint {
      padding: 16px 18px;
      margin-bottom: var(--space-5);
      text-align: center;
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
    }
    .calendar-hint.is-hidden { display: none; }

    /* 인라인 미리보기 (archive 디테일 통째로 흡수) */
    .preview-card {
      padding: 20px;
      margin-bottom: var(--space-5);
      display: none;
    }
    .preview-card.is-visible { display: block; }
    .preview-card__date {
      font-size: 12px;
      color: var(--text-secondary);
      letter-spacing: 0.02em;
      margin-bottom: 6px;
    }
    .preview-card__title {
      font-size: 17px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      line-height: 1.35;
      margin-bottom: 4px;
    }
    .preview-card__ref {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }
    .preview-card__section {
      margin-bottom: 16px;
    }
    .preview-card__section:last-child { margin-bottom: 0; }
    .preview-card__section-label {
      font-size: 11px;
      font-weight: 600;
      color: #BC7383;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .preview-card__section-body {
      font-size: 13.5px;
      color: var(--text-primary);
      line-height: 1.7;
    }
    .preview-card__summary-list {
      margin: 0;
      padding-left: 18px;
      font-size: 13.5px;
      color: var(--text-primary);
      line-height: 1.7;
    }
    .preview-card__summary-list li { margin-bottom: 4px; }
    .preview-card__emotions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .preview-emotion-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      background: rgba(0, 0, 0, 0.05);
      border-radius: var(--radius-pill);
      font-size: 12.5px;
      color: var(--text-primary);
      font-weight: 500;
    }
    .preview-card__underline {
      background: rgba(245, 185, 66, 0.18);
      border-left: 3px solid #F5B942;
      padding: 8px 10px;
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-primary);
      border-radius: 0 8px 8px 0;
      margin-bottom: 8px;
    }
    .preview-card__underline:last-child { margin-bottom: 0; }
    .preview-card__underline-verse {
      color: var(--text-secondary);
      font-size: 11.5px;
      margin-left: 4px;
    }
    .preview-card__underline-note {
      margin-top: 4px;
      font-size: 12.5px;
      color: var(--text-secondary);
    }
    .preview-card__question {
      padding-bottom: 12px;
      border-bottom: 0.5px solid rgba(0, 0, 0, 0.06);
      margin-bottom: 12px;
    }
    .preview-card__question:last-child {
      border-bottom: 0;
      padding-bottom: 0;
      margin-bottom: 0;
    }
    .preview-card__section-q {
      font-size: 12.5px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .preview-card__start {
      width: 100%;
      margin-top: var(--space-3);
    }

    /* 전체 빈 상태 (기록이 하나도 없을 때) */
    .empty-state {
      text-align: center;
      padding: var(--space-10) var(--space-4);
      color: var(--text-secondary);
    }
    .empty-state__emoji {
      font-size: 42px;
      margin-bottom: var(--space-3);
      line-height: 1;
    }
    .empty-state__title {
      font-size: var(--text-h2);
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-2);
    }
    .empty-state__desc {
      font-size: var(--text-small);
      line-height: 1.6;
    }

    /* ==========================================================
       PC/iPad 컴팩트: 미리보기 카드 max-height (한 화면 안 유지)
       ========================================================== */
    @media (min-width: 768px) {
      .preview-card.is-visible {
        max-height: 60vh;
        overflow-y: auto;
      }
      .streak-hero {
        margin-bottom: var(--space-3);
      }
    }
    @media (min-width: 1024px) {
      .preview-card.is-visible {
        max-height: 55vh;
      }
    }

    /* ==========================================================
       묵상 모아보기 시트 (헤더 우측 아이콘 → 모바일 bottom sheet) */
    .archive-sheet {
      position: fixed;
      inset: 0;
      z-index: 1000;
      pointer-events: none;
      visibility: hidden;
    }
    .archive-sheet.is-open {
      pointer-events: auto;
      visibility: visible;
    }
    .archive-sheet__backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0);
      transition: background 250ms ease-out;
    }
    .archive-sheet.is-open .archive-sheet__backdrop {
      background: rgba(0, 0, 0, 0.42);
    }
    .archive-sheet__panel {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      max-height: 88vh;
      background: #FFFFFF;
      border-radius: 22px 22px 0 0;
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform 280ms cubic-bezier(0.32, 0.72, 0, 1);
      box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.12);
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .archive-sheet.is-open .archive-sheet__panel {
      transform: translateY(0);
    }
    .archive-sheet__handle {
      width: 36px;
      height: 4px;
      border-radius: 2px;
      background: rgba(0, 0, 0, 0.14);
      margin: 10px auto 0;
      flex-shrink: 0;
    }
    .archive-sheet__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px 4px;
      flex-shrink: 0;
    }
    .archive-sheet__title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }
    .archive-sheet__close {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: transparent;
      border: 0;
      color: var(--text-secondary);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      margin-right: -8px;
    }
    .archive-sheet__close:active { background: rgba(0, 0, 0, 0.05); }
    .archive-sheet__close svg { width: 18px; height: 18px; }
    .archive-sheet__count {
      padding: 0 20px 12px;
      font-size: 12.5px;
      color: var(--text-secondary);
      flex-shrink: 0;
    }
    .archive-sheet__body {
      flex: 1;
      overflow-y: auto;
      padding: 4px 16px 24px;
      -webkit-overflow-scrolling: touch;
    }
    .archive-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .archive-item {
      display: block;
      width: 100%;
      text-align: left;
      background: rgba(0, 0, 0, 0.025);
      border: 0;
      border-radius: 14px;
      padding: 14px 16px;
      cursor: pointer;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
      transition: background-color 120ms ease;
    }
    .archive-item:active { background: rgba(0, 0, 0, 0.06); }
    .archive-item__date {
      font-size: 11.5px;
      color: var(--text-secondary);
      font-weight: 500;
      letter-spacing: 0.01em;
      margin-bottom: 6px;
    }
    .archive-item__title {
      font-size: 14.5px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      line-height: 1.4;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .archive-item__title--loading {
      color: var(--text-placeholder);
      font-weight: 500;
    }
    .archive-item__ref {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .archive-item__emotions {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .archive-item__emotion-chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 3px 8px;
      background: rgba(188, 115, 131, 0.10);
      border-radius: var(--radius-pill);
      font-size: 11.5px;
      color: var(--text-primary);
      font-weight: 500;
    }
    .archive-empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-secondary);
    }
    .archive-empty__emoji {
      font-size: 36px;
      margin-bottom: 12px;
      line-height: 1;
    }
    .archive-empty__title {
      font-size: 14px;
      color: var(--text-primary);
      font-weight: 600;
      margin-bottom: 4px;
    }
    .archive-empty__desc {
      font-size: 12.5px;
      color: var(--text-secondary);
    }

    /* 데스크톱 — 가운데 모달 (max-width 440px) */
    @media (min-width: 768px) {
      .archive-sheet__panel {
        left: 50%;
        right: auto;
        bottom: auto;
        top: 50%;
        max-width: 440px;
        width: calc(100vw - 32px);
        max-height: 80vh;
        border-radius: 18px;
        transform: translate(-50%, calc(-50% + 16px));
        opacity: 0;
        transition: transform 220ms ease-out, opacity 220ms ease-out;
      }
      .archive-sheet.is-open .archive-sheet__panel {
        transform: translate(-50%, -50%);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="app-container app-container--no-nav" id="appContainer">
    <div class="bg-blur" aria-hidden="true"></div>
    <div class="bg-overlay" aria-hidden="true"></div>

   <main class="app-scroll">

    <header class="archive-header">
      <button class="back-btn" id="backBtn" aria-label="뒤로">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <h1 class="archive-title">묵상 달력</h1>
      <button class="header-action-btn" id="openArchiveBtn" aria-label="묵상 모아보기">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <line x1="9" y1="6" x2="20" y2="6"/>
          <line x1="9" y1="12" x2="20" y2="12"/>
          <line x1="9" y1="18" x2="20" y2="18"/>
          <circle cx="4.5" cy="6" r="1.2" fill="currentColor" stroke="none"/>
          <circle cx="4.5" cy="12" r="1.2" fill="currentColor" stroke="none"/>
          <circle cx="4.5" cy="18" r="1.2" fill="currentColor" stroke="none"/>
        </svg>
      </button>
    </header>

    <!-- 스트릭 히어로 카드 — 성장 일러스트 + 응원 메시지 + 지표 -->
    <section class="streak-hero glass-card">
      <div class="streak-hero__illust" id="streakIllust" aria-hidden="true"></div>
      <div class="streak-hero__message" id="streakMessage">오늘도 잘 하고 있어요</div>
      <div class="streak-hero__metrics">
        <div class="streak-metric">
          <span class="streak-metric__value" id="streakTotal">0</span>
          <span class="streak-metric__unit">회 묵상</span>
        </div>
        <div class="streak-metric__divider" aria-hidden="true"></div>
        <div class="streak-metric">
          <span class="streak-metric__value" id="streakCurrent">0</span>
          <span class="streak-metric__unit">일 연속</span>
        </div>
      </div>
    </section>

    <!-- 월 이동 -->
    <nav class="month-nav">
      <button class="month-nav__btn" id="prevMonthBtn" aria-label="이전 달">
        <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <div class="month-nav__label" id="monthLabel">—</div>
      <button class="month-nav__btn" id="nextMonthBtn" aria-label="다음 달">
        <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>
    </nav>

    <!-- 달력 -->
    <section class="calendar glass-card">
      <div class="calendar-weekdays">
        <div class="calendar-weekdays__day calendar-weekdays__day--sun">일</div>
        <div class="calendar-weekdays__day">월</div>
        <div class="calendar-weekdays__day">화</div>
        <div class="calendar-weekdays__day">수</div>
        <div class="calendar-weekdays__day">목</div>
        <div class="calendar-weekdays__day">금</div>
        <div class="calendar-weekdays__day">토</div>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
      <div class="calendar-empty" id="calendarEmpty" style="display: none;">이번 달은 완료 기록이 없어요</div>
    </section>

    <!-- 미선택 안내 카드 (선택 시 숨김) -->
    <div class="calendar-hint glass-card" id="calendarHint">
      🌿 색이 채워진 날을 누르면 그날 묵상을 다시 볼 수 있어요
    </div>

    <!-- 인라인 디테일 카드 (셀 탭 시 표시, archive 디테일 통째로 흡수) -->
    <article class="preview-card glass-card" id="previewCard" aria-live="polite">
      <div class="preview-card__date" id="previewDate">—</div>
      <h2 class="preview-card__title" id="previewTitle">—</h2>
      <div class="preview-card__ref" id="previewRef">—</div>

      <!-- 핵심 요약 -->
      <div class="preview-card__section" id="previewSummarySection" style="display:none;">
        <div class="preview-card__section-label">핵심 요약</div>
        <ul class="preview-card__summary-list" id="previewSummary"></ul>
      </div>

      <!-- 오늘의 마음 -->
      <div class="preview-card__section" id="previewEmotionsSection" style="display:none;">
        <div class="preview-card__section-label">오늘의 마음</div>
        <div class="preview-card__emotions" id="previewEmotions"></div>
      </div>

      <!-- 밑줄 친 구절 -->
      <div class="preview-card__section" id="previewUnderlinesSection" style="display:none;">
        <div class="preview-card__section-label">밑줄 친 구절</div>
        <div id="previewUnderlines"></div>
      </div>

      <!-- 느낀 점 -->
      <div class="preview-card__section" id="previewReflectionSection" style="display:none;">
        <div class="preview-card__section-label">느낀 점</div>
        <div class="preview-card__section-body" id="previewReflection"></div>
      </div>

      <!-- 오늘의 질문 답변 -->
      <div class="preview-card__section" id="previewQuestionsSection" style="display:none;">
        <div class="preview-card__section-label">오늘의 질문</div>
        <div id="previewQuestions"></div>
      </div>

      <!-- 빈 묵상 (기록은 없으나 본문은 있을 때) — 시작하기 버튼 -->
      <button class="btn btn-primary preview-card__start" id="previewStartBtn" style="display:none;">묵상 시작하기</button>
    </article>

   </main>

   <!-- 묵상 모아보기 시트 -->
   <div class="archive-sheet" id="archiveSheet" aria-hidden="true">
     <div class="archive-sheet__backdrop" id="archiveBackdrop"></div>
     <div class="archive-sheet__panel" role="dialog" aria-modal="true" aria-labelledby="archiveSheetTitle">
       <div class="archive-sheet__handle" aria-hidden="true"></div>
       <header class="archive-sheet__header">
         <h2 id="archiveSheetTitle" class="archive-sheet__title">나의 묵상</h2>
         <button class="archive-sheet__close" id="closeArchiveBtn" aria-label="닫기">
           <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
             <line x1="6" y1="6" x2="18" y2="18"/>
             <line x1="6" y1="18" x2="18" y2="6"/>
           </svg>
         </button>
       </header>
       <div class="archive-sheet__count" id="archiveCount" aria-live="polite"></div>
       <div class="archive-sheet__body">
         <ul class="archive-list" id="archiveList"></ul>
         <div class="archive-empty" id="archiveEmpty" style="display:none;">
           <div class="archive-empty__emoji" aria-hidden="true">🌱</div>
           <div class="archive-empty__title">아직 완료한 묵상이 없어요</div>
           <div class="archive-empty__desc">달력에서 오늘 묵상을 시작해 볼까요</div>
         </div>
       </div>
     </div>
   </div>
  </div>

  <!-- Scripts -->
  <script src="../scripts/storage.js"></script>
  <script src="../scripts/common.js"></script>
  <script>
    const EMOTION_MAP = {
      gratitude: { emoji: '🙏', label: '감사' },
      peace:     { emoji: '🕊️', label: '평안' },
      joy:       { emoji: '😊', label: '기쁨' },
      insight:   { emoji: '💡', label: '깨달음' },
      grace:     { emoji: '✨', label: '은혜' },
      hope:      { emoji: '🌱', label: '희망' },
      repent:    { emoji: '😔', label: '회개' },
      sadness:   { emoji: '💧', label: '슬픔' },
      fear:      { emoji: '😟', label: '두려움' },
    };

    const pad2 = (n) => String(n).padStart(2, '0');
    const toLocalISO = (d) =>
      `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
    const shiftISO = (dateISO, delta) => {
      const [y, m, d] = dateISO.split('-').map(Number);
      const dt = new Date(y, m - 1, d);
      dt.setDate(dt.getDate() + delta);
      return toLocalISO(dt);
    };

    const todayLocal = new Date();
    const todayISO = toLocalISO(todayLocal);

    let viewYear = todayLocal.getFullYear();
    let viewMonth = todayLocal.getMonth();

    let completedSet = new Set();

    // ========== 시간대 슬롯 (UI_PRINCIPLES와 동기화) ==========
    function getTimeSlot(hour) {
      if (hour >= 4  && hour < 7)  return 'dawn';
      if (hour >= 7  && hour < 12) return 'morning';
      if (hour >= 12 && hour < 17) return 'afternoon';
      if (hour >= 17 && hour < 22) return 'evening';
      return 'night';
    }

    // ========== 성장 단계 (총 묵상 횟수 → 5단계 SVG) ==========
    // 0~6 씨앗 / 7~13 새싹 / 14~20 성장기 / 21~27 성장기+꽃봉오리 / 28+ 개화
    function getGrowthStage(total) {
      if (total < 7)  return 0; // 씨앗
      if (total < 14) return 1; // 새싹
      if (total < 21) return 2; // 성장기
      if (total < 28) return 3; // 성장기+꽃봉오리
      return 4;                 // 개화
    }
    function getGrowthSVG(stage) {
      const base = (paths) =>
        `<svg width="100%" height="100%" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">${paths}</svg>`;
      switch (stage) {
        case 0: // 씨앗 (떡잎 2장)
          return base(`
            <ellipse cx="22" cy="36" rx="10" ry="2" fill="#D6CFC4"/>
            <path d="M22 35V30" stroke="#BC7383" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M22 31C22 31 19 30 18 28C18 28 21 28 22 30" fill="#7BC0A8"/>
            <path d="M22 31C22 31 25 30 26 28C26 28 23 28 22 30" fill="#7BC0A8"/>
          `);
        case 1: // 새싹 (잎 1쌍)
          return base(`
            <ellipse cx="22" cy="36" rx="10" ry="2" fill="#D6CFC4"/>
            <path d="M22 35V22" stroke="#BC7383" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M22 26C22 26 17 24 14 20C14 20 19 20 22 24" fill="#BC7383"/>
            <path d="M22 26C22 26 27 24 30 20C30 20 25 20 22 24" fill="#7BC0A8"/>
          `);
        case 2: // 성장기 (잎 2쌍)
          return base(`
            <ellipse cx="22" cy="38" rx="11" ry="2" fill="#D6CFC4"/>
            <path d="M22 37V14" stroke="#BC7383" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M22 22C22 22 17 20 14 16C14 16 19 16 22 20" fill="#BC7383"/>
            <path d="M22 22C22 22 27 20 30 16C30 16 25 16 22 20" fill="#7BC0A8"/>
            <path d="M22 30C22 30 17 28 14 24C14 24 19 24 22 28" fill="#BC7383" opacity="0.85"/>
            <path d="M22 30C22 30 27 28 30 24C30 24 25 24 22 28" fill="#7BC0A8" opacity="0.85"/>
          `);
        case 3: // 성장기 + 꽃봉오리
          return base(`
            <ellipse cx="22" cy="38" rx="11" ry="2" fill="#D6CFC4"/>
            <path d="M22 37V12" stroke="#BC7383" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M22 20C22 20 17 18 14 14C14 14 19 14 22 18" fill="#BC7383"/>
            <path d="M22 20C22 20 27 18 30 14C30 14 25 14 22 18" fill="#7BC0A8"/>
            <path d="M22 28C22 28 17 26 14 22C14 22 19 22 22 26" fill="#BC7383" opacity="0.85"/>
            <path d="M22 28C22 28 27 26 30 22C30 22 25 22 22 26" fill="#7BC0A8" opacity="0.85"/>
            <circle cx="22" cy="10" r="3" fill="#F0B8A8" opacity="0.9"/>
          `);
        case 4: // 개화
        default:
          return base(`
            <ellipse cx="22" cy="40" rx="12" ry="2" fill="#D6CFC4"/>
            <path d="M22 39V12" stroke="#BC7383" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M22 18C22 18 17 16 14 12C14 12 19 12 22 16" fill="#BC7383"/>
            <path d="M22 18C22 18 27 16 30 12C30 12 25 12 22 16" fill="#7BC0A8"/>
            <path d="M22 26C22 26 17 24 14 20C14 20 19 20 22 24" fill="#BC7383" opacity="0.9"/>
            <path d="M22 26C22 26 27 24 30 20C30 20 25 20 22 24" fill="#7BC0A8" opacity="0.9"/>
            <path d="M22 33C22 33 17 31 14 27C14 27 19 27 22 31" fill="#BC7383" opacity="0.8"/>
            <path d="M22 33C22 33 27 31 30 27C30 27 25 27 22 31" fill="#7BC0A8" opacity="0.8"/>
            <circle cx="22" cy="10" r="3.5" fill="#F0B8A8"/>
            <circle cx="22" cy="10" r="1.4" fill="#FFFFFF"/>
          `);
      }
    }

    // 잎 한 장 SVG (연속일 아이콘)
    function getLeafSVG() {
      return `<svg width="100%" height="100%" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 24C6 24 5 16 11 10C17 4 25 5 25 5C25 5 26 13 20 19C14 25 6 24 6 24Z" fill="#BC7383"/>
        <path d="M6 24L18 12" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round" opacity="0.85"/>
      </svg>`;
    }

    document.addEventListener('DOMContentLoaded', () => {
      // 시간대 슬롯 적용 (블러 배경 + 톤 분기)
      const slot = getTimeSlot(new Date().getHours());
      document.getElementById('appContainer').setAttribute('data-time-slot', slot);

      document.getElementById('backBtn').addEventListener('click', () => {
        window.location.href = '../index.html';
      });
      document.getElementById('prevMonthBtn').addEventListener('click', () => {
        viewMonth--;
        if (viewMonth < 0) { viewMonth = 11; viewYear--; }
        clearSelection();
        renderMonth();
      });
      document.getElementById('nextMonthBtn').addEventListener('click', () => {
        if (isViewingThisMonthOrLater()) return;
        viewMonth++;
        if (viewMonth > 11) { viewMonth = 0; viewYear++; }
        clearSelection();
        renderMonth();
      });

      document.getElementById('calendarGrid').addEventListener('click', (e) => {
        const btn = e.target.closest('button.calendar-cell');
        if (!btn) return;
        selectDate(btn.getAttribute('data-date'), btn);
      });

      // 묵상 모아보기 시트
      document.getElementById('openArchiveBtn').addEventListener('click', openArchiveSheet);
      document.getElementById('closeArchiveBtn').addEventListener('click', closeArchiveSheet);
      document.getElementById('archiveBackdrop').addEventListener('click', closeArchiveSheet);
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && document.getElementById('archiveSheet').classList.contains('is-open')) {
          closeArchiveSheet();
        }
      });
      document.getElementById('archiveList').addEventListener('click', (e) => {
        const btn = e.target.closest('button.archive-item');
        if (!btn) return;
        const date = btn.getAttribute('data-date');
        closeArchiveSheet();
        // 시트 닫힘 애니메이션 끝난 뒤 점프 (스크롤이 자연스럽게 보이도록)
        setTimeout(() => jumpToDate(date), 280);
      });

      renderStreak();
      completedSet = collectCompletedDates();
      renderMonth();
    });

    // ========== 묵상 모아보기 ==========
    let archiveRendered = false;

    function openArchiveSheet() {
      const sheet = document.getElementById('archiveSheet');
      sheet.classList.add('is-open');
      sheet.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      if (!archiveRendered) {
        renderArchiveList();
        archiveRendered = true;
      }
    }

    function closeArchiveSheet() {
      const sheet = document.getElementById('archiveSheet');
      sheet.classList.remove('is-open');
      sheet.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }

    function formatArchiveDate(dateISO) {
      const [y, m, d] = dateISO.split('-').map(Number);
      const dt = new Date(y, m - 1, d);
      const days = ['일', '월', '화', '수', '목', '금', '토'];
      return `${y}.${pad2(m)}.${pad2(d)} · ${days[dt.getDay()]}요일`;
    }

    async function renderArchiveList() {
      const dates = [...completedSet].sort((a, b) => b.localeCompare(a));
      const list = document.getElementById('archiveList');
      const empty = document.getElementById('archiveEmpty');
      const countEl = document.getElementById('archiveCount');

      if (dates.length === 0) {
        list.innerHTML = '';
        empty.style.display = '';
        countEl.textContent = '';
        return;
      }
      empty.style.display = 'none';
      countEl.textContent = `총 ${dates.length}개의 묵상`;

      // 1차: 스켈레톤 즉시 렌더
      list.innerHTML = dates.map(date => `
        <li><button type="button" class="archive-item" data-date="${date}">
          <div class="archive-item__date">${formatArchiveDate(date)}</div>
          <div class="archive-item__title archive-item__title--loading">불러오는 중…</div>
        </button></li>
      `).join('');

      // 2차: 본문/감정 비동기 로드 후 교체
      const items = await Promise.all(dates.map(async (date) => {
        let qt = null;
        try { qt = await Common.loadJSON(`../../data/qt/${date}.json`); } catch (e) { /* 무시 */ }
        let record = {};
        try { record = Storage.getDailyRecord(date) || {}; } catch (e) { /* 무시 */ }
        return { date, qt, record };
      }));

      list.innerHTML = items.map(({ date, qt, record }) => {
        const title = (qt && qt.title) ? qt.title : '말씀 묵상';
        const ref = (qt && qt.scripture_ref) ? qt.scripture_ref : '';
        const emotionChips = (record.emotions || [])
          .map(id => EMOTION_MAP[id])
          .filter(Boolean)
          .map(e => `<span class="archive-item__emotion-chip"><span>${e.emoji}</span><span>${escapeHTML(e.label)}</span></span>`)
          .join('');
        return `
          <li><button type="button" class="archive-item" data-date="${date}">
            <div class="archive-item__date">${formatArchiveDate(date)}</div>
            <div class="archive-item__title">${escapeHTML(title)}</div>
            ${ref ? `<div class="archive-item__ref">${escapeHTML(ref)}</div>` : ''}
            ${emotionChips ? `<div class="archive-item__emotions">${emotionChips}</div>` : ''}
          </button></li>
        `;
      }).join('');
    }

    function jumpToDate(dateISO) {
      const [y, m] = dateISO.split('-').map(Number);
      if (y !== viewYear || (m - 1) !== viewMonth) {
        viewYear = y;
        viewMonth = m - 1;
        clearSelection();
        renderMonth();
      }
      const cellEl = document.querySelector(`.calendar-cell[data-date="${dateISO}"]`);
      if (cellEl && typeof cellEl.click === 'function') {
        // selectDate가 cellEl 인자를 직접 사용하므로 함수 호출
        selectDate(dateISO, cellEl);
      }
    }

    function renderStreak() {
      let total = 0, current = 0;
      try {
        if (typeof Storage !== 'undefined' && typeof Storage.getStreak === 'function') {
          const s = Storage.getStreak();
          total = s.totalCompleted ?? 0;
          current = s.current ?? 0;
        }
      } catch (e) {
        console.warn('renderStreak: Storage 접근 실패', e);
      }
      document.getElementById('streakTotal').textContent = total;
      document.getElementById('streakCurrent').textContent = current;
      document.getElementById('streakIllust').innerHTML = getGrowthSVG(getGrowthStage(total));
      document.getElementById('streakMessage').textContent = getStreakMessage(total, current);
    }

    function getStreakMessage(total, current) {
      if (current === 0 && total === 0) return '첫 묵상을 시작해 볼까요';
      if (current === 0 && total > 0)   return '다시 시작해 볼까요';
      if (current >= 1 && current < 3)  return '오늘도 잘 하고 있어요';
      if (current >= 3 && current < 7)  return `${current}일째 이어가는 중이에요`;
      if (current >= 7 && current < 30) return `${current}일째 — 정말 멋져요`;
      return `${current}일 — 묵상이 일상이 되었어요`;
    }

    function collectCompletedDates() {
      const allDates = new Set();
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        const m = key && key.match(/^records\.(\d{4}-\d{2}-\d{2})\./);
        if (m) allDates.add(m[1]);
      }
      const completed = new Set();
      allDates.forEach(date => {
        try {
          const r = Storage.getDailyRecord(date);
          if (r.completed || r.progressStep === 5) completed.add(date);
        } catch (e) { /* 무시 */ }
      });
      return completed;
    }

    function isViewingThisMonthOrLater() {
      return viewYear > todayLocal.getFullYear()
        || (viewYear === todayLocal.getFullYear() && viewMonth >= todayLocal.getMonth());
    }

    function renderMonth() {
      document.getElementById('monthLabel').textContent =
        `${viewYear}년 ${viewMonth + 1}월`;
      document.getElementById('nextMonthBtn').disabled = isViewingThisMonthOrLater();

      const firstDay = new Date(viewYear, viewMonth, 1).getDay();
      const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

      const cells = [];

      for (let i = 0; i < firstDay; i++) {
        cells.push('<div class="calendar-cell calendar-cell--empty"></div>');
      }

      let monthHasCompleted = false;
      for (let d = 1; d <= daysInMonth; d++) {
        const dateISO = `${viewYear}-${pad2(viewMonth + 1)}-${pad2(d)}`;
        const dayOfWeek = (firstDay + d - 1) % 7;
        const isFuture = dateISO > todayISO;
        const isToday = dateISO === todayISO;
        const isCompleted = completedSet.has(dateISO);
        const isSunday = dayOfWeek === 0;
        const isSaturday = dayOfWeek === 6;

        const classes = ['calendar-cell'];
        if (isFuture) classes.push('calendar-cell--future');
        if (isToday) classes.push('calendar-cell--today');
        if (isSunday) classes.push('calendar-cell--sun');

        if (isCompleted) {
          monthHasCompleted = true;
          classes.push('calendar-cell--completed');
          // 같은 주 내 인접일이 완료면 streak 연결 (일요일=주 시작/토요일=주 끝에서 끊김)
          if (!isSunday   && completedSet.has(shiftISO(dateISO, -1))) {
            classes.push('calendar-cell--streak-left');
          }
          if (!isSaturday && completedSet.has(shiftISO(dateISO, +1))) {
            classes.push('calendar-cell--streak-right');
          }
        }

        if (!isFuture) {
          cells.push(
            `<button type="button" class="${classes.join(' ')}" data-date="${dateISO}" aria-label="${dateISO}${isCompleted ? ' 완료' : ''}"><span>${d}</span></button>`
          );
        } else {
          cells.push(`<div class="${classes.join(' ')}">${d}</div>`);
        }
      }

      document.getElementById('calendarGrid').innerHTML = cells.join('');
      document.getElementById('calendarEmpty').style.display =
        monthHasCompleted ? 'none' : 'block';
    }

    async function selectDate(date, cellEl) {
      // 셀 시각적 선택 갱신
      document.querySelectorAll('.calendar-cell--selected')
        .forEach(el => el.classList.remove('calendar-cell--selected'));
      cellEl.classList.add('calendar-cell--selected');

      const record = Storage.getDailyRecord(date);
      const isCompleted = record.completed || record.progressStep === 5;
      const qt = await Common.loadJSON(`../../data/qt/${date}.json`);

      // 본문도 없고 기록도 없으면 미리보기 닫기 (안내 카드 다시 표시)
      if (!qt && !isCompleted) {
        clearSelection();
        return;
      }

      // 미선택 안내 숨김
      document.getElementById('calendarHint').classList.add('is-hidden');

      // 날짜/제목/구절
      const [y, mo, d] = date.split('-').map(Number);
      document.getElementById('previewDate').textContent =
        Common.formatKoreanDate(new Date(y, mo - 1, d)) + (isCompleted ? ' · 완료' : '');
      document.getElementById('previewTitle').textContent =
        qt?.title || '(말씀 제목 준비 중)';
      document.getElementById('previewRef').textContent =
        qt?.scripture_ref || '';

      // === 5개 섹션 렌더 (archive에서 흡수) ===
      const startBtn = document.getElementById('previewStartBtn');

      if (isCompleted) {
        renderSummary(qt);
        renderEmotions(record);
        renderUnderlines(record);
        renderReflection(record);
        renderQuestions(qt, record);
        startBtn.style.display = 'none';
      } else {
        // 기록 없음 + 본문 있음: 본문만 보여주고 시작 버튼
        hideAllSections();
        renderSummary(qt); // 핵심 요약은 본문이 있으면 보여줘도 됨
        startBtn.style.display = '';
        startBtn.onclick = () => {
          sessionStorage.setItem('qtDate', date);
          window.location.href = '../qt/step-1-scripture.html';
        };
      }

      const card = document.getElementById('previewCard');
      card.classList.add('is-visible');
      setTimeout(() => {
        card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 50);
    }

    function hideAllSections() {
      ['previewSummarySection','previewEmotionsSection','previewUnderlinesSection',
       'previewReflectionSection','previewQuestionsSection']
        .forEach(id => document.getElementById(id).style.display = 'none');
    }

    function renderSummary(qt) {
      const items = (qt?.core_summary || []).slice(0, 3);
      const sec = document.getElementById('previewSummarySection');
      if (items.length === 0) { sec.style.display = 'none'; return; }
      document.getElementById('previewSummary').innerHTML =
        items.map(s => `<li>${escapeHTML(s)}</li>`).join('');
      sec.style.display = '';
    }

    function renderEmotions(record) {
      const sec = document.getElementById('previewEmotionsSection');
      const chips = (record.emotions || [])
        .map(id => EMOTION_MAP[id])
        .filter(Boolean)
        .map(e => `<span class="preview-emotion-chip"><span>${e.emoji}</span><span>${escapeHTML(e.label)}</span></span>`);
      if (chips.length === 0) { sec.style.display = 'none'; return; }
      document.getElementById('previewEmotions').innerHTML = chips.join('');
      sec.style.display = '';
    }

    function renderUnderlines(record) {
      const sec = document.getElementById('previewUnderlinesSection');
      const lines = Array.isArray(record.underlines) ? record.underlines : [];
      if (lines.length === 0) { sec.style.display = 'none'; return; }
      const html = lines.map(ul => {
        const note = ul.note && ul.note.trim()
          ? `<div class="preview-card__underline-note">${escapeHTML(ul.note)}</div>`
          : '';
        return `<div class="preview-card__underline">
          ${escapeHTML(ul.text || '')}<span class="preview-card__underline-verse">${ul.verse}절</span>
          ${note}
        </div>`;
      }).join('');
      document.getElementById('previewUnderlines').innerHTML = html;
      sec.style.display = '';
    }

    function renderReflection(record) {
      const sec = document.getElementById('previewReflectionSection');
      const text = (record.reflection || record.memo || '').trim();
      if (!text) { sec.style.display = 'none'; return; }
      document.getElementById('previewReflection').textContent = text;
      sec.style.display = '';
    }

    function renderQuestions(qt, record) {
      const sec = document.getElementById('previewQuestionsSection');
      const answers = Array.isArray(record.questionAnswers) ? record.questionAnswers : [];
      const questions = Array.isArray(qt?.oryun_questions) ? qt.oryun_questions : [];
      const hasAnswers = answers.some(a => a && a.trim());
      if (!hasAnswers) { sec.style.display = 'none'; return; }
      const html = answers.map((a, i) => {
        if (!a || !a.trim()) return '';
        const qText = questions[i] || '';
        return `<div class="preview-card__question">
          ${qText ? `<div class="preview-card__section-q">Q${i + 1}. ${escapeHTML(qText)}</div>` : `<div class="preview-card__section-q">Q${i + 1}</div>`}
          <div class="preview-card__section-body">${escapeHTML(a)}</div>
        </div>`;
      }).join('');
      document.getElementById('previewQuestions').innerHTML = html;
      sec.style.display = '';
    }

    function clearSelection() {
      document.getElementById('previewCard').classList.remove('is-visible');
      document.getElementById('calendarHint').classList.remove('is-hidden');
      hideAllSections();
    }

    function escapeHTML(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
  </script>
</body>
</html>
