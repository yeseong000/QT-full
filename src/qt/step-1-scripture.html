<!DOCTYPE html>
<html lang="ko" data-font-size="md">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1">
  <meta name="theme-color" content="#F0F4F2">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="주만나 AI">
  <meta name="format-detection" content="telephone=no">

  <title>말씀 · 주만나</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
  <link rel="stylesheet" href="../styles/design-tokens.css">
  <link rel="stylesheet" href="../styles/common.css">

  <style>
    /* ========== 1단계 전용 ========== */

    /* 성경 본문 */
    .scripture-ref {
      font-size: var(--text-small);
      color: var(--text-secondary);
      padding-bottom: var(--space-4);
      border-bottom: 1px solid var(--border-subtle);
      margin-bottom: var(--space-4);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .version-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      background: var(--bg-soft);
      color: var(--accent-sage-text);
      border-radius: var(--radius-pill);
      font-size: 12px;
      font-weight: 600;
    }

    .verse-line {
      font-size: var(--text-scripture);
      line-height: 1.85;
      color: var(--text-body);
      padding: var(--space-3) 0;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
    }
    .verse-line + .verse-line {
      border-top: 1px solid var(--border-subtle);
    }
    .verse-number {
      font-weight: 700;
      color: var(--accent-sage);
      margin-right: 6px;
      font-size: 15px;
      user-select: none;
    }

    .verse-text {
      padding: 1px 2px;
    }
    .is-highlighted .verse-text {
      background: rgba(245, 185, 66, 0.28);
      -webkit-box-decoration-break: clone;
      box-decoration-break: clone;
      border-radius: 3px;
    }

    /* 바텀시트 (메모 작성) */
    .bottom-sheet-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--duration-base);
    }
    .bottom-sheet-backdrop.visible {
      opacity: 1;
      pointer-events: auto;
    }
    .bottom-sheet {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 210;
      background: var(--bg-card);
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
      padding: 12px 20px calc(20px + env(safe-area-inset-bottom));
      box-shadow: 0 -8px 24px rgba(0, 0, 0, 0.12);
      transform: translateY(100%);
      transition: transform var(--duration-slow) var(--ease-out);
    }
    .bottom-sheet.is-open {
      transform: translateY(0);
    }
    .bottom-sheet__handle {
      width: 40px;
      height: 4px;
      background: var(--border-chip);
      border-radius: 2px;
      margin: 0 auto 14px;
    }
    .bottom-sheet__title {
      font-size: var(--text-h2);
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: var(--space-2);
    }
    .bottom-sheet__quote {
      font-size: var(--text-small);
      color: var(--text-secondary);
      margin-bottom: var(--space-4);
      padding: 10px 14px;
      background: var(--highlight-underline);
      border-radius: var(--radius-sm);
      line-height: 1.5;
      max-height: 96px;
      overflow-y: auto;
    }
    .bottom-sheet__textarea {
      width: 100%;
      min-height: 120px;
      max-height: 240px;
      padding: 14px;
      background: var(--bg-soft);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      font-family: inherit;
      font-size: var(--text-body);
      line-height: 1.6;
      color: var(--text-body);
      resize: none;
      box-sizing: border-box;
      outline: none;
      transition: border-color var(--duration-base);
    }
    .bottom-sheet__textarea:focus {
      border-color: var(--accent-sage);
    }
    .bottom-sheet__actions {
      display: flex;
      gap: 10px;
      margin-top: var(--space-4);
    }
    .bottom-sheet__actions .btn {
      flex: 1;
    }

    /* 토스트 (간단 안내) — 테마별 카드 톤으로 자연스럽게 */
    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(110px + env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(20px);
      padding: 12px 18px;
      background: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border-subtle);
      box-shadow: var(--shadow-float);
      border-radius: var(--radius-pill);
      font-size: var(--text-small);
      z-index: 300;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--duration-base), transform var(--duration-base);
      white-space: nowrap;
    }
    .toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* FAB — 하이라이트 모드 활성화 상태 */
    .fab.is-active {
      background: var(--accent-sage);
      color: #fff;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.22);
    }

    /* FAB 툴팁 (app-container 내부 absolute) — 테마별 카드 톤 */
    .fab-tooltip {
      position: absolute;
      right: 20px;
      bottom: 196px;
      padding: 10px 14px;
      background: var(--bg-card);
      color: var(--text-primary);
      border: 1px solid var(--border-subtle);
      box-shadow: var(--shadow-float);
      border-radius: var(--radius-md);
      font-size: var(--text-small);
      z-index: 60;
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: all var(--duration-slow);
    }
    .fab-tooltip.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .fab-tooltip::after {
      content: '';
      position: absolute;
      bottom: -6px;
      right: 22px;
      width: 10px;
      height: 10px;
      background: var(--bg-card);
      border-right: 1px solid var(--border-subtle);
      border-bottom: 1px solid var(--border-subtle);
      transform: rotate(45deg);
    }
  </style>
</head>
<body>
  <div class="app-container">
   <main class="app-scroll">

    <!-- 상단바 (X · 진행 단계 1/4) -->
    <header class="top-bar">
      <div class="top-bar__left">
        <button class="icon-btn" id="closeBtn" aria-label="닫기">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="progress-dots" aria-label="진행 단계 1/4">
        <div class="progress-dot active"></div>
        <div class="progress-dot"></div>
        <div class="progress-dot"></div>
        <div class="progress-dot"></div>
      </div>
      <div class="top-bar__right" style="width: 44px;"></div>
    </header>

    <!-- 페이지 제목 -->
    <h1 class="page-title">말씀을 깊이 새겨보세요</h1>

    <!-- 성경 본문 카드 -->
    <section class="card" id="scriptureCard">
      <div class="scripture-ref">
        <span id="scriptureRef">—</span>
        <span class="version-badge">개역개정</span>
      </div>
      <div id="versesContainer">
        <div class="loading">말씀을 불러오고 있어요...</div>
      </div>
    </section>

   </main>

   <!-- 플로팅 버튼 (밑줄 긋기) - app-container 내부 absolute -->
   <button class="fab" id="highlightFab" aria-label="밑줄 긋기">
     <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
       <path d="M12 20h9"/>
       <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
     </svg>
   </button>

   <!-- FAB 툴팁 (최초 1회만) -->
   <div class="fab-tooltip" id="fabTooltip">
     아이콘을 탭해 하이라이트 모드를 켜고, 구절을 탭해보세요
   </div>

   <!-- 토스트 -->
   <div class="toast" id="toast" role="status" aria-live="polite"></div>

   <!-- 하단 네비 (app-container 내부) -->
   <nav class="bottom-nav">
     <button class="btn btn-secondary btn-icon-only" id="prevBtn" aria-label="이전">
       <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
         <polyline points="15 18 9 12 15 6"/>
       </svg>
     </button>
     <button class="btn btn-primary" id="nextBtn">다음</button>
   </nav>

  </div>

  <!-- 바텀시트 백드롭 + 메모 입력 (body 직속, position: fixed) -->
  <div class="bottom-sheet-backdrop" id="bottomSheetBackdrop"></div>
  <div class="bottom-sheet" id="memoSheet" role="dialog" aria-modal="true" aria-labelledby="memoSheetTitle">
    <div class="bottom-sheet__handle"></div>
    <div class="bottom-sheet__title" id="memoSheetTitle">메모 작성</div>
    <div class="bottom-sheet__quote" id="memoSheetQuote"></div>
    <textarea
      class="bottom-sheet__textarea"
      id="memoSheetTextarea"
      placeholder="이 구절에서 느낀 점을 적어보세요..."
      maxlength="500"
    ></textarea>
    <div class="bottom-sheet__actions">
      <button type="button" class="btn btn-secondary" id="memoSheetCancel">취소</button>
      <button type="button" class="btn btn-primary" id="memoSheetSave">저장</button>
    </div>
  </div>

  <!-- Scripts -->
  <script src="../scripts/storage.js"></script>
  <script src="../scripts/common.js"></script>
  <script>
    const TODAY = sessionStorage.getItem('qtDate') || Common.todayISO();
    const HAS_EXPLICIT_DATE = !!sessionStorage.getItem('qtDate');

    document.addEventListener('DOMContentLoaded', async () => {
      await loadScripture();
      setupEventListeners();
      applyFontSize();
      Common.applyFontStyle();
      showFabTooltipIfFirst();
      // 진행 상태 저장
      Storage.setDailyRecord(TODAY, { progressStep: 1 });
    });

    // ========== 말씀 로드 ==========
    async function loadScripture() {
      let qt = await Common.loadJSON(`../../data/qt/${TODAY}.json`);
      if (!qt && !HAS_EXPLICIT_DATE) {
        for (let i = 1; i <= 3; i++) {
          const d = new Date(new Date().toLocaleDateString('sv-SE', { timeZone: 'Asia/Seoul' }));
          d.setDate(d.getDate() - i);
          const fallbackDate = d.toLocaleDateString('sv-SE');
          qt = await Common.loadJSON(`../../data/qt/${fallbackDate}.json`);
          if (qt) break;
        }
      }

      if (!qt) {
        document.getElementById('versesContainer').innerHTML =
          '<div class="error">말씀을 불러올 수 없어요.</div>';
        return;
      }

      document.getElementById('scriptureRef').textContent = qt.scripture_ref;
      document.title = `${qt.title} · 주만나`;

      const container = document.getElementById('versesContainer');
      container.innerHTML = qt.verses.map(v => `
        <div class="verse-line" data-verse="${v.number}">
          <span class="verse-number">${v.number}</span><span class="verse-text" data-verse-text="${v.number}">${escapeHTML(v.text)}</span>
        </div>
      `).join('');

      // 저장된 하이라이트 복원
      restoreUnderlines();
    }

    function escapeHTML(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // ========== 이벤트 ==========
    function setupEventListeners() {
      // 닫기 → 홈
      document.getElementById('closeBtn').addEventListener('click', () => {
        window.location.href = '../index.html';
      });

      // 이전 → 홈
      document.getElementById('prevBtn').addEventListener('click', () => {
        window.location.href = '../index.html';
      });

      // 다음 → 2단계
      document.getElementById('nextBtn').addEventListener('click', () => {
        Storage.setDailyRecord(TODAY, { progressStep: 2 });
        window.location.href = 'step-2-meditation.html';
      });

      // FAB 클릭 → 하이라이트 모드 토글
      document.getElementById('highlightFab').addEventListener('click', () => {
        highlightModeActive = !highlightModeActive;
        document.getElementById('highlightFab').classList.toggle('is-active', highlightModeActive);
        showToast(highlightModeActive ? '하이라이트 모드 켜짐 — 구절을 탭해보세요' : '하이라이트 모드 꺼짐');
      });

      setupHighlightInteractions();
    }

    // ========================================================================
    // 하이라이트(밑줄 + 메모) 기능
    // ========================================================================

    let activeHighlightId = null;
    let highlightModeActive = false;

    function setupHighlightInteractions() {
      const versesContainer = document.getElementById('versesContainer');
      const memoSheet = document.getElementById('memoSheet');
      const backdrop = document.getElementById('bottomSheetBackdrop');
      let longPressTimer = null;
      let longPressTriggered = false;

      // 하이라이트된 절 길게 누르기 → 메모 시트
      versesContainer.addEventListener('touchstart', (e) => {
        const verseLine = e.target.closest('.verse-line');
        if (!highlightModeActive || !verseLine || !verseLine.classList.contains('is-highlighted')) return;
        longPressTriggered = false;
        longPressTimer = setTimeout(() => {
          longPressTriggered = true;
          openMemoSheet(parseInt(verseLine.dataset.verse, 10));
        }, 500);
      }, { passive: true });

      const cancelLongPress = () => { clearTimeout(longPressTimer); longPressTimer = null; };
      versesContainer.addEventListener('touchend', cancelLongPress);
      versesContainer.addEventListener('touchmove', cancelLongPress);

      // 절 탭 → 하이라이트 토글 (하이라이트 모드일 때만)
      versesContainer.addEventListener('click', (e) => {
        if (longPressTriggered) { longPressTriggered = false; return; }
        if (!highlightModeActive) return;
        const verseLine = e.target.closest('.verse-line');
        if (!verseLine) return;
        const verseNum = parseInt(verseLine.dataset.verse, 10);
        const isOn = verseLine.classList.toggle('is-highlighted');
        if (isOn) {
          Storage.addUnderline(TODAY, {
            id: crypto.randomUUID(),
            verse: verseNum,
            note: '',
            createdAt: new Date().toISOString(),
          });
          showToast('하이라이트했어요');
        } else {
          const target = Storage.getUnderlines(TODAY).find(u => u.verse === verseNum);
          if (target) Storage.removeUnderline(TODAY, target.id);
          showToast('하이라이트를 지웠어요');
        }
      });

      document.getElementById('memoSheetCancel').addEventListener('click', closeMemoSheet);
      document.getElementById('memoSheetSave').addEventListener('click', saveMemo);
      backdrop.addEventListener('click', closeMemoSheet);

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && memoSheet.classList.contains('is-open')) closeMemoSheet();
      });
    }

    // ====== 저장된 하이라이트 복원 ======
    function restoreUnderlines() {
      Storage.getUnderlines(TODAY).forEach(ul => {
        const verseLine = document.querySelector(`.verse-line[data-verse="${ul.verse}"]`);
        if (verseLine) verseLine.classList.add('is-highlighted');
      });
    }

    // ====== 메모 시트 ======
    function openMemoSheet(verseNum) {
      const ul = Storage.getUnderlines(TODAY).find(u => u.verse === verseNum);
      if (!ul) return;

      activeHighlightId = ul.id;
      const verseText = document.querySelector(
        `.verse-line[data-verse="${verseNum}"] .verse-text`
      )?.textContent?.trim() || '';
      document.getElementById('memoSheetQuote').textContent = `${verseNum}절 · "${verseText}"`;
      const ta = document.getElementById('memoSheetTextarea');
      ta.value = ul.note || '';

      document.getElementById('bottomSheetBackdrop').classList.add('visible');
      document.getElementById('memoSheet').classList.add('is-open');
      setTimeout(() => ta.focus(), 250);
    }

    function closeMemoSheet() {
      document.getElementById('bottomSheetBackdrop').classList.remove('visible');
      document.getElementById('memoSheet').classList.remove('is-open');
      activeHighlightId = null;
    }

    function saveMemo() {
      if (!activeHighlightId) { closeMemoSheet(); return; }
      const note = document.getElementById('memoSheetTextarea').value.trim();
      Storage.updateUnderline(TODAY, activeHighlightId, { note });
      closeMemoSheet();
      showToast(note ? '메모를 저장했어요' : '메모를 비웠어요');
    }

    // ====== 토스트 ======
    let toastTimer = null;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('visible');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('visible'), 1800);
    }

    // ========== 폰트 크기 (설정에서 변경, 여기서는 적용만) ==========
    function applyFontSize() {
      const size = Storage.getSettings().fontSize;
      document.documentElement.setAttribute('data-font-size', size);
    }

    // ========== FAB 툴팁 (최초 1회만) ==========
    function showFabTooltipIfFirst() {
      const shown = Storage.get('tooltip.fabShown');
      if (shown) return;

      const tooltip = document.getElementById('fabTooltip');
      setTimeout(() => {
        tooltip.classList.add('visible');
      }, 1500);
      setTimeout(() => {
        tooltip.classList.remove('visible');
        Storage.set('tooltip.fabShown', true);
      }, 6000);
    }
  </script>
</body>
</html>
