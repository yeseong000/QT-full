<!DOCTYPE html>
<html lang="ko" data-font-size="md">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1">
  <meta name="theme-color" content="#F0F4F2">

  <!-- PWA (Android/Chrome) -->
  <link rel="manifest" href="../manifest.json">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="함께 만나">
  <meta name="format-detection" content="telephone=no">
  <link rel="apple-touch-icon" href="../images/Icon.png">
  <link rel="icon" type="image/png" href="../images/Icon.png">

  <title>묵상 · 주만나</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
  <link rel="stylesheet" href="../styles/design-tokens.css?v=20260603-66fea44">
  <link rel="stylesheet" href="../styles/common.css?v=20260603-66fea44">

  <!-- ★ 첫 페인트 전: 시간대 결정 → html[data-time-slot] 주입 -->
  <script>
    (function () {
      var hour = new Date().getHours();
      var slot = (hour >= 4  && hour < 7)  ? 'dawn'
               : (hour >= 7  && hour < 12) ? 'morning'
               : (hour >= 12 && hour < 17) ? 'afternoon'
               : (hour >= 17 && hour < 22) ? 'evening'
               : 'night';
      document.documentElement.setAttribute('data-time-slot', slot);
      // 시스템 주소창/상태바 색을 본문 시간대 색과 일치시킴 (PWA에서 상단 색 어긋남 제거).
      // data-uses-time-slot 신호 → common.js의 applyTheme이 meta theme-color를 덮어쓰지 않음.
      var SLOT_COLOR = { dawn:'#E5D0C0', morning:'#EFE6CD', afternoon:'#ECE3D2', evening:'#F5C672', night:'#2A3A5C' };
      document.documentElement.setAttribute('data-uses-time-slot', 'true');
      var meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.setAttribute('content', SLOT_COLOR[slot]);

      // ★ PWA 모드 감지 — first paint 전 html.is-pwa 부착 (common.js 캐시/지연 로딩 우회).
      // iOS 26은 display-mode: standalone이 false 반환(browser로 잡힘) → navigator.standalone OR로 체크.
      if (window.matchMedia('(display-mode: standalone)').matches || navigator.standalone === true) {
        document.documentElement.classList.add('is-pwa');
      }
    })();
  </script>

  <style>
    /* ========== 시간대별 단일 배경색 (PNG dominant 대표색) ========== */
    html[data-time-slot="dawn"]      body { background-color: #E5D0C0; }
    html[data-time-slot="morning"]   body { background-color: #EFE6CD; }
    html[data-time-slot="afternoon"] body { background-color: #ECE3D2; }
    html[data-time-slot="evening"]   body { background-color: #F5C672; }
    html[data-time-slot="night"]     body { background-color: #131B2E; }
    /* step 페이지: common.css의 ambient mesh 그라데이션 끔 — 시간대 단색으로 깔끔하게 */
    html[data-time-slot] body { background-image: none; }
    html[data-time-slot="night"] { color: #FFFFFF; }
    html[data-time-slot="night"] .page-title { color: #FFFFFF; }
    html[data-time-slot="night"] .icon-btn { color: rgba(255, 255, 255, 0.92); }
    html[data-time-slot="night"] .progress-dot { background: rgba(255, 255, 255, 0.30); }
    html[data-time-slot="night"] .progress-dot.active { background: #A8B5D0; }
    html[data-time-slot="night"] .card,
    html[data-time-slot="night"] .meditation-card {
      background: #232F4B;
      border: 1px solid rgba(126, 150, 196, 0.18);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5);
    }
    /* 밤: 인물 이름표가 카드색(#232F4B)과 비슷한 sage-soft라 묻힘 → 밝은 페리윙클 칩 + 링으로 띄움 */
    html[data-time-slot="night"] .character__name {
      background: rgba(120, 144, 184, 0.30);
      color: #DCE3F0;
      box-shadow: inset 0 0 0 1px rgba(168, 181, 208, 0.28);
    }

    /* ========== 2단계 전용 ========== */

    /* ------------------------------------------------------------------
       말씀 토글 (sticky 떠있는 캡슐)
       ------------------------------------------------------------------ */
    .scripture-toggle {
      position: sticky;
      top: var(--space-2);      /* 상단에서 8px 띄워서 "떠있는" 느낌 */
      z-index: 20;
      margin-bottom: var(--space-6);
    }

    .scripture-toggle__header {
      position: relative;        /* z-index 활성화 — 펼침 시 ::before 위로 띄움 */
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      padding: 10px 16px 10px 14px;
      /* iOS material — milky white로 두면 saturate(180%)가 뒤 색감을 살림 (vibrancy) */
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-radius: var(--radius-pill);
      /* 다층 그림자: top highlight(빛 반사) + 가까운 그림자(선명) + 먼 그림자(부드러움) */
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.8),
        0 1px 2px rgba(45, 58, 50, 0.04),
        0 6px 16px rgba(45, 58, 50, 0.08);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      transition: box-shadow var(--duration-base), transform var(--duration-fast), background var(--duration-base);
    }
    .scripture-toggle__header:active {
      transform: scale(0.98);
    }
    /* 펼침 시 — solid + 깊이 있는 다층 그림자로 진짜 "떠 있는" 느낌 */
    .scripture-toggle.is-open .scripture-toggle__header {
      background: #FFFFFF;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.9),
        0 1px 2px rgba(45, 58, 50, 0.05),
        0 2px 6px rgba(45, 58, 50, 0.06),
        0 8px 24px rgba(45, 58, 50, 0.12);
    }

    /* 다크 테마: iOS dark material — saturate로 뒤 색감 살리고 다층 그림자 */
    html[data-theme="dark"] .scripture-toggle__header {
      background: rgba(35, 38, 41, 0.78);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.06),
        inset 0 0 0 1px rgba(110, 132, 168, 0.10),
        0 1px 2px rgba(0, 0, 0, 0.20),
        0 6px 16px rgba(0, 0, 0, 0.30);
    }
    html[data-theme="dark"] .scripture-toggle.is-open .scripture-toggle__header {
      background: var(--bg-card);
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        inset 0 0 0 1px rgba(110, 132, 168, 0.22),
        0 1px 2px rgba(0, 0, 0, 0.25),
        0 8px 24px rgba(0, 0, 0, 0.42);
    }

    /* 글래스 백드롭 — 모바일은 일반 웹사이트 흐름 존중 (display:none),
       PC(≥744px)만 sticky pill과 자연스럽게 어울리는 blur backdrop 활성 */
    .scripture-backdrop { display: none; }
    @media (min-width: 744px) {
      .scripture-backdrop {
        display: block;
        position: fixed;
        inset: 0;
        background: rgba(45, 58, 50, 0.04);
        backdrop-filter: blur(0px);
        -webkit-backdrop-filter: blur(0px);
        z-index: 15;
        pointer-events: none;
        opacity: 0;
        visibility: hidden;
        transition:
          opacity 320ms cubic-bezier(0.32, 0.72, 0, 1),
          backdrop-filter 320ms cubic-bezier(0.32, 0.72, 0, 1),
          -webkit-backdrop-filter 320ms cubic-bezier(0.32, 0.72, 0, 1),
          background 320ms cubic-bezier(0.32, 0.72, 0, 1),
          visibility 0s linear 320ms;
      }
      .scripture-backdrop.is-active {
        opacity: 1;
        visibility: visible;
        background: rgba(45, 58, 50, 0.10);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        transition:
          opacity 320ms cubic-bezier(0.32, 0.72, 0, 1),
          backdrop-filter 320ms cubic-bezier(0.32, 0.72, 0, 1),
          -webkit-backdrop-filter 320ms cubic-bezier(0.32, 0.72, 0, 1),
          background 320ms cubic-bezier(0.32, 0.72, 0, 1);
      }
      html[data-theme="dark"] .scripture-backdrop.is-active {
        background: rgba(0, 0, 0, 0.28);
      }
    }

    .scripture-toggle__label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: var(--text-body);
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }
    .scripture-toggle__label::before {
      content: '📖';
      font-size: 15px;
    }
    .scripture-toggle__chevron {
      width: 18px;
      height: 18px;
      color: var(--text-secondary);
      transition: transform var(--duration-base) var(--ease-out);
      flex-shrink: 0;
    }
    .scripture-toggle.is-open .scripture-toggle__chevron {
      transform: rotate(180deg);
    }

    .scripture-toggle__body {
      /* absolute 오버레이: 열고 닫아도 주변 문서 흐름에 영향 주지 않음 */
      position: absolute;
      top: calc(100% + var(--space-2));
      left: 0;
      right: 0;
      z-index: 1;                /* ::before(0) 위, header(2) 아래 — 펼친 본문도 흐림 영향 받지 않게 */
      max-height: 0;
      overflow: hidden;
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      transition: max-height var(--duration-slow) var(--ease-out),
                  box-shadow var(--duration-slow);
    }
    .scripture-toggle.is-open .scripture-toggle__body {
      max-height: 60vh;
      overflow-y: auto;
      scrollbar-gutter: stable;   /* 스크롤바 거터 항상 예약 → 콘텐츠 좌측 치우침 방지 */
      /* 가독성 강화: 옅은 보더로 카드 경계 명확 + 다층 그림자 점진 확장 */
      border: 0.5px solid rgba(45, 58, 50, 0.08);
      box-shadow:
        0 1px 2px rgba(45, 58, 50, 0.05),
        0 6px 16px rgba(45, 58, 50, 0.12),
        0 24px 56px rgba(45, 58, 50, 0.16);
    }
    html[data-theme="dark"] .scripture-toggle.is-open .scripture-toggle__body {
      border: 0.5px solid rgba(110, 132, 168, 0.20);
      box-shadow:
        0 1px 2px rgba(0, 0, 0, 0.30),
        0 6px 16px rgba(0, 0, 0, 0.42),
        0 24px 56px rgba(0, 0, 0, 0.55);
    }
    .scripture-toggle__inner {
      padding: var(--space-3) 4px var(--space-4);
    }
    .scripture-toggle .verse-line {
      font-size: var(--text-scripture);
      line-height: 1.85;
      color: var(--text-body);
      padding: 10px 0;
    }
    .scripture-toggle .verse-line + .verse-line {
      border-top: 1px solid var(--border-subtle);
    }
    .scripture-toggle .verse-number {
      font-weight: 700;
      color: var(--accent-sage);
      margin-right: 6px;
      font-size: 14px;
    }

    /* ------------------------------------------------------------------
       묵상 카드 공통
       ------------------------------------------------------------------ */
    .meditation-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: var(--card-padding);
      margin-bottom: var(--card-gap);
    }
    .meditation-card__title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: var(--text-h2);
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      margin-bottom: var(--space-5);
    }
    .meditation-card__icon {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: var(--accent-sage-soft);
      font-size: 15px;
    }

    /* 핵심 요약 불릿 */
    .summary-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .summary-list li {
      position: relative;
      padding: 10px 0 10px 20px;
      font-size: var(--text-body);
      line-height: 1.7;
      color: var(--text-body);
    }
    .summary-list li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 20px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-sage);
    }
    .summary-list li + li {
      border-top: 1px solid var(--border-subtle);
    }

    /* 등장인물 */
    .character {
      padding: var(--space-4) 0;
    }
    .character + .character {
      border-top: 1px solid var(--border-subtle);
      margin-top: var(--space-2);
    }
    .character__name {
      display: inline-block;
      font-size: var(--text-h2);
      font-weight: 700;
      color: var(--accent-sage-text);
      margin-bottom: var(--space-2);
      padding: 3px 12px;
      background: var(--accent-sage-soft);
      border-radius: var(--radius-pill);
    }
    .character__desc {
      font-size: var(--text-body);
      line-height: 1.75;
      color: var(--text-body);
    }

    /* 구절 해설 본문 + 책 살펴보기 문자열 폴백 */
    .prose {
      font-size: var(--text-body);
      line-height: 1.85;
      color: var(--text-body);
      white-space: pre-wrap;
    }

    /* 말씀 속 장면 카드 도입 문장 */
    .passage-intro {
      font-size: var(--text-body);
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 12px;
    }

    /* 5단 호흡 — "깊은 묵상" 카드 내부 (5개 sub-section을 옅은 구분선으로 분리) */
    .deep-dive__step + .deep-dive__step {
      margin-top: var(--space-5);
      padding-top: var(--space-5);
      border-top: 1px solid var(--border-subtle);
    }
    .deep-dive__body {
      font-size: var(--text-body);
      line-height: 1.85;
      color: var(--text-body);
      white-space: pre-wrap;
    }

    /* ------------------------------------------------------------------
       장면 일러스트 — 본문 따라가기 하단 펼침/닫기 (기본 닫힘)
       ------------------------------------------------------------------ */
    .scene-illust {
      margin-top: var(--space-5);
      padding-top: var(--space-5);
      border-top: 1px solid var(--border-subtle);
    }
    .scene-illust__toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      gap: var(--space-3);
      padding: 12px 14px;
      background: var(--bg-soft);
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform var(--duration-fast), background var(--duration-base);
    }
    .scene-illust__toggle:active { transform: scale(0.985); }
    .scene-illust__label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: var(--text-body);
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }
    .scene-illust__chevron {
      width: 18px;
      height: 18px;
      color: var(--text-secondary);
      transition: transform var(--duration-base) var(--ease-out);
      flex-shrink: 0;
    }
    .scene-illust.is-open .scene-illust__chevron { transform: rotate(180deg); }
    /* absolute 아님 — 카드 흐름 안에서 부드럽게 펼침 */
    .scene-illust__body {
      max-height: 0;
      overflow: hidden;
      transition: max-height var(--duration-slow) var(--ease-out);
    }
    .scene-illust.is-open .scene-illust__body { max-height: 1400px; }
    .scene-illust__inner { padding-top: var(--space-4); }
    .scene-illust__img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: var(--radius-md);
      box-shadow:
        0 1px 2px rgba(45, 58, 50, 0.05),
        0 6px 16px rgba(45, 58, 50, 0.10),
        0 16px 40px rgba(45, 58, 50, 0.10);
    }
    .scene-illust__caption {
      margin-top: var(--space-3);
      font-size: var(--text-small);
      color: var(--text-secondary);
      line-height: 1.6;
      text-align: center;
    }
    html[data-time-slot="night"] .scene-illust__toggle { background: rgba(255, 255, 255, 0.06); }
    html[data-time-slot="night"] .scene-illust__img {
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
    }

    /* 말씀 탭 (오늘 범위 / 전체 장) */
    .scripture-tabs {
      display: flex;
      gap: 2px;
      padding: 3px;
      background: var(--bg-soft);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-4);
    }
    .scripture-tab {
      flex: 1;
      padding: 8px 12px;
      font-size: var(--text-small);
      font-weight: 600;
      color: var(--text-secondary);
      border-radius: calc(var(--radius-md) - 3px);
      background: transparent;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: all var(--duration-base);
    }
    .scripture-tab.is-active {
      background: var(--bg-card);
      color: var(--text-primary);
      box-shadow: 0 1px 3px rgba(45, 58, 50, 0.08);
    }

    /* 전체 장 모드에서 오늘 범위 구절 강조 */
    .scripture-toggle .verse-line.is-focus {
      position: relative;
    }
    .scripture-toggle .verse-line.is-focus::before {
      content: '';
      position: absolute;
      left: -12px;
      top: 10px;
      bottom: 10px;
      width: 3px;
      background: var(--accent-sage);
      border-radius: 2px;
    }

    /* 로딩/에러/빈 상태 */
    .loading,
    .error,
    .scripture-empty {
      padding: var(--space-8) var(--space-4);
      text-align: center;
      color: var(--text-secondary);
      font-size: var(--text-small);
      line-height: 1.7;
    }
    .error {
      color: #B84A4A;
    }

    /* 책 살펴보기 카드 (정의 목록식 dl grid) */
    .book-overview-list {
      display: grid;
      grid-template-columns: 104px 1fr;
      row-gap: 14px;
      column-gap: 16px;
      margin: 0;
    }
    .book-overview-list > dt {
      font-size: 15px;          /* 메인 라벨 13 → 15 (본문 톤에 맞춰 키움) */
      font-weight: 700;
      color: var(--accent-sage-text);
      padding-top: 2px;
      letter-spacing: 0.02em;
    }
    .book-overview-list > dd {
      margin: 0;
      font-size: var(--text-body);
      line-height: 1.65;
      color: var(--text-body);
    }

    /* 시기 분기: '다룬 시대 / 기록'을 라벨 ↑ 값 ↓ 형태로 stack
       (좁은 화면에서 값이 어색하게 줄바꿈되던 문제 해결) */
    .date-bracket-wrap {
      display: block;
    }
    /* 옛 SVG 브래킷은 더 이상 사용 안 함 — 시각적 노이즈 줄이기 */
    .date-bracket-svg {
      display: none;
    }
    /* 4개 셀(다룬시대 → 값 → 기록 → 값)을 1칼럼으로 stack */
    .date-sub-lines {
      display: grid;
      grid-template-columns: 1fr;
      row-gap: 2px;
    }
    .date-sub-key {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent-sage-text);
      white-space: nowrap;
      margin-top: 8px;            /* 그룹 사이 분리 */
    }
    .date-sub-key:first-child {
      margin-top: 0;               /* 첫 라벨은 위 여백 X */
    }
    .date-sub-val {
      font-size: var(--text-body);
      line-height: 1.5;
      color: var(--text-body);
    }

    /* 작은/큰 폰트 모드 대응 — 라벨 칼럼도 비례해서 */
    html[data-font-size="sm"] .book-overview-list { grid-template-columns: 92px 1fr; }
    html[data-font-size="lg"] .book-overview-list { grid-template-columns: 116px 1fr; }
    /* 다크/밤 모드에서 라벨 대비 보강 */
    /* 밤: 살펴보기 라벨을 또렷하게 — 밝은 페리윙클 칩(전 기기, 인물 이름표와 통일) */
    html[data-time-slot="night"] .book-overview-list > dt {
      justify-self: start;
      align-self: start;
      width: -moz-fit-content;
      width: fit-content;
      padding: 2px 10px;
      border-radius: 999px;
      background: rgba(120, 144, 184, 0.26);
      color: #DCE3F0;
      box-shadow: inset 0 0 0 1px rgba(168, 181, 208, 0.22);
    }
    html[data-time-slot="night"] .date-sub-key { color: #BFC9E2; }
    /* 모바일(≤743px) 밤: 긴 라벨 칩이 안 넘치도록 라벨 칼럼을 콘텐츠 폭으로(기본 88px 고정 해제) */
    @media (max-width: 743px) {
      html[data-time-slot="night"] .book-overview-list {
        grid-template-columns: auto 1fr;
        column-gap: 14px;
      }
    }

    /* 모바일(<744px): 좁은 화면에서 '시기' 값(예: "BC 6세기경 추정")이 한 줄에
       들어오도록 라벨 칼럼·내부 간격 축소.
       104px 라벨 + 16px gap → 88px 라벨 + 12px gap (≈ +20px),
       브래킷 gap 6→4, 서브 column-gap 10→6 (≈ +6px). 합쳐서 값 셀이 ~25px 넓어짐. */
    @media (max-width: 743px) {
      .book-overview-list {
        grid-template-columns: 88px 1fr;
        column-gap: 12px;
      }
      /* date-sub-lines는 1칼럼이라 column-gap 불필요 */
    }

    /* 태블릿·PC(744px+): 살펴보기 카드가 전체폭이 되므로(common.css), 내부 항목을
       '말씀 속 인물들'처럼 가로로 배치. dl의 dt/dd 쌍을 각 칼럼(라벨 위·값 아래)으로
       흐르게 해서 세로 길이를 크게 줄임. (font-size sm/lg 변형의 칼럼 정의도 함께 덮음) */
    @media (min-width: 744px) {
      .book-overview-list,
      html[data-font-size="sm"] .book-overview-list,
      html[data-font-size="lg"] .book-overview-list {
        grid-template-columns: none;
        grid-auto-flow: column;
        grid-auto-columns: minmax(0, 1fr);
        grid-template-rows: auto auto;
        column-gap: var(--space-6);
        row-gap: 6px;
        align-items: start;
      }
      /* 라벨(dt)과 값(dd) 모두 칼럼 안에서 위쪽 정렬, 값은 윗여백 제거 */
      .book-overview-list > dt { padding-top: 0; }
    }
  </style>
</head>

  <!-- Scripts -->
  <script src="../scripts/storage.js?v=20260603-66fea44"></script>
  <script src="../scripts/common.js?v=20260603-66fea44"></script>
  <script>
    const URL_DATE = new URLSearchParams(location.search).get('date');
    const TODAY = URL_DATE || sessionStorage.getItem('qtDate') || Common.todayISO();
    const HAS_EXPLICIT_DATE = !!(URL_DATE || sessionStorage.getItem('qtDate'));

    async function loadWithFallback(kind) {
      // kind: 'qt' / 'ai' / 'deep_dive'
      // URL_DATE로 명시 지정 시 cache buster를 붙여 브라우저 캐시 우회 (개발/디버그용)
      const bust = URL_DATE ? `?_=${Date.now()}` : '';
      let data = await Common.loadJSON(`../../data/${kind}/${TODAY}.json${bust}`);
      if (!data && !HAS_EXPLICIT_DATE) {
        for (let i = 1; i <= 3; i++) {
          const d = new Date(new Date().toLocaleDateString('sv-SE', { timeZone: 'Asia/Seoul' }));
          d.setDate(d.getDate() - i);
          const fallbackDate = d.toLocaleDateString('sv-SE');
          data = await Common.loadJSON(`../../data/${kind}/${fallbackDate}.json`);
          if (data) break;
        }
      }
      return data;
    }

    let qtData = null;
    let scriptureMode = 'focus';  // 'focus' | 'full'

    document.addEventListener('DOMContentLoaded', async () => {
      await Promise.all([loadAI(), loadScripture()]);
      setupEventListeners();
      setupScriptureTabs();
      applyFontSize();
      Common.applyFontStyle();   // 저장된 폰트 스타일(세리프 등) 보장 적용
      Storage.setDailyRecord(TODAY, { progressStep: 2 });
    });

    // ========== AI 묵상 로드 ==========
    async function loadAI() {
      const [ai, deepDive] = await Promise.all([
        loadWithFallback('ai'),
        loadWithFallback('deep_dive'),
      ]);

      if (!ai && !deepDive) {
        document.getElementById('summaryCard').style.display = '';
        document.getElementById('summaryList').innerHTML =
          '<li class="error" style="padding:0;">묵상을 불러올 수 없어요.</li>';
        return;
      }

      // 책 살펴보기 / 등장인물은 ai 데이터에서 (deep_dive에는 없음)
      if (ai) {
        const _ctxParts = (ai.book_context || '').split('. ');
        const bookOverview = ai.book_overview ||
          (_ctxParts.slice(0, -1).join('. ') + (_ctxParts.length > 1 ? '.' : '') || ai.book_context || '');
        renderCharacters(ai.characters);
        renderBookContext(bookOverview);
      }

      // 분기: deep_dive 있으면 5단 호흡 카드, 없으면 종전 두 카드(말씀 속 장면 + 구절 해설)
      if (deepDive) {
        renderDeepDive(deepDive);
        renderFollowUp(deepDive.follow_up_questions);
      } else if (ai) {
        const _ctxParts = (ai.book_context || '').split('. ');
        const passageIntro = ai.passage_intro ||
          (_ctxParts.length > 1 ? _ctxParts[_ctxParts.length - 1].trim() : '');
        const scenes = ai.scenes || ai.core_summary || [];
        document.getElementById('summaryCard').style.display = '';
        renderSummary(scenes, passageIntro);
        renderCommentary(ai.verse_commentary);
      }
    }

    function renderDeepDive(d) {
      const map = {
        deepDiveScene: '장면',
        deepDiveQuestion: '질문',
        deepDiveContext: '맥락',
        deepDiveInsight: '통찰',
        deepDiveBridge: '연결',
      };
      let any = false;
      for (const [id, key] of Object.entries(map)) {
        const text = d[key];
        const el = document.getElementById(id);
        if (!el) continue;
        if (text && String(text).trim()) {
          el.textContent = text;
          el.parentElement.style.display = '';
          any = true;
        } else {
          // 빈 키는 해당 sub-section만 숨김
          el.parentElement.style.display = 'none';
        }
      }
      if (any) document.getElementById('deepDiveCard').style.display = '';

      // 장면 일러스트 자동 로드 (그림 파일이 있으면 펼침/닫기 영역 노출)
      loadSceneImage(d.date || TODAY);
    }

    // ========== 장면 일러스트 로드 ==========
    // src/images/scenes/{date}.{확장자}를 차례로 탐색 — 있으면 #sceneIllust 노출, 없으면 계속 숨김
    function loadSceneImage(dateStr) {
      if (!dateStr) return;
      const wrap = document.getElementById('sceneIllust');
      const img = document.getElementById('sceneIllustImg');
      if (!wrap || !img) return;

      const exts = ['png', 'jpg', 'jpeg', 'webp'];
      let i = 0;
      const tryNext = () => {
        if (i >= exts.length) return;   // 모든 확장자 실패 → 영역은 숨긴 채로 둠
        const url = `../images/scenes/${dateStr}.${exts[i]}`;
        const probe = new Image();
        probe.onload = () => {
          img.src = url;
          wrap.hidden = false;
        };
        probe.onerror = () => { i += 1; tryNext(); };
        probe.src = url;
      };
      tryNext();
    }

    // ========== 떠오르는 질문 v3 — 메인 + 꼬리 (Gemini 패턴) ==========
    const FOLLOW_UP_LOADING_MS = 2000;
    let _followUpItems = [];
    let _followUpActiveMain = -1;      // 현재 활성 메인 idx (-1: 없음)
    let _followUpActiveFollow = -1;    // 현재 활성 꼬리 idx (-1: 없음)
    let _followUpLoadingTimer = null;
    const _followUpSeenMain = new Set();    // 메인 idx 한 번이라도 본 거
    const _followUpSeenFollow = new Set();  // "mainIdx-followIdx" 한 번이라도 본 거

    function renderFollowUp(items) {
      if (!Array.isArray(items) || items.length === 0) return;
      _followUpItems = items;
      const pillsEl = document.getElementById('followUpPills');
      pillsEl.innerHTML = items.map((it, i) =>
        `<button class="follow-up__pill" data-main="${i}" type="button" role="listitem">${escapeHTML(stripMd(it.question))}</button>`
      ).join('');
      pillsEl.addEventListener('click', onFollowUpMainClick);
      document.getElementById('followUpCard').style.display = '';
    }

    // 마크다운 강조 표기 제거 (GPT가 가끔 **굵게** 같은 마크업을 넣을 때 평문으로 정리)
    function stripMd(text) {
      return String(text || '')
        .replace(/\*\*(.+?)\*\*/g, '$1')   // **굵게** → 굵게
        .replace(/__(.+?)__/g, '$1')        // __굵게__ → 굵게
        .replace(/\*(?!\s)([^*\n]+?)\*/g, '$1');  // *기울임* → 기울임
    }

    function htmlAnswer(text) {
      return stripMd(text).split('\n').map(line => escapeHTML(line)).join('<br>');
    }

    // ===== 메인 Pill 클릭 =====
    function onFollowUpMainClick(e) {
      const btn = e.target.closest('.follow-up__pill');
      if (!btn) return;
      const mainIdx = Number(btn.dataset.main);
      const item = _followUpItems[mainIdx];
      if (!item) return;
      if (mainIdx === _followUpActiveMain) return;  // 같은 메인 다시 → 무동작

      // 진행 중 로딩 취소 + 이전 흐름 모두 초기화
      if (_followUpLoadingTimer) { clearTimeout(_followUpLoadingTimer); _followUpLoadingTimer = null; }
      const answersEl = document.getElementById('followUpAnswers');
      answersEl.innerHTML = '';

      // 메인 활성 상태 갱신
      document.querySelectorAll('.follow-up__pill.is-active').forEach(el => el.classList.remove('is-active'));
      btn.classList.add('is-active');
      _followUpActiveMain = mainIdx;
      _followUpActiveFollow = -1;

      // 메인 답변 렌더
      renderMainAnswer(mainIdx, item);
    }

    function renderMainAnswer(mainIdx, item) {
      const answersEl = document.getElementById('followUpAnswers');
      const answerHTML = htmlAnswer(item.answer);

      const qa = document.createElement('div');
      qa.className = 'follow-up__qa';
      qa.dataset.main = String(mainIdx);
      qa.innerHTML = `
        <div class="follow-up__q-row">
          <span class="follow-up__q-label">${escapeHTML(stripMd(item.question))}</span>
        </div>
        <div class="follow-up__answer-slot"></div>
      `;
      answersEl.appendChild(qa);
      const slot = qa.querySelector('.follow-up__answer-slot');

      // 한 번 본 메인 → 즉시 표시
      if (_followUpSeenMain.has(mainIdx)) {
        slot.innerHTML = `<div class="follow-up__answer">${answerHTML}</div>`;
        renderFollowChips(mainIdx, item);
        return;
      }

      // 처음 보는 메인 → wave-dot → 답변
      slot.innerHTML = `
        <div class="follow-up__loading" aria-label="답변 준비 중">
          <span></span><span></span><span></span>
        </div>
      `;
      _followUpLoadingTimer = setTimeout(() => {
        _followUpLoadingTimer = null;
        if (!slot.isConnected) return;
        slot.innerHTML = `<div class="follow-up__answer">${answerHTML}</div>`;
        _followUpSeenMain.add(mainIdx);
        renderFollowChips(mainIdx, item);
      }, FOLLOW_UP_LOADING_MS);
    }

    // ===== 꼬리 chip 렌더 =====
    function renderFollowChips(mainIdx, item) {
      const answersEl = document.getElementById('followUpAnswers');
      const followUps = Array.isArray(item.follow_ups) ? item.follow_ups : [];
      if (followUps.length === 0) return;

      const chipsEl = document.createElement('div');
      chipsEl.className = 'follow-up__follow-chips';
      chipsEl.dataset.main = String(mainIdx);
      chipsEl.innerHTML = followUps.map((fu, j) =>
        `<button class="follow-up__follow-chip" data-main="${mainIdx}" data-follow="${j}" type="button">${escapeHTML(stripMd(fu.question))}</button>`
      ).join('');
      answersEl.appendChild(chipsEl);
      chipsEl.addEventListener('click', onFollowUpFollowClick);
    }

    // ===== 꼬리 chip 클릭 =====
    function onFollowUpFollowClick(e) {
      const btn = e.target.closest('.follow-up__follow-chip');
      if (!btn) return;
      const mainIdx = Number(btn.dataset.main);
      const followIdx = Number(btn.dataset.follow);
      const item = _followUpItems[mainIdx];
      if (!item) return;
      const fu = item.follow_ups?.[followIdx];
      if (!fu) return;
      if (mainIdx === _followUpActiveMain && followIdx === _followUpActiveFollow) return; // 같은 꼬리 무동작

      // 진행 중 로딩 취소
      if (_followUpLoadingTimer) { clearTimeout(_followUpLoadingTimer); _followUpLoadingTimer = null; }

      // 이전 꼬리 답변 제거 (있다면)
      const answersEl = document.getElementById('followUpAnswers');
      answersEl.querySelectorAll('.follow-up__qa--follow').forEach(el => el.remove());

      // 꼬리 chip 활성 갱신 (현재 메인의 꼬리만)
      const chipsContainer = btn.closest('.follow-up__follow-chips');
      if (chipsContainer) {
        chipsContainer.querySelectorAll('.follow-up__follow-chip.is-active').forEach(el => el.classList.remove('is-active'));
      }
      btn.classList.add('is-active');
      _followUpActiveFollow = followIdx;

      // 꼬리 답변 렌더
      const seenKey = `${mainIdx}-${followIdx}`;
      const answerHTML = htmlAnswer(fu.answer);

      const qa = document.createElement('div');
      qa.className = 'follow-up__qa follow-up__qa--follow';
      qa.dataset.main = String(mainIdx);
      qa.dataset.follow = String(followIdx);
      qa.innerHTML = `
        <div class="follow-up__q-row">
          <span class="follow-up__q-label">${escapeHTML(stripMd(fu.question))}</span>
        </div>
        <div class="follow-up__answer-slot"></div>
      `;
      answersEl.appendChild(qa);
      const slot = qa.querySelector('.follow-up__answer-slot');

      if (_followUpSeenFollow.has(seenKey)) {
        slot.innerHTML = `<div class="follow-up__answer">${answerHTML}</div>`;
        return;
      }

      slot.innerHTML = `
        <div class="follow-up__loading" aria-label="답변 준비 중">
          <span></span><span></span><span></span>
        </div>
      `;
      _followUpLoadingTimer = setTimeout(() => {
        _followUpLoadingTimer = null;
        if (!slot.isConnected) return;
        slot.innerHTML = `<div class="follow-up__answer">${answerHTML}</div>`;
        _followUpSeenFollow.add(seenKey);
      }, FOLLOW_UP_LOADING_MS);
    }

    function renderSummary(summary, passageIntro) {
      const introEl = document.getElementById('passageIntro');
      if (introEl) {
        if (passageIntro) {
          introEl.textContent = passageIntro;
          introEl.style.display = '';
        } else {
          introEl.style.display = 'none';
        }
      }
      const list = document.getElementById('summaryList');
      if (!Array.isArray(summary) || summary.length === 0) {
        list.innerHTML = '<li class="text-secondary" style="padding:0;">요약이 준비되지 않았어요.</li>';
        return;
      }
      list.innerHTML = summary
        .map(line => `<li>${escapeHTML(line)}</li>`)
        .join('');
    }

    function renderCharacters(characters) {
      if (!Array.isArray(characters) || characters.length === 0) return;
      document.getElementById('charactersCard').style.display = '';
      document.getElementById('charactersList').innerHTML = characters
        .map(c => `
          <div class="character">
            <span class="character__name">${escapeHTML(c.name)}</span>
            <div class="character__desc">${escapeHTML(c.description)}</div>
          </div>
        `)
        .join('');
    }

    function renderBookContext(value) {
      if (!value) return;
      document.getElementById('bookContextCard').style.display = '';
      const target = document.getElementById('bookContext');
      target.replaceChildren();
      target.classList.remove('prose');

      // 신 스키마: 객체 {author, date, place, core}
      if (typeof value === 'object' && !Array.isArray(value)) {
        const LABELS = {
          author: '저자',
          date:   '시기',
          place:  '기록 장소와 대상',
          core:   '핵심 내용'
        };
        const dl = document.createElement('dl');
        dl.className = 'book-overview-list';

        ['author', 'date', 'place', 'core'].forEach(key => {
          if (!value[key]) return;

          const dt = document.createElement('dt');
          dt.textContent = LABELS[key];

          const dd = document.createElement('dd');

          // date는 객체 {covered, written}일 수도, 옛 문자열일 수도 있음
          if (key === 'date') {
            appendDateContent(dd, value.date);
          } else {
            dd.textContent = value[key];
          }

          dl.appendChild(dt);
          dl.appendChild(dd);
        });

        target.appendChild(dl);
        return;
      }

      // 옛 스키마: 문자열 (book_overview string 또는 book_context fallback)
      target.classList.add('prose');
      target.textContent = String(value);
    }

    /**
     * date 필드 렌더링
     * - 객체 {covered, written}: covered가 있으면 점선 브래킷으로 두 줄 묶음, 없으면 written만 단일 줄
     * - 문자열 (옛 형식): 단일 줄
     */
    function appendDateContent(dd, dateValue) {
      if (!dateValue) return;

      // 옛 문자열 형식
      if (typeof dateValue === 'string') {
        dd.textContent = dateValue;
        return;
      }

      const covered = dateValue.covered;
      const written = dateValue.written;

      // 케이스 ①: 단일 시기 (covered 없음)
      if (!covered) {
        dd.textContent = written || '';
        return;
      }

      // 케이스 ②: 점선 브래킷 + 두 줄 (다룬 시대 / 기록)
      const wrap = document.createElement('div');
      wrap.className = 'date-bracket-wrap';

      // SVG 점선 브래킷 (왼쪽 [ 모양)
      wrap.innerHTML = `
        <svg class="date-bracket-svg" viewBox="0 0 14 34" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="2 2">
          <path d="M10 2 L4 2 L4 32 L10 32"/>
        </svg>
      `;

      // 서브 라벨/값을 2칼럼 그리드의 4개 셀로 — 값 시작점이 두 줄 모두 동일
      const lines = document.createElement('div');
      lines.className = 'date-sub-lines';

      const coveredKey = document.createElement('span');
      coveredKey.className = 'date-sub-key';
      coveredKey.textContent = '다룬 시대';

      const coveredVal = document.createElement('span');
      coveredVal.className = 'date-sub-val';
      coveredVal.textContent = covered;

      const writtenKey = document.createElement('span');
      writtenKey.className = 'date-sub-key';
      writtenKey.textContent = '기록';

      const writtenVal = document.createElement('span');
      writtenVal.className = 'date-sub-val';
      writtenVal.textContent = written || '';

      lines.append(coveredKey, coveredVal, writtenKey, writtenVal);

      wrap.appendChild(lines);
      dd.appendChild(wrap);
    }

    function renderCommentary(text) {
      if (!text) return;
      document.getElementById('commentaryCard').style.display = '';
      document.getElementById('verseCommentary').textContent = text;
    }

    // ========== 말씀 로드 (토글용) ==========
    async function loadScripture() {
      const qt = await loadWithFallback('qt');

      const container = document.getElementById('versesContainer');
      const labelEl = document.getElementById('scriptureLabel');

      if (!qt) {
        container.innerHTML = '<div class="error">말씀을 불러올 수 없어요.</div>';
        return;
      }

      qtData = qt;
      labelEl.textContent = qt.scripture_ref || '말씀 다시 보기';

      // 책 살펴보기 카드 제목에 책 이름 주입 (예: "룻기 살펴보기")
      const bookTitleEl = document.getElementById('bookContextTitle');
      if (bookTitleEl) {
        bookTitleEl.textContent = qt.book_name || '책';
      }

      renderScripture();
    }

    function renderScripture() {
      if (!qtData) return;
      const container = document.getElementById('versesContainer');

      if (scriptureMode === 'focus') {
        const verses = qtData.verses || [];
        container.innerHTML = verses.map(v => renderVerseLine(v, false)).join('');
        return;
      }

      // full chapter mode
      const full = qtData.full_chapter_verses || [];
      if (full.length === 0) {
        container.innerHTML = `
          <div class="scripture-empty">
            📦 전체 장 데이터가 아직 준비되지 않았어요.<br>
            <span style="opacity:0.7;">크롤러 재실행 후 자동으로 채워집니다.</span>
          </div>
        `;
        return;
      }
      const focusStart = qtData.verses_start;
      const focusEnd = qtData.verses_end;
      container.innerHTML = full.map(v => {
        const isFocus = v.number >= focusStart && v.number <= focusEnd;
        return renderVerseLine(v, isFocus);
      }).join('');
    }

    function renderVerseLine(v, isFocus) {
      const cls = isFocus ? 'verse-line is-focus' : 'verse-line';
      return `
        <div class="${cls}" data-verse="${v.number}">
          <span class="verse-number">${v.number}</span>${escapeHTML(v.text)}
        </div>
      `;
    }

    function setupScriptureTabs() {
      const tabs = document.querySelectorAll('.scripture-tab');
      tabs.forEach(tab => {
        tab.addEventListener('click', (e) => {
          e.stopPropagation();  // 토글 열림/닫힘 방지
          const mode = tab.dataset.mode;
          if (mode === scriptureMode) return;
          scriptureMode = mode;
          tabs.forEach(t => {
            const active = t.dataset.mode === mode;
            t.classList.toggle('is-active', active);
            t.setAttribute('aria-selected', String(active));
          });
          renderScripture();
        });
      });
    }

    // ========== 이벤트 ==========
    function setupEventListeners() {
      // 닫기 → 홈
      document.getElementById('closeBtn').addEventListener('click', () => {
        window.location.href = '../index.html';
      });

      // 이전 → 1단계
      document.getElementById('prevBtn').addEventListener('click', () => {
        window.location.href = 'step-1-scripture.html';
      });

      // 다음 → 3단계
      document.getElementById('nextBtn').addEventListener('click', () => {
        Storage.setDailyRecord(TODAY, { progressStep: 3 });
        window.location.href = 'step-3-prayer.html';
      });

      // 폰트 크기 토글
      document.getElementById('fontSizeBtn').addEventListener('click', toggleFontSize);

      // 말씀 토글 (클릭/엔터/스페이스)
      const toggle = document.getElementById('scriptureToggle');
      const header = document.getElementById('scriptureToggleHeader');
      const backdrop = document.getElementById('scriptureBackdrop');
      const doToggle = () => {
        const isOpen = toggle.classList.toggle('is-open');
        if (backdrop) backdrop.classList.toggle('is-active', isOpen);
        toggle.setAttribute('aria-expanded', String(isOpen));
      };
      header.addEventListener('click', doToggle);
      header.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          doToggle();
        }
      });

      // 장면 일러스트 펼침/닫기 (기본 닫힘)
      const sceneToggle = document.getElementById('sceneIllustToggle');
      if (sceneToggle) {
        sceneToggle.addEventListener('click', () => {
          const wrap = document.getElementById('sceneIllust');
          const open = wrap.classList.toggle('is-open');
          sceneToggle.setAttribute('aria-expanded', String(open));
        });
      }
    }

    // ========== 폰트 크기 ==========
    function toggleFontSize() {
      const sizes = ['sm', 'md', 'lg'];
      const settings = Storage.getSettings();
      const currentIdx = sizes.indexOf(settings.fontSize);
      const nextIdx = (currentIdx + 1) % sizes.length;
      Storage.setSetting('fontSize', sizes[nextIdx]);
      applyFontSize();
    }

    function applyFontSize() {
      const size = Storage.getSettings().fontSize;
      document.documentElement.setAttribute('data-font-size', size);
    }

    // ========== 유틸 ==========
    function escapeHTML(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
  </script>

  <!-- ▼▼▼ [임시] 낮/밤 비교 토글 — URL에 ?compare=1 일 때만 표시. 비교 끝나면 이 블록 삭제 ▼▼▼ -->
  <button id="dayNightToggle" type="button" hidden
    style="position:fixed; left:14px; bottom:14px; z-index:99999; padding:9px 15px; border-radius:999px;
           background:rgba(0,0,0,0.6); color:#fff; font-size:13px; font-weight:700;
           border:1px solid rgba(255,255,255,0.3); -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px);
           box-shadow:0 4px 16px rgba(0,0,0,0.35); cursor:pointer;">☀️ 낮으로</button>
  <script>
    (function () {
      if (!/[?&]compare/.test(location.search)) return;   // 일반 사용자에겐 미표시
      var btn = document.getElementById('dayNightToggle');
      var html = document.documentElement;
      function isNight() { return html.getAttribute('data-time-slot') === 'night'; }
      function sync() { btn.textContent = isNight() ? '☀️ 낮으로' : '🌙 밤으로'; }
      btn.hidden = false;
      sync();
      btn.addEventListener('click', function () {
        if (isNight()) {                       // → 낮(오후)
          html.setAttribute('data-time-slot', 'afternoon');
          html.removeAttribute('data-theme');
        } else {                               // → 밤
          html.setAttribute('data-time-slot', 'night');
          html.setAttribute('data-theme', 'dark');
        }
        sync();
      });
    })();
  </script>
  <!-- ▲▲▲ [임시] 비교 토글 끝 ▲▲▲ -->
