<!DOCTYPE html>
<html lang="ko" data-font-size="md">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1">
  <meta name="theme-color" content="#F0F4F2">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="주만나 AI">
  <meta name="format-detection" content="telephone=no">

  <title>묵상 완료 · 주만나</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
  <link rel="stylesheet" href="../styles/design-tokens.css">
  <link rel="stylesheet" href="../styles/common.css">

  <style>
    /* ========== 5단계 완료 전용 ========== */

    /* 축하 섹션 */
    .celebration {
      text-align: center;
      padding: var(--space-8) 0 var(--space-6);
    }
    .celebration__emoji {
      font-size: 64px;
      line-height: 1;
      margin-bottom: var(--space-5);
      animation: gentleBounce 1200ms var(--ease-out);
    }
    @keyframes gentleBounce {
      0%   { transform: scale(0.3); opacity: 0; }
      60%  { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); }
    }
    .celebration__title {
      font-size: var(--text-hero);
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      margin-bottom: var(--space-3);
      line-height: 1.3;
    }
    .celebration__subtitle {
      font-size: var(--text-body);
      color: var(--text-secondary);
      line-height: 1.6;
    }

    /* 스트릭 큰 카드 */
    .streak-hero {
      text-align: center;
      padding: var(--space-8) var(--space-6);
      background: linear-gradient(135deg, var(--accent-sage) 0%, var(--accent-sage-dark) 100%);
      color: white;
      border-radius: var(--radius-xl);
      margin-bottom: var(--card-gap);
      position: relative;
      overflow: hidden;
    }
    .streak-hero::before {
      content: '🌱';
      position: absolute;
      top: -20px;
      right: -10px;
      font-size: 100px;
      opacity: 0.15;
      transform: rotate(-15deg);
      pointer-events: none;
    }
    .streak-hero__number {
      font-size: 56px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: var(--space-2);
      letter-spacing: -0.03em;
    }
    .streak-hero__unit {
      font-size: var(--text-body);
      font-weight: 500;
      opacity: 0.92;
      margin-bottom: var(--space-4);
    }
    .streak-hero__total {
      display: inline-block;
      font-size: var(--text-small);
      padding: 6px 14px;
      background: rgba(255, 255, 255, 0.18);
      border-radius: var(--radius-pill);
      backdrop-filter: blur(10px);
    }

    /* 마일스톤 메시지 */
    .milestone {
      margin-top: var(--space-5);
      padding: var(--space-4) var(--space-5);
      background: rgba(255, 255, 255, 0.15);
      border-radius: var(--radius-md);
      font-size: var(--text-small);
      line-height: 1.6;
      backdrop-filter: blur(10px);
      word-break: keep-all;
      text-align: center;
    }
    /* inline-block으로 감싸서 두 줄이 같은 박스 내부에서 중앙 정렬되도록 */
    .milestone__inner {
      display: inline-block;
      text-align: center;
      white-space: pre-line;
    }

    /* 묵상 카드 공통 */
    .meditation-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: var(--card-padding);
      margin-bottom: var(--card-gap);
    }
    .meditation-card__title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: var(--text-h2);
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      margin-bottom: var(--space-4);
    }
    .meditation-card__icon {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: var(--accent-sage-soft);
      font-size: 15px;
    }

    /* 감정 칩 (선택된 것만 표시) */
    .chip-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .emotion-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 14px;
      border: 1.5px solid var(--border-chip);
      border-radius: var(--radius-pill);
      background: transparent;
      color: var(--text-body);
      font-size: var(--text-small);
      font-weight: 500;
      cursor: default;
    }
    .emotion-chip__emoji { font-size: 15px; line-height: 1; }
    .emotion-chip[data-color="calm"] {
      background: #FDF2D9; border-color: var(--chip-calm); color: #8B6F2A;
    }
    .emotion-chip[data-color="insight"] {
      background: var(--accent-sage-soft); border-color: var(--chip-insight); color: var(--accent-sage-text);
    }
    .emotion-chip[data-color="reflect"] {
      background: #E9EEF5; border-color: var(--chip-reflect); color: #5C6B80;
    }

    /* 다크모드: 칩 색상 가라앉히기 (라이트 톤 hardcoded → 어두운 보색) */
    html[data-theme="dark"] .emotion-chip[data-color="calm"] {
      background: #3A3024; border-color: rgba(245, 185, 66, 0.45); color: #D4B780;
    }
    html[data-theme="dark"] .emotion-chip[data-color="reflect"] {
      background: #2A2F38; border-color: rgba(139, 157, 184, 0.45); color: #9BA8BC;
    }

    /* 다크모드: streak hero의 흰색 오버레이가 글로우처럼 보이는 문제 수정
       흰 → 검은 오버레이로 가라앉혀 자연스러운 깊이감 */
    html[data-theme="dark"] .streak-hero__total {
      background: rgba(0, 0, 0, 0.25);
    }
    html[data-theme="dark"] .milestone {
      background: rgba(0, 0, 0, 0.22);
    }

    /* 메모 미리보기 */
    .memo-preview {
      font-size: var(--text-body);
      line-height: 1.75;
      color: var(--text-body);
      white-space: pre-wrap;
      word-break: keep-all;
      padding: var(--space-2) 0;
    }
  </style>
</head>
<body>
  <div class="app-container">
   <main class="app-scroll">

    <!-- 축하 섹션 -->
    <section class="celebration">
      <div class="celebration__emoji">🌿</div>
      <h1 class="celebration__title">오늘도 수고하셨어요</h1>
      <p class="celebration__subtitle">
        <span id="userNameDisplay">어린양님</span>의 묵상이 완료됐어요
      </p>
    </section>

    <!-- 스트릭 카드 -->
    <section class="streak-hero">
      <div class="streak-hero__number"><span id="streakCount">0</span>일</div>
      <div class="streak-hero__unit">연속 묵상 중이에요</div>
      <div class="streak-hero__total">총 <span id="totalCount">0</span>회 묵상 완료</div>
      <div class="milestone" id="milestoneMessage" style="display:none;"></div>
    </section>

    <!-- 오늘 남긴 마음 (감정 있을 때만) -->
    <section class="meditation-card" id="emotionsSection" style="display:none;">
      <h2 class="meditation-card__title">
        <span class="meditation-card__icon">🌿</span>
        오늘 남긴 마음
      </h2>
      <div class="chip-grid" id="emotionsList"></div>
    </section>

    <!-- 오늘의 메모 (입력 있을 때만) -->
    <section class="meditation-card" id="memoSection" style="display:none;">
      <h2 class="meditation-card__title">
        <span class="meditation-card__icon">📝</span>
        오늘의 메모
      </h2>
      <div class="memo-preview" id="memoPreview"></div>
    </section>

   </main>

   <!-- 하단 네비: 홈으로 버튼만 -->
   <nav class="bottom-nav">
     <button class="btn btn-primary" id="homeBtn">홈으로 돌아가기</button>
   </nav>

  </div>

  <!-- Scripts -->
  <script src="../scripts/storage.js"></script>
  <script src="../scripts/common.js"></script>
  <script>
    const TODAY = sessionStorage.getItem('qtDate') || Common.todayISO();

    // 감정 칩 정의 (step-4와 동일)
    const EMOTIONS = [
      { id: 'gratitude', label: '감사',   emoji: '🙏', color: 'calm' },
      { id: 'peace',     label: '평안',   emoji: '🕊️', color: 'calm' },
      { id: 'joy',       label: '기쁨',   emoji: '😊', color: 'calm' },
      { id: 'insight',   label: '깨달음', emoji: '💡', color: 'insight' },
      { id: 'grace',     label: '은혜',   emoji: '✨', color: 'insight' },
      { id: 'hope',      label: '희망',   emoji: '🌱', color: 'insight' },
      { id: 'repent',    label: '회개',   emoji: '😔', color: 'reflect' },
      { id: 'sadness',   label: '슬픔',   emoji: '💧', color: 'reflect' },
      { id: 'fear',      label: '두려움', emoji: '😟', color: 'reflect' },
    ];

    // 마일스톤 메시지
    function getMilestoneMessage(days) {
      if (days === 1)   return '✨ 첫 묵상을 완료하셨어요!\n첫 걸음을 내딛으셨네요.';
      if (days === 3)   return '🌱 3일 연속! 멋지게 시작하고 계세요.';
      if (days === 7)   return '🌿 일주일 연속! 습관이 자리잡고 있어요.';
      if (days === 14)  return '💚 2주 연속! 꾸준한 마음에 감탄해요.';
      if (days === 30)  return '🌸 한 달 연속! 믿음의 꽃이 피어나네요.';
      if (days === 50)  return '🎯 50일! 묵상이 삶의 리듬이 되었어요.';
      if (days === 100) return '🎉 100일! 주님과의 깊은 동행입니다.';
      if (days === 365) return '✝️ 1년 연속! 성실한 주의 제자입니다.';
      if (days > 0 && days % 100 === 0) {
        return `✨ ${days}일 연속! 놀라운 묵상 여정입니다.`;
      }
      return null;
    }

    document.addEventListener('DOMContentLoaded', () => {
      render();
      setupEventListeners();
      applyFontSize();
      Common.applyFontStyle();   // 저장된 폰트 스타일(세리프 등) 보장 적용
      Storage.setDailyRecord(TODAY, { progressStep: 5 });
    });

    function render() {
      const record = Storage.getDailyRecord(TODAY);
      const streak = Storage.getStreak();
      const userName = Storage.getUserName();

      document.getElementById('userNameDisplay').textContent = Common.withHonorific(userName);
      document.getElementById('streakCount').textContent = streak.current;
      document.getElementById('totalCount').textContent = streak.totalCompleted;

      // 마일스톤 — inner span으로 감싸 두 줄을 박스 내부에서 중앙 정렬
      const milestoneMsg = getMilestoneMessage(streak.current);
      if (milestoneMsg) {
        const el = document.getElementById('milestoneMessage');
        el.innerHTML = '<span class="milestone__inner"></span>';
        el.firstElementChild.textContent = milestoneMsg;
        el.style.display = '';
      }

      // 감정
      const emotions = record.emotions || [];
      if (emotions.length > 0) {
        const list = document.getElementById('emotionsList');
        list.innerHTML = emotions.map(id => {
          const e = EMOTIONS.find(x => x.id === id);
          if (!e) return '';
          return `
            <span class="emotion-chip" data-color="${e.color}">
              <span class="emotion-chip__emoji">${e.emoji}</span>
              <span>${escapeHTML(e.label)}</span>
            </span>
          `;
        }).join('');
        document.getElementById('emotionsSection').style.display = '';
      }

      // 메모
      if (record.memo && record.memo.trim()) {
        document.getElementById('memoPreview').textContent = record.memo;
        document.getElementById('memoSection').style.display = '';
      }
    }

    function setupEventListeners() {
      document.getElementById('homeBtn').addEventListener('click', () => {
        sessionStorage.removeItem('qtDate');
        window.location.href = '../index.html';
      });
    }

    function applyFontSize() {
      const size = Storage.getSettings().fontSize;
      document.documentElement.setAttribute('data-font-size', size);
    }

    function escapeHTML(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
  </script>
</body>
</html>
