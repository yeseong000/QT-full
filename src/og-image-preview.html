<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>OG 이미지 1200×630</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@700&family=Noto+Sans+KR:wght@500;700&display=swap">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1200px; height: 630px; overflow: hidden; background: #F0F4F2; }

    .og-card {
      width: 1200px;
      height: 630px;
      background: #F0F4F2;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
    }

    /* 배경 원 */
    .bg-circle {
      position: absolute;
      width: 560px;
      height: 560px;
      border-radius: 50%;
      background: radial-gradient(circle, #dde9e1 0%, transparent 70%);
      top: -140px;
      right: -80px;
    }
    .bg-circle2 {
      position: absolute;
      width: 340px;
      height: 340px;
      border-radius: 50%;
      background: radial-gradient(circle, #dde9e1 0%, transparent 70%);
      bottom: -100px;
      left: -40px;
    }
    .bg-arc {
      position: absolute;
      width: 380px;
      height: 380px;
      border-radius: 50%;
      border: 1.5px solid #b8c8bc;
      opacity: 0.45;
      top: -100px;
      right: 40px;
    }

    /* 십자가 — 크고 선명하게 */
    .cross {
      position: absolute;
      right: 80px;
      top: 50%;
      transform: translateY(-50%);
      font-family: 'Noto Serif KR', Georgia, serif;
      font-size: 320px;
      font-weight: 400;
      color: #5BA892;
      opacity: 0.18;
      line-height: 1;
      user-select: none;
    }

    /* 좌측 액센트 라인 */
    .accent-line {
      position: absolute;
      left: 80px;
      top: 50%;
      transform: translateY(-50%);
      width: 5px;
      height: 200px;
      background: linear-gradient(to bottom, #5BA892, #4A8F7C);
      border-radius: 3px;
    }

    /* 콘텐츠 */
    .content {
      position: relative;
      z-index: 10;
      padding: 0 112px;
    }

    .eyebrow {
      font-family: 'Noto Sans KR', Arial, sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #5BA892;
      letter-spacing: 0.18em;
      margin-bottom: 20px;
    }

    .main-title {
      font-family: 'Noto Serif KR', Georgia, serif;
      font-size: 108px;
      font-weight: 700;
      color: #2D3A32;
      line-height: 1.05;
      margin-bottom: 28px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-family: 'Noto Sans KR', Arial, sans-serif;
      font-size: 32px;
      font-weight: 500;
      color: #7A857E;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="og-card">
    <div class="bg-circle"></div>
    <div class="bg-circle2"></div>
    <div class="bg-arc"></div>
    <div class="cross">✝</div>
    <div class="accent-line"></div>

    <div class="content">
      <div class="main-title">DAILY QT</div>
      <div class="subtitle">매일 말씀과 묵상을 함께해요</div>
    </div>
  </div>
</body>
</html>
