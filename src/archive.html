<!DOCTYPE html>
<html lang="ko" data-font-size="md">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1">
  <meta name="theme-color" content="#F7F4ED">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="주만나 AI">
  <meta name="format-detection" content="telephone=no">

  <title>묵상 기록 · 주만나 AI 큐티</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
  <link rel="stylesheet" href="styles/design-tokens.css">
  <link rel="stylesheet" href="styles/common.css">

  <style>
    /* ========== 아카이브 전용 ========== */

    .archive-header {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-6);
    }
    .back-btn {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: var(--text-primary);
      -webkit-tap-highlight-color: transparent;
      margin-left: -10px;
    }
    .back-btn svg { width: 22px; height: 22px; }
    .back-btn:active { background: var(--accent-sage-soft); }
    .archive-title {
      font-size: var(--text-h1);
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    /* 월별 그룹 */
    .month-group {
      margin-bottom: var(--space-8);
    }
    .month-label {
      font-size: var(--text-caption);
      font-weight: 600;
      color: var(--accent-sage);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: var(--space-3);
      padding-left: var(--space-2);
    }

    /* 레코드 카드 */
    .record-card {
      display: block;
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: var(--space-5) var(--card-padding);
      margin-bottom: var(--space-3);
      cursor: pointer;
      transition: transform var(--duration-fast);
      -webkit-tap-highlight-color: transparent;
      color: inherit;
      text-decoration: none;
    }
    .record-card:active {
      transform: scale(0.99);
    }
    .record-card__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-2);
      gap: var(--space-3);
    }
    .record-card__date {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: var(--text-small);
      color: var(--text-secondary);
      font-weight: 500;
    }
    .record-card__check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--accent-sage);
      color: white;
      display: grid;
      place-items: center;
      font-size: 13px;
      font-weight: 700;
    }
    .record-card__check--incomplete {
      background: var(--border-chip);
      color: var(--text-secondary);
    }
    .record-card__title {
      font-size: var(--text-h2);
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.4;
      margin-bottom: var(--space-1);
      word-break: keep-all;
    }
    .record-card__ref {
      font-size: var(--text-small);
      color: var(--text-secondary);
      margin-bottom: var(--space-3);
    }
    .record-card__meta {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      flex-wrap: wrap;
      font-size: var(--text-small);
    }
    .record-card__emoji {
      font-size: 14px;
      line-height: 1;
    }
    .record-card__memo-mark {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 10px;
      background: var(--bg-soft);
      color: var(--accent-sage-text);
      border-radius: var(--radius-pill);
      font-size: 11px;
      font-weight: 500;
    }

    /* 빈 상태 */
    .empty-state {
      text-align: center;
      padding: var(--space-12) var(--space-4);
      color: var(--text-secondary);
    }
    .empty-state__emoji {
      font-size: 48px;
      margin-bottom: var(--space-4);
      line-height: 1;
    }
    .empty-state__title {
      font-size: var(--text-h2);
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-2);
    }
    .empty-state__desc {
      font-size: var(--text-small);
      line-height: 1.6;
      margin-bottom: var(--space-6);
    }

    .loading {
      text-align: center;
      padding: var(--space-8);
      color: var(--text-secondary);
      font-size: var(--text-small);
    }
  </style>
</head>
<body>
  <div class="app-container app-container--no-nav">
   <main class="app-scroll">

    <header class="archive-header">
      <button class="back-btn" id="backBtn" aria-label="뒤로">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <h1 class="archive-title">묵상 기록</h1>
    </header>

    <div id="archiveContent">
      <div class="loading">기록을 불러오고 있어요...</div>
    </div>

   </main>
  </div>

  <!-- Scripts -->
  <script src="scripts/storage.js"></script>
  <script src="scripts/common.js"></script>
  <script>
    // 감정 칩 ID → emoji 매핑 (step-4와 동일)
    const EMOTION_EMOJI = {
      gratitude: '🙏', peace: '🕊️', joy: '😊',
      insight: '💡', grace: '✨', hope: '🌱',
      repent: '😔', sadness: '💧', fear: '😟',
    };

    document.addEventListener('DOMContentLoaded', async () => {
      document.getElementById('backBtn').addEventListener('click', () => {
        window.location.href = 'index.html';
      });
      await renderArchive();
    });

    // localStorage에서 records.{date}.* 키의 모든 날짜 수집
    function collectRecordDates() {
      const dates = new Set();
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        const m = key && key.match(/^records\.(\d{4}-\d{2}-\d{2})\./);
        if (m) dates.add(m[1]);
      }
      return Array.from(dates).sort().reverse();  // 최신 순
    }

    async function renderArchive() {
      const container = document.getElementById('archiveContent');
      const dates = collectRecordDates();

      if (dates.length === 0) {
        container.innerHTML = renderEmptyState();
        document.getElementById('startTodayBtn')?.addEventListener('click', () => {
          window.location.href = 'index.html';
        });
        return;
      }

      // 각 날짜의 QT + AI 데이터 로드
      const entries = await Promise.all(dates.map(async (date) => {
        const record = Storage.getDailyRecord(date);
        const qt = await Common.loadJSON(`../data/qt/${date}.json`);
        return { date, record, qt };
      }));

      // 의미 있는 기록만 필터 (completed OR emotions OR memo)
      const meaningful = entries.filter(e =>
        e.record.completed ||
        (e.record.emotions && e.record.emotions.length > 0) ||
        (e.record.memo && e.record.memo.trim())
      );

      if (meaningful.length === 0) {
        container.innerHTML = renderEmptyState();
        document.getElementById('startTodayBtn')?.addEventListener('click', () => {
          window.location.href = 'index.html';
        });
        return;
      }

      // 월별 그룹화
      const byMonth = {};
      meaningful.forEach(e => {
        const monthKey = e.date.slice(0, 7);  // "2026-04"
        if (!byMonth[monthKey]) byMonth[monthKey] = [];
        byMonth[monthKey].push(e);
      });

      const months = Object.keys(byMonth).sort().reverse();
      container.innerHTML = months.map(monthKey => {
        const [y, m] = monthKey.split('-');
        const label = `${parseInt(y, 10)}년 ${parseInt(m, 10)}월`;
        const items = byMonth[monthKey].map(renderRecordCard).join('');
        return `
          <section class="month-group">
            <div class="month-label">${label}</div>
            ${items}
          </section>
        `;
      }).join('');
    }

    function renderRecordCard({ date, record, qt }) {
      const [, m, d] = date.split('-');
      const dayOfWeek = ['일','월','화','수','목','금','토'][new Date(date).getDay()];
      const title = qt?.title || '데이터 없음';
      const ref = qt?.scripture_ref || '';

      const emotionHTML = (record.emotions || [])
        .map(id => EMOTION_EMOJI[id] || '')
        .filter(Boolean)
        .map(e => `<span class="record-card__emoji">${e}</span>`)
        .join('');

      const memoMark = record.memo && record.memo.trim()
        ? `<span class="record-card__memo-mark">📝 메모</span>`
        : '';

      const checkClass = record.completed ? '' : ' record-card__check--incomplete';
      const checkMark = record.completed ? '✓' : '·';

      return `
        <article class="record-card" data-date="${date}">
          <div class="record-card__header">
            <span class="record-card__date">${m}/${d} (${dayOfWeek})</span>
            <span class="record-card__check${checkClass}">${checkMark}</span>
          </div>
          <h3 class="record-card__title">${escapeHTML(title)}</h3>
          <div class="record-card__ref">${escapeHTML(ref)}</div>
          <div class="record-card__meta">
            ${emotionHTML}
            ${memoMark}
          </div>
        </article>
      `;
    }

    function renderEmptyState() {
      return `
        <div class="empty-state">
          <div class="empty-state__emoji">🌱</div>
          <div class="empty-state__title">아직 묵상 기록이 없어요</div>
          <div class="empty-state__desc">
            오늘의 말씀부터 시작해보세요.<br>
            작은 걸음이 꾸준한 동행이 됩니다.
          </div>
          <button class="btn btn-primary" id="startTodayBtn" style="padding: 14px 32px;">
            오늘의 묵상 시작하기
          </button>
        </div>
      `;
    }

    function escapeHTML(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
  </script>
</body>
</html>
