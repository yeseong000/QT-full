<!DOCTYPE html>
<html lang="ko" data-font-size="md">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1">
  <meta name="theme-color" content="#F7F4ED">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="주만나 AI">
  <meta name="format-detection" content="telephone=no">

  <title>묵상 기록 · 주만나 AI 큐티</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
  <link rel="stylesheet" href="styles/design-tokens.css">
  <link rel="stylesheet" href="styles/common.css">

  <style>
    /* ========== 아카이브 전용 ========== */

    .archive-header {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-6);
    }
    .back-btn {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: var(--text-primary);
      -webkit-tap-highlight-color: transparent;
      margin-left: -10px;
    }
    .back-btn svg { width: 22px; height: 22px; }
    .back-btn:active { background: var(--accent-sage-soft); }
    .archive-title {
      font-size: var(--text-h1);
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    /* 월별 그룹 */
    .month-group {
      margin-bottom: var(--space-8);
    }
    .month-label {
      font-size: var(--text-caption);
      font-weight: 600;
      color: var(--accent-sage);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: var(--space-3);
      padding-left: var(--space-2);
    }

    /* 아코디언 아이템 */
    .record-item {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      margin-bottom: var(--space-3);
      overflow: hidden;
      transition: box-shadow var(--duration-base);
    }
    .record-item.is-open {
      box-shadow: var(--shadow-soft);
    }

    /* 접힌 행 (항상 보이는 부분) */
    .record-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 14px 20px;
      background: transparent;
      border: 0;
      text-align: left;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      gap: var(--space-3);
      font-family: inherit;
    }
    .record-summary:active {
      background: var(--bg-soft);
    }
    .record-summary__left {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .record-summary__date {
      font-size: var(--text-body);
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }
    .record-summary__title {
      font-size: var(--text-small);
      color: var(--text-secondary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .record-summary__right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .record-summary__check {
      width: 20px;
      height: 20px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: var(--accent-sage);
      color: white;
      font-size: 11px;
      font-weight: 700;
    }
    .record-summary__check--incomplete {
      background: var(--border-chip);
      color: var(--text-secondary);
    }
    .record-summary__chevron {
      width: 18px;
      height: 18px;
      color: var(--text-secondary);
      transition: transform var(--duration-base) var(--ease-out);
    }
    .record-item.is-open .record-summary__chevron {
      transform: rotate(180deg);
    }

    /* 펼침 영역 */
    .record-detail {
      max-height: 0;
      overflow: hidden;
      transition: max-height var(--duration-slow) var(--ease-out);
    }
    .record-item.is-open .record-detail {
      max-height: 1200px;
    }
    .record-detail__inner {
      padding: var(--space-4) 20px var(--space-5);
      border-top: 1px solid var(--border-subtle);
    }
    .record-detail__section {
      margin-bottom: var(--space-5);
    }
    .record-detail__section:last-child {
      margin-bottom: 0;
    }
    .record-detail__label {
      font-size: var(--text-caption);
      font-weight: 600;
      color: var(--accent-sage);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: var(--space-3);
    }

    /* 요약 리스트 */
    .detail-summary {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .detail-summary li {
      position: relative;
      padding: 6px 0 6px 16px;
      font-size: var(--text-body);
      line-height: 1.7;
      color: var(--text-body);
      word-break: keep-all;
    }
    .detail-summary li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 15px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent-sage);
    }

    /* 메모 박스 */
    .detail-memo {
      font-size: var(--text-body);
      line-height: 1.75;
      color: var(--text-body);
      white-space: pre-wrap;
      word-break: keep-all;
      padding: var(--space-4) var(--space-5);
      background: var(--bg-soft);
      border-radius: var(--radius-md);
    }

    /* 감정 칩 (펼친 뷰용) */
    .detail-emotions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .detail-emotion-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      background: var(--bg-soft);
      border-radius: var(--radius-pill);
      font-size: var(--text-small);
      color: var(--accent-sage-text);
      font-weight: 500;
    }

    /* 빈 상태 */
    .empty-state {
      text-align: center;
      padding: var(--space-12) var(--space-4);
      color: var(--text-secondary);
    }
    .empty-state__emoji {
      font-size: 48px;
      margin-bottom: var(--space-4);
      line-height: 1;
    }
    .empty-state__title {
      font-size: var(--text-h2);
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-2);
    }
    .empty-state__desc {
      font-size: var(--text-small);
      line-height: 1.6;
      margin-bottom: var(--space-6);
    }

    .loading {
      text-align: center;
      padding: var(--space-8);
      color: var(--text-secondary);
      font-size: var(--text-small);
    }
  </style>
</head>
<body>
  <div class="app-container app-container--no-nav">
   <main class="app-scroll">

    <header class="archive-header">
      <button class="back-btn" id="backBtn" aria-label="뒤로">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <h1 class="archive-title">묵상 기록</h1>
    </header>

    <div id="archiveContent">
      <div class="loading">기록을 불러오고 있어요...</div>
    </div>

   </main>
  </div>

  <!-- Scripts -->
  <script src="scripts/storage.js"></script>
  <script src="scripts/common.js"></script>
  <script>
    // 감정 칩 ID → {emoji, label}
    const EMOTION_MAP = {
      gratitude: { emoji: '🙏', label: '감사' },
      peace:     { emoji: '🕊️', label: '평안' },
      joy:       { emoji: '😊', label: '기쁨' },
      insight:   { emoji: '💡', label: '깨달음' },
      grace:     { emoji: '✨', label: '은혜' },
      hope:      { emoji: '🌱', label: '희망' },
      repent:    { emoji: '😔', label: '회개' },
      sadness:   { emoji: '💧', label: '슬픔' },
      fear:      { emoji: '😟', label: '두려움' },
    };

    document.addEventListener('DOMContentLoaded', async () => {
      document.getElementById('backBtn').addEventListener('click', () => {
        window.location.href = 'index.html';
      });
      await renderArchive();
    });

    // localStorage records.* 키에서 모든 날짜 수집 (최신순)
    function collectRecordDates() {
      const dates = new Set();
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        const m = key && key.match(/^records\.(\d{4}-\d{2}-\d{2})\./);
        if (m) dates.add(m[1]);
      }
      return Array.from(dates).sort().reverse();
    }

    async function renderArchive() {
      const container = document.getElementById('archiveContent');
      const dates = collectRecordDates();

      if (dates.length === 0) {
        container.innerHTML = renderEmptyState();
        hookupEmptyStateButton();
        return;
      }

      // 각 날짜의 qt + ai + record 로드
      const entries = await Promise.all(dates.map(async (date) => {
        const record = Storage.getDailyRecord(date);
        const [qt, ai] = await Promise.all([
          Common.loadJSON(`../data/qt/${date}.json`),
          Common.loadJSON(`../data/ai/${date}.json`),
        ]);
        return { date, record, qt, ai };
      }));

      // 의미 있는 기록만 (완료 OR 감정 OR 메모)
      const meaningful = entries.filter(e =>
        e.record.completed ||
        (e.record.emotions && e.record.emotions.length > 0) ||
        (e.record.memo && e.record.memo.trim())
      );

      if (meaningful.length === 0) {
        container.innerHTML = renderEmptyState();
        hookupEmptyStateButton();
        return;
      }

      // 월별 그룹
      const byMonth = {};
      meaningful.forEach(e => {
        const monthKey = e.date.slice(0, 7);
        (byMonth[monthKey] ??= []).push(e);
      });

      const months = Object.keys(byMonth).sort().reverse();
      container.innerHTML = months.map(monthKey => {
        const [y, m] = monthKey.split('-');
        const label = `${parseInt(y, 10)}년 ${parseInt(m, 10)}월`;
        const items = byMonth[monthKey].map(renderRecordItem).join('');
        return `
          <section class="month-group">
            <div class="month-label">${label}</div>
            <div class="record-list">${items}</div>
          </section>
        `;
      }).join('');

      // 가장 최근 1개는 펼쳐서 시작
      const first = container.querySelector('.record-item');
      if (first) first.classList.add('is-open');

      // 클릭 토글 바인딩 (이벤트 위임)
      container.addEventListener('click', (e) => {
        const summary = e.target.closest('.record-summary');
        if (!summary) return;
        const item = summary.closest('.record-item');
        const isOpen = item.classList.toggle('is-open');
        summary.setAttribute('aria-expanded', String(isOpen));
      });
    }

    function renderRecordItem({ date, record, qt, ai }) {
      const [y, m, d] = date.split('-');
      const weekday = ['일','월','화','수','목','금','토'][new Date(date).getDay()];
      const title = qt?.title || ai?.title || '(데이터 준비 중)';
      const summaryTop3 = (ai?.core_summary || []).slice(0, 3);

      // 완료 배지
      const checkClass = record.completed ? '' : ' record-summary__check--incomplete';
      const checkMark = record.completed ? '✓' : '·';

      // 디테일 섹션들
      const sections = [];

      if (summaryTop3.length > 0) {
        sections.push(`
          <div class="record-detail__section">
            <div class="record-detail__label">핵심 요약</div>
            <ul class="detail-summary">
              ${summaryTop3.map(s => `<li>${escapeHTML(s)}</li>`).join('')}
            </ul>
          </div>
        `);
      }

      const emotions = (record.emotions || [])
        .map(id => EMOTION_MAP[id])
        .filter(Boolean);
      if (emotions.length > 0) {
        sections.push(`
          <div class="record-detail__section">
            <div class="record-detail__label">오늘의 마음</div>
            <div class="detail-emotions">
              ${emotions.map(e => `
                <span class="detail-emotion-chip">
                  <span>${e.emoji}</span>
                  <span>${escapeHTML(e.label)}</span>
                </span>
              `).join('')}
            </div>
          </div>
        `);
      }

      if (record.memo && record.memo.trim()) {
        sections.push(`
          <div class="record-detail__section">
            <div class="record-detail__label">내 메모</div>
            <div class="detail-memo">${escapeHTML(record.memo)}</div>
          </div>
        `);
      }

      const detailHTML = sections.length > 0
        ? `<div class="record-detail"><div class="record-detail__inner">${sections.join('')}</div></div>`
        : `<div class="record-detail"><div class="record-detail__inner"><div style="color: var(--text-secondary); font-size: var(--text-small);">추가 기록이 없어요.</div></div></div>`;

      return `
        <article class="record-item" data-date="${date}">
          <button class="record-summary" type="button" aria-expanded="false">
            <div class="record-summary__left">
              <div class="record-summary__date">${parseInt(m, 10)}월 ${parseInt(d, 10)}일 (${weekday})</div>
              <div class="record-summary__title">${escapeHTML(title)}</div>
            </div>
            <div class="record-summary__right">
              <span class="record-summary__check${checkClass}">${checkMark}</span>
              <svg class="record-summary__chevron" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </div>
          </button>
          ${detailHTML}
        </article>
      `;
    }

    function renderEmptyState() {
      return `
        <div class="empty-state">
          <div class="empty-state__emoji">🌱</div>
          <div class="empty-state__title">아직 묵상 기록이 없어요</div>
          <div class="empty-state__desc">
            오늘의 말씀부터 시작해보세요.<br>
            작은 걸음이 꾸준한 동행이 됩니다.
          </div>
          <button class="btn btn-primary" id="startTodayBtn" style="padding: 14px 32px;">
            오늘의 묵상 시작하기
          </button>
        </div>
      `;
    }
    function hookupEmptyStateButton() {
      const btn = document.getElementById('startTodayBtn');
      if (btn) btn.addEventListener('click', () => { window.location.href = 'index.html'; });
    }

    function escapeHTML(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
  </script>
</body>
</html>
