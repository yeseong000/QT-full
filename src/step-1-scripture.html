<!DOCTYPE html>
<html lang="ko" data-font-size="md">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1">
  <meta name="theme-color" content="#F7F4ED">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="주만나 AI">
  <meta name="format-detection" content="telephone=no">

  <title>말씀 · 주만나 AI 큐티</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
  <link rel="stylesheet" href="styles/design-tokens.css">
  <link rel="stylesheet" href="styles/common.css">

  <style>
    /* ========== 1단계 전용 ========== */

    /* 진행 단계 표시 */
    .progress-dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: var(--space-6);
    }
    .progress-dot {
      width: 24px;
      height: 4px;
      border-radius: 2px;
      background: var(--border-subtle);
      transition: background var(--duration-base);
    }
    .progress-dot.active {
      background: var(--accent-sage);
    }

    /* 성경 본문 */
    .scripture-ref {
      font-size: var(--text-small);
      color: var(--text-secondary);
      padding-bottom: var(--space-4);
      border-bottom: 1px solid var(--border-subtle);
      margin-bottom: var(--space-4);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .version-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      background: var(--bg-soft);
      color: var(--accent-sage-text);
      border-radius: var(--radius-pill);
      font-size: 12px;
      font-weight: 600;
    }

    .verse-line {
      font-size: var(--text-scripture);
      line-height: 1.85;
      color: var(--text-body);
      padding: var(--space-3) 0;
      user-select: text;  /* 드래그 선택 허용 */
    }
    .verse-line + .verse-line {
      border-top: 1px solid var(--border-subtle);
    }
    .verse-number {
      font-weight: 700;
      color: var(--accent-sage);
      margin-right: 6px;
      font-size: 15px;
      user-select: none;
    }

    /* 하이라이트 (밑줄) */
    ::selection {
      background: var(--highlight-underline);
      color: var(--text-primary);
    }

    /* FAB 툴팁 */
    .fab-tooltip {
      position: fixed;
      right: 20px;
      bottom: 180px;
      padding: 10px 14px;
      background: var(--text-primary);
      color: white;
      border-radius: var(--radius-md);
      font-size: var(--text-small);
      z-index: 60;
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: all var(--duration-slow);
    }
    .fab-tooltip.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .fab-tooltip::after {
      content: '';
      position: absolute;
      bottom: -5px;
      right: 22px;
      width: 10px;
      height: 10px;
      background: var(--text-primary);
      transform: rotate(45deg);
    }
  </style>
</head>
<body>
  <div class="app-container">

    <!-- 상단바 -->
    <header class="top-bar">
      <div class="top-bar__left">
        <button class="icon-btn" id="closeBtn" aria-label="닫기">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="top-bar__right">
        <button class="icon-btn icon-btn--font" id="fontSizeBtn" aria-label="폰트 크기">
          가가
        </button>
      </div>
    </header>

    <!-- 진행 단계 (4단계 중 1단계) -->
    <div class="progress-dots" aria-label="진행 단계 1/4">
      <div class="progress-dot active"></div>
      <div class="progress-dot"></div>
      <div class="progress-dot"></div>
      <div class="progress-dot"></div>
    </div>

    <!-- 페이지 제목 -->
    <h1 class="page-title">말씀을 깊이 새겨보세요</h1>

    <!-- 성경 본문 카드 -->
    <section class="card" id="scriptureCard">
      <div class="scripture-ref">
        <span id="scriptureRef">—</span>
        <span class="version-badge">개역개정</span>
      </div>
      <div id="versesContainer">
        <div class="loading">말씀을 불러오고 있어요...</div>
      </div>
    </section>

  </div>

  <!-- 플로팅 버튼 (밑줄 긋기) -->
  <button class="fab" id="highlightFab" aria-label="밑줄 긋기">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 20h9"/>
      <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
    </svg>
  </button>

  <!-- FAB 툴팁 (최초 1회만) -->
  <div class="fab-tooltip" id="fabTooltip">
    마음에 드는 구절을 드래그해 밑줄을 그어보세요
  </div>

  <!-- 하단 네비 -->
  <nav class="bottom-nav">
    <button class="btn btn-secondary" id="prevBtn">이전</button>
    <button class="btn btn-primary" id="nextBtn">다음</button>
  </nav>

  <!-- Scripts -->
  <script src="scripts/storage.js"></script>
  <script src="scripts/common.js"></script>
  <script>
    const TODAY = Common.todayISO();
    const FALLBACK_DATE = '2026-04-22';

    document.addEventListener('DOMContentLoaded', async () => {
      await loadScripture();
      setupEventListeners();
      applyFontSize();
      showFabTooltipIfFirst();
      // 진행 상태 저장
      Storage.setDailyRecord(TODAY, { progressStep: 1 });
    });

    // ========== 말씀 로드 ==========
    async function loadScripture() {
      let qt = await Common.loadJSON(`../data/qt/${TODAY}.json`);
      if (!qt) {
        qt = await Common.loadJSON(`../data/qt/${FALLBACK_DATE}.json`);
      }

      if (!qt) {
        document.getElementById('versesContainer').innerHTML =
          '<div class="error">말씀을 불러올 수 없어요.</div>';
        return;
      }

      document.getElementById('scriptureRef').textContent = qt.scripture_ref;
      document.title = `${qt.title} · 주만나 AI 큐티`;

      const container = document.getElementById('versesContainer');
      container.innerHTML = qt.verses.map(v => `
        <div class="verse-line" data-verse="${v.number}">
          <span class="verse-number">${v.number}</span>
          ${v.text}
        </div>
      `).join('');
    }

    // ========== 이벤트 ==========
    function setupEventListeners() {
      // 닫기 → 홈
      document.getElementById('closeBtn').addEventListener('click', () => {
        window.location.href = 'index.html';
      });

      // 이전 → 홈
      document.getElementById('prevBtn').addEventListener('click', () => {
        window.location.href = 'index.html';
      });

      // 다음 → 2단계 (아직 없으니 alert)
      document.getElementById('nextBtn').addEventListener('click', () => {
        // Storage.setDailyRecord(TODAY, { progressStep: 2 });
        // window.location.href = 'step-2-meditation.html';
        alert('2단계 묵상 화면은 다음 단계에서 만들어질 예정이에요! 🌱');
      });

      // 폰트 크기 토글 (sm → md → lg → sm)
      document.getElementById('fontSizeBtn').addEventListener('click', toggleFontSize);

      // FAB 클릭 → 밑줄 안내
      document.getElementById('highlightFab').addEventListener('click', () => {
        alert('텍스트를 길게 누르고 드래그하면 하이라이트됩니다.\n(향후 저장 기능 추가 예정)');
      });
    }

    // ========== 폰트 크기 ==========
    function toggleFontSize() {
      const sizes = ['sm', 'md', 'lg'];
      const settings = Storage.getSettings();
      const currentIdx = sizes.indexOf(settings.fontSize);
      const nextIdx = (currentIdx + 1) % sizes.length;
      const newSize = sizes[nextIdx];

      Storage.setSetting('fontSize', newSize);
      applyFontSize();
    }

    function applyFontSize() {
      const size = Storage.getSettings().fontSize;
      document.documentElement.setAttribute('data-font-size', size);
    }

    // ========== FAB 툴팁 (최초 1회만) ==========
    function showFabTooltipIfFirst() {
      const shown = Storage.get('tooltip.fabShown');
      if (shown) return;

      const tooltip = document.getElementById('fabTooltip');
      setTimeout(() => {
        tooltip.classList.add('visible');
      }, 1500);
      setTimeout(() => {
        tooltip.classList.remove('visible');
        Storage.set('tooltip.fabShown', true);
      }, 6000);
    }
  </script>
</body>
</html>
