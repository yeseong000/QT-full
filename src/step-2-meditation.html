<!DOCTYPE html>
<html lang="ko" data-font-size="md">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1">
  <meta name="theme-color" content="#F0F4F2">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="주만나 AI">
  <meta name="format-detection" content="telephone=no">

  <title>묵상 · 주만나 AI 큐티</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
  <link rel="stylesheet" href="styles/design-tokens.css">
  <link rel="stylesheet" href="styles/common.css">

  <style>
    /* ========== 2단계 전용 ========== */

    /* ------------------------------------------------------------------
       말씀 토글 (sticky 떠있는 캡슐)
       ------------------------------------------------------------------ */
    .scripture-toggle {
      position: sticky;
      top: var(--space-2);      /* 상단에서 8px 띄워서 "떠있는" 느낌 */
      z-index: 20;
      margin-bottom: var(--space-6);
    }

    .scripture-toggle__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      padding: 10px 16px 10px 14px;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border-radius: var(--radius-pill);
      box-shadow: 0 2px 10px rgba(45, 58, 50, 0.08);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      transition: box-shadow var(--duration-base), transform var(--duration-fast);
    }
    .scripture-toggle__header:active {
      transform: scale(0.98);
    }
    .scripture-toggle.is-open .scripture-toggle__header {
      box-shadow: 0 3px 14px rgba(45, 58, 50, 0.10);
    }

    /* 다크 테마: 글래스 캡슐 — bg-card 톤 + 옅은 sage 테두리로 elevation */
    html[data-theme="dark"] .scripture-toggle__header {
      background: rgba(42, 52, 45, 0.85);
      box-shadow: inset 0 0 0 1px rgba(143, 212, 184, 0.10);
    }
    html[data-theme="dark"] .scripture-toggle.is-open .scripture-toggle__header {
      box-shadow: inset 0 0 0 1px rgba(143, 212, 184, 0.18);
    }

    .scripture-toggle__label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: var(--text-body);
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }
    .scripture-toggle__label::before {
      content: '📖';
      font-size: 15px;
    }
    .scripture-toggle__chevron {
      width: 18px;
      height: 18px;
      color: var(--text-secondary);
      transition: transform var(--duration-base) var(--ease-out);
      flex-shrink: 0;
    }
    .scripture-toggle.is-open .scripture-toggle__chevron {
      transform: rotate(180deg);
    }

    .scripture-toggle__body {
      /* absolute 오버레이: 열고 닫아도 주변 문서 흐름에 영향 주지 않음 */
      position: absolute;
      top: calc(100% + var(--space-2));
      left: 0;
      right: 0;
      max-height: 0;
      overflow: hidden;
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      transition: max-height var(--duration-slow) var(--ease-out),
                  box-shadow var(--duration-slow);
    }
    .scripture-toggle.is-open .scripture-toggle__body {
      max-height: 60vh;
      overflow-y: auto;
      scrollbar-gutter: stable;   /* 스크롤바 거터 항상 예약 → 콘텐츠 좌측 치우침 방지 */
      box-shadow: var(--shadow-soft);
    }
    .scripture-toggle__inner {
      padding: var(--space-3) 4px var(--space-4);
    }
    .scripture-toggle .verse-line {
      font-size: var(--text-scripture);
      line-height: 1.85;
      color: var(--text-body);
      padding: 10px 0;
    }
    .scripture-toggle .verse-line + .verse-line {
      border-top: 1px solid var(--border-subtle);
    }
    .scripture-toggle .verse-number {
      font-weight: 700;
      color: var(--accent-sage);
      margin-right: 6px;
      font-size: 14px;
    }

    /* ------------------------------------------------------------------
       묵상 카드 공통
       ------------------------------------------------------------------ */
    .meditation-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: var(--card-padding);
      margin-bottom: var(--card-gap);
    }
    .meditation-card__title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: var(--text-h2);
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      margin-bottom: var(--space-5);
    }
    .meditation-card__icon {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: var(--accent-sage-soft);
      font-size: 15px;
    }

    /* 핵심 요약 불릿 */
    .summary-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .summary-list li {
      position: relative;
      padding: 10px 0 10px 20px;
      font-size: var(--text-body);
      line-height: 1.7;
      color: var(--text-body);
    }
    .summary-list li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 20px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-sage);
    }
    .summary-list li + li {
      border-top: 1px solid var(--border-subtle);
    }

    /* 등장인물 */
    .character {
      padding: var(--space-4) 0;
    }
    .character + .character {
      border-top: 1px solid var(--border-subtle);
      margin-top: var(--space-2);
    }
    .character__name {
      display: inline-block;
      font-size: var(--text-h2);
      font-weight: 700;
      color: var(--accent-sage-text);
      margin-bottom: var(--space-2);
      padding: 3px 12px;
      background: var(--accent-sage-soft);
      border-radius: var(--radius-pill);
    }
    .character__desc {
      font-size: var(--text-body);
      line-height: 1.75;
      color: var(--text-body);
    }

    /* 책 맥락 / 구절 해설 본문 */
    .prose {
      font-size: var(--text-body);
      line-height: 1.85;
      color: var(--text-body);
      white-space: pre-wrap;
    }

    /* 말씀 탭 (오늘 범위 / 전체 장) */
    .scripture-tabs {
      display: flex;
      gap: 2px;
      padding: 3px;
      background: var(--bg-soft);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-4);
    }
    .scripture-tab {
      flex: 1;
      padding: 8px 12px;
      font-size: var(--text-small);
      font-weight: 600;
      color: var(--text-secondary);
      border-radius: calc(var(--radius-md) - 3px);
      background: transparent;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: all var(--duration-base);
    }
    .scripture-tab.is-active {
      background: var(--bg-card);
      color: var(--text-primary);
      box-shadow: 0 1px 3px rgba(45, 58, 50, 0.08);
    }

    /* 전체 장 모드에서 오늘 범위 구절 강조 */
    .scripture-toggle .verse-line.is-focus {
      position: relative;
    }
    .scripture-toggle .verse-line.is-focus::before {
      content: '';
      position: absolute;
      left: -12px;
      top: 10px;
      bottom: 10px;
      width: 3px;
      background: var(--accent-sage);
      border-radius: 2px;
    }

    /* 로딩/에러/빈 상태 */
    .loading,
    .error,
    .scripture-empty {
      padding: var(--space-8) var(--space-4);
      text-align: center;
      color: var(--text-secondary);
      font-size: var(--text-small);
      line-height: 1.7;
    }
    .error {
      color: #B84A4A;
    }
  </style>
</head>
<body>
  <div class="app-container">
   <main class="app-scroll">

    <!-- 상단바 (X · 진행 단계 2/4 · 가가) -->
    <header class="top-bar">
      <div class="top-bar__left">
        <button class="icon-btn" id="closeBtn" aria-label="닫기">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="progress-dots" aria-label="진행 단계 2/4">
        <div class="progress-dot active"></div>
        <div class="progress-dot active"></div>
        <div class="progress-dot"></div>
        <div class="progress-dot"></div>
      </div>
      <div class="top-bar__right">
        <button class="icon-btn icon-btn--font" id="fontSizeBtn" aria-label="폰트 크기">
          가가
        </button>
      </div>
    </header>

    <!-- 페이지 제목 -->
    <h1 class="page-title">말씀을 묵상해보세요</h1>

    <!-- 말씀 토글 (sticky) -->
    <div class="scripture-toggle" id="scriptureToggle" aria-expanded="false">
      <div class="scripture-toggle__header" id="scriptureToggleHeader" role="button" tabindex="0">
        <span class="scripture-toggle__label" id="scriptureLabel">말씀 다시 보기</span>
        <svg class="scripture-toggle__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
      <div class="scripture-toggle__body">
        <div class="scripture-toggle__inner">
          <div class="scripture-tabs" id="scriptureTabs" role="tablist">
            <button class="scripture-tab is-active" data-mode="focus" role="tab" aria-selected="true">오늘 범위</button>
            <button class="scripture-tab" data-mode="full" role="tab" aria-selected="false">전체 장</button>
          </div>
          <div id="versesContainer">
            <div class="loading">말씀을 불러오고 있어요...</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 책 맥락 카드 (큰 그림 먼저) -->
    <section class="meditation-card" id="bookContextCard" style="display:none;">
      <h2 class="meditation-card__title">
        <span class="meditation-card__icon">📚</span>
        <span><span id="bookContextTitle">책</span>의 흐름</span>
      </h2>
      <div class="prose" id="bookContext"></div>
    </section>

    <!-- 핵심 요약 카드 -->
    <section class="meditation-card" id="summaryCard">
      <h2 class="meditation-card__title">
        <span class="meditation-card__icon">✨</span>
        말씀 속 장면
      </h2>
      <ul class="summary-list" id="summaryList">
        <li class="loading" style="padding:0;">묵상을 준비하고 있어요...</li>
      </ul>
    </section>

    <!-- 등장인물 카드 -->
    <section class="meditation-card" id="charactersCard" style="display:none;">
      <h2 class="meditation-card__title">
        <span class="meditation-card__icon">👥</span>
        말씀 속 인물들
      </h2>
      <div id="charactersList"></div>
    </section>

    <!-- 구절 해설 카드 -->
    <section class="meditation-card" id="commentaryCard" style="display:none;">
      <h2 class="meditation-card__title">
        <span class="meditation-card__icon">💡</span>
        구절 깊이 들여다보기
      </h2>
      <div class="prose" id="verseCommentary"></div>
    </section>

   </main>

   <!-- 하단 네비 (app-container 내부) -->
   <nav class="bottom-nav">
     <button class="btn btn-secondary btn-icon-only" id="prevBtn" aria-label="이전">
       <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
         <polyline points="15 18 9 12 15 6"/>
       </svg>
     </button>
     <button class="btn btn-primary" id="nextBtn">다음</button>
   </nav>

  </div>

  <!-- Scripts -->
  <script src="scripts/storage.js"></script>
  <script src="scripts/common.js"></script>
  <script>
    const TODAY = sessionStorage.getItem('qtDate') || Common.todayISO();
    const HAS_EXPLICIT_DATE = !!sessionStorage.getItem('qtDate');

    async function loadWithFallback(kind) {
      // kind: 'qt' or 'ai'
      let data = await Common.loadJSON(`../data/${kind}/${TODAY}.json`);
      if (!data && !HAS_EXPLICIT_DATE) {
        for (let i = 1; i <= 3; i++) {
          const d = new Date(new Date().toLocaleDateString('sv-SE', { timeZone: 'Asia/Seoul' }));
          d.setDate(d.getDate() - i);
          const fallbackDate = d.toLocaleDateString('sv-SE');
          data = await Common.loadJSON(`../data/${kind}/${fallbackDate}.json`);
          if (data) break;
        }
      }
      return data;
    }

    let qtData = null;
    let scriptureMode = 'focus';  // 'focus' | 'full'

    document.addEventListener('DOMContentLoaded', async () => {
      await Promise.all([loadAI(), loadScripture()]);
      setupEventListeners();
      setupScriptureTabs();
      applyFontSize();
      Common.applyFontStyle();   // 저장된 폰트 스타일(세리프 등) 보장 적용
      Storage.setDailyRecord(TODAY, { progressStep: 2 });
    });

    // ========== AI 묵상 로드 ==========
    async function loadAI() {
      const ai = await loadWithFallback('ai');

      if (!ai) {
        document.getElementById('summaryList').innerHTML =
          '<li class="error" style="padding:0;">묵상을 불러올 수 없어요.</li>';
        return;
      }

      renderSummary(ai.core_summary);
      renderCharacters(ai.characters);
      renderBookContext(ai.book_context);
      renderCommentary(ai.verse_commentary);
    }

    function renderSummary(summary) {
      const list = document.getElementById('summaryList');
      if (!Array.isArray(summary) || summary.length === 0) {
        list.innerHTML = '<li class="text-secondary" style="padding:0;">요약이 준비되지 않았어요.</li>';
        return;
      }
      list.innerHTML = summary
        .map(line => `<li>${escapeHTML(line)}</li>`)
        .join('');
    }

    function renderCharacters(characters) {
      if (!Array.isArray(characters) || characters.length === 0) return;
      document.getElementById('charactersCard').style.display = '';
      document.getElementById('charactersList').innerHTML = characters
        .map(c => `
          <div class="character">
            <span class="character__name">${escapeHTML(c.name)}</span>
            <div class="character__desc">${escapeHTML(c.description)}</div>
          </div>
        `)
        .join('');
    }

    function renderBookContext(text) {
      if (!text) return;
      document.getElementById('bookContextCard').style.display = '';
      document.getElementById('bookContext').textContent = text;
    }

    function renderCommentary(text) {
      if (!text) return;
      document.getElementById('commentaryCard').style.display = '';
      document.getElementById('verseCommentary').textContent = text;
    }

    // ========== 말씀 로드 (토글용) ==========
    async function loadScripture() {
      const qt = await loadWithFallback('qt');

      const container = document.getElementById('versesContainer');
      const labelEl = document.getElementById('scriptureLabel');

      if (!qt) {
        container.innerHTML = '<div class="error">말씀을 불러올 수 없어요.</div>';
        return;
      }

      qtData = qt;
      labelEl.textContent = qt.scripture_ref || '말씀 다시 보기';

      // 책 맥락 카드 제목에 책 이름 주입 (예: "룻기의 흐름")
      const bookTitleEl = document.getElementById('bookContextTitle');
      if (bookTitleEl) {
        bookTitleEl.textContent = qt.book_name || '책';
      }

      renderScripture();
    }

    function renderScripture() {
      if (!qtData) return;
      const container = document.getElementById('versesContainer');

      if (scriptureMode === 'focus') {
        const verses = qtData.verses || [];
        container.innerHTML = verses.map(v => renderVerseLine(v, false)).join('');
        return;
      }

      // full chapter mode
      const full = qtData.full_chapter_verses || [];
      if (full.length === 0) {
        container.innerHTML = `
          <div class="scripture-empty">
            📦 전체 장 데이터가 아직 준비되지 않았어요.<br>
            <span style="opacity:0.7;">크롤러 재실행 후 자동으로 채워집니다.</span>
          </div>
        `;
        return;
      }
      const focusStart = qtData.verses_start;
      const focusEnd = qtData.verses_end;
      container.innerHTML = full.map(v => {
        const isFocus = v.number >= focusStart && v.number <= focusEnd;
        return renderVerseLine(v, isFocus);
      }).join('');
    }

    function renderVerseLine(v, isFocus) {
      const cls = isFocus ? 'verse-line is-focus' : 'verse-line';
      return `
        <div class="${cls}" data-verse="${v.number}">
          <span class="verse-number">${v.number}</span>${escapeHTML(v.text)}
        </div>
      `;
    }

    function setupScriptureTabs() {
      const tabs = document.querySelectorAll('.scripture-tab');
      tabs.forEach(tab => {
        tab.addEventListener('click', (e) => {
          e.stopPropagation();  // 토글 열림/닫힘 방지
          const mode = tab.dataset.mode;
          if (mode === scriptureMode) return;
          scriptureMode = mode;
          tabs.forEach(t => {
            const active = t.dataset.mode === mode;
            t.classList.toggle('is-active', active);
            t.setAttribute('aria-selected', String(active));
          });
          renderScripture();
        });
      });
    }

    // ========== 이벤트 ==========
    function setupEventListeners() {
      // 닫기 → 홈
      document.getElementById('closeBtn').addEventListener('click', () => {
        window.location.href = 'index.html';
      });

      // 이전 → 1단계
      document.getElementById('prevBtn').addEventListener('click', () => {
        window.location.href = 'step-1-scripture.html';
      });

      // 다음 → 3단계
      document.getElementById('nextBtn').addEventListener('click', () => {
        Storage.setDailyRecord(TODAY, { progressStep: 3 });
        window.location.href = 'step-3-prayer.html';
      });

      // 폰트 크기 토글
      document.getElementById('fontSizeBtn').addEventListener('click', toggleFontSize);

      // 말씀 토글 (클릭/엔터/스페이스)
      const toggle = document.getElementById('scriptureToggle');
      const header = document.getElementById('scriptureToggleHeader');
      const doToggle = () => {
        const isOpen = toggle.classList.toggle('is-open');
        toggle.setAttribute('aria-expanded', String(isOpen));
      };
      header.addEventListener('click', doToggle);
      header.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          doToggle();
        }
      });
    }

    // ========== 폰트 크기 ==========
    function toggleFontSize() {
      const sizes = ['sm', 'md', 'lg'];
      const settings = Storage.getSettings();
      const currentIdx = sizes.indexOf(settings.fontSize);
      const nextIdx = (currentIdx + 1) % sizes.length;
      Storage.setSetting('fontSize', sizes[nextIdx]);
      applyFontSize();
    }

    function applyFontSize() {
      const size = Storage.getSettings().fontSize;
      document.documentElement.setAttribute('data-font-size', size);
    }

    // ========== 유틸 ==========
    function escapeHTML(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
  </script>
</body>
</html>
