<!DOCTYPE html>
<html lang="ko" data-font-size="md">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1">
  <meta name="theme-color" content="#F0F4F2">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="주만나 AI">
  <meta name="format-detection" content="telephone=no">

  <title>기록 · 주만나</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
  <link rel="stylesheet" href="styles/design-tokens.css">
  <link rel="stylesheet" href="styles/common.css">

  <style>
    /* ========== 4단계 전용 ========== */

    /* 묵상 카드 공통 (step-2/3과 동일) */
    .meditation-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: var(--card-padding);
      margin-bottom: var(--card-gap);
    }
    .meditation-card__title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: var(--text-h2);
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      margin-bottom: var(--space-4);
    }
    .meditation-card__icon {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: var(--accent-sage-soft);
      font-size: 15px;
    }
    .meditation-card__hint {
      font-size: var(--text-small);
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: var(--space-4);
      word-break: keep-all;
    }

    /* ------------------------------------------------------------------
       감정 칩
       ------------------------------------------------------------------ */
    .chip-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .emotion-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 14px;
      border: 1.5px solid var(--border-chip);
      border-radius: var(--radius-pill);
      background: transparent;
      color: var(--text-body);
      font-size: var(--text-small);
      font-weight: 500;
      cursor: pointer;
      transition: all var(--duration-base);
      -webkit-tap-highlight-color: transparent;
      letter-spacing: -0.01em;
    }
    .emotion-chip__emoji {
      font-size: 15px;
      line-height: 1;
    }
    .emotion-chip:active {
      transform: scale(0.96);
    }
    /* 선택 상태 — 색상별 톤 */
    .emotion-chip[data-color="calm"].is-selected {
      background: #FDF2D9;
      border-color: var(--chip-calm);
      color: #8B6F2A;
    }
    .emotion-chip[data-color="insight"].is-selected {
      background: var(--accent-sage-soft);
      border-color: var(--chip-insight);
      color: var(--accent-sage-text);
    }
    .emotion-chip[data-color="reflect"].is-selected {
      background: #E9EEF5;
      border-color: var(--chip-reflect);
      color: #5C6B80;
    }

    /* ------------------------------------------------------------------
       메모 입력
       ------------------------------------------------------------------ */
    .memo-textarea {
      width: 100%;
      min-height: 120px;
      max-height: 320px;
      border: 1px solid var(--border-input);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      font-size: 16px;
      color: var(--text-body);
      background: var(--bg-input);
      resize: none;
      outline: none;
      line-height: 1.75;
      transition: border-color var(--duration-base);
      word-break: keep-all;
      overflow-wrap: break-word;
      font-family: inherit;
      box-sizing: border-box;
    }
    .memo-textarea:focus {
      border-color: var(--accent-sage);
    }
    .memo-textarea::placeholder {
      color: var(--text-placeholder);
    }

    /* ------------------------------------------------------------------
       감정 카드 안 "느낀 점" 입력
       ------------------------------------------------------------------ */
    .reflection-block {
      margin-top: var(--space-5);
      padding-top: var(--space-5);
      border-top: 1px solid var(--border-subtle);
    }
    .reflection-label {
      display: block;
      font-size: var(--text-small);
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-3);
      padding-left: 16px;   /* textarea 안쪽 padding과 동일 → 첫 글자 X좌표 일치 */
      letter-spacing: -0.01em;
      word-break: keep-all;
      line-height: 1.5;
    }

    /* ------------------------------------------------------------------
       오늘의 질문 (Q1 / Q2)
       ------------------------------------------------------------------ */
    .question-item {
      margin-bottom: var(--space-8);
    }
    .question-item:last-child {
      margin-bottom: 0;
    }
    .question-num {
      display: inline-block;
      padding: 4px 14px;
      border-radius: var(--radius-pill);
      background: var(--accent-sage-soft);
      color: var(--accent-sage-text);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-left: 8px;
      margin-bottom: var(--space-2);
    }
    .question-text {
      font-size: 15px;
      line-height: 1.6;
      color: var(--text-body);
      word-break: keep-all;
      padding-left: 8px;
      margin-bottom: var(--space-3);
    }
    .question-answer {
      min-height: 90px;
    }

    /* 페이지 공통 자동저장 인디케이터 (메모/느낀 점/질문 답변 통합) */
    .autosave-indicator {
      display: flex;
      justify-content: flex-end;
      margin-top: var(--space-2);
      font-size: var(--text-caption);
      color: var(--text-secondary);
      opacity: 0;
      transition: opacity var(--duration-slow);
      min-height: 18px;
    }
    .autosave-indicator.is-visible {
      opacity: 1;
    }

    /* 질문 로딩/없음 상태 */
    .questions-empty {
      font-size: var(--text-small);
      color: var(--text-secondary);
      text-align: center;
      padding: var(--space-6) 0;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="app-container">
   <main class="app-scroll">

    <!-- 상단바 (X · 진행 단계 4/4 · 가가) -->
    <header class="top-bar">
      <div class="top-bar__left">
        <button class="icon-btn" id="closeBtn" aria-label="닫기">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="progress-dots" aria-label="진행 단계 4/4">
        <div class="progress-dot active"></div>
        <div class="progress-dot active"></div>
        <div class="progress-dot active"></div>
        <div class="progress-dot active"></div>
      </div>
      <div class="top-bar__right">
        <button class="icon-btn icon-btn--font" id="fontSizeBtn" aria-label="폰트 크기">
          가가
        </button>
      </div>
    </header>

    <!-- 페이지 제목 -->
    <h1 class="page-title">오늘의 마음을 남겨보세요</h1>

    <!-- 감정 카드 (감정 칩 + 느낀 점) -->
    <section class="meditation-card">
      <h2 class="meditation-card__title">
        <span class="meditation-card__icon">🌿</span>
        오늘의 마음
      </h2>
      <p class="meditation-card__hint">
        말씀을 묵상하며 든 마음을 선택해주세요. (여러 개 선택 가능)
      </p>
      <div class="chip-grid" id="emotionChips"></div>

      <div class="reflection-block">
        <label class="reflection-label" for="reflectionInput">
          오늘의 말씀이 나에게 어떤 의미로 다가왔나요?
        </label>
        <textarea
          class="memo-textarea"
          id="reflectionInput"
          placeholder="떠오른 생각이나 느낀 점을 자유롭게 적어보세요"
        ></textarea>
      </div>
    </section>

    <!-- 오늘의 질문 카드 (주만나 크롤링: oryun_questions) -->
    <section class="meditation-card">
      <h2 class="meditation-card__title">
        <span class="meditation-card__icon">💭</span>
        오늘의 질문
      </h2>
      <div id="questionsContainer">
        <div class="questions-empty">질문을 불러오고 있어요...</div>
      </div>
      <div class="autosave-indicator" id="autosaveIndicator">✓ 저장됨</div>
    </section>

   </main>

   <!-- 하단 네비 (app-container 내부) -->
   <nav class="bottom-nav">
     <button class="btn btn-secondary btn-icon-only" id="prevBtn" aria-label="이전">
       <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
         <polyline points="15 18 9 12 15 6"/>
       </svg>
     </button>
     <button class="btn btn-primary" id="completeBtn">묵상 완료하기</button>
   </nav>

  </div>

  <!-- Scripts -->
  <script src="scripts/storage.js"></script>
  <script src="scripts/common.js"></script>
  <script src="scripts/supabase-sync.js"></script>
  <script>
    const TODAY = sessionStorage.getItem('qtDate') || Common.todayISO();

    // 감정 칩 정의 (3가지 색상 × 3개 = 9개)
    const EMOTIONS = [
      { id: 'gratitude', label: '감사',   emoji: '🙏', color: 'calm' },
      { id: 'peace',     label: '평안',   emoji: '🕊️', color: 'calm' },
      { id: 'joy',       label: '기쁨',   emoji: '😊', color: 'calm' },
      { id: 'insight',   label: '깨달음', emoji: '💡', color: 'insight' },
      { id: 'grace',     label: '은혜',   emoji: '✨', color: 'insight' },
      { id: 'hope',      label: '희망',   emoji: '🌱', color: 'insight' },
      { id: 'repent',    label: '회개',   emoji: '😔', color: 'reflect' },
      { id: 'sadness',   label: '슬픔',   emoji: '💧', color: 'reflect' },
      { id: 'fear',      label: '두려움', emoji: '😟', color: 'reflect' },
    ];

    document.addEventListener('DOMContentLoaded', () => {
      renderEmotionChips();
      hydrateSelectedEmotions();
      setupReflection();
      setupQuestions();
      setupEventListeners();
      applyFontSize();
      Common.applyFontStyle();   // 저장된 폰트 스타일(세리프 등) 보장 적용
      Storage.setDailyRecord(TODAY, { progressStep: 4 });
    });

    // 모든 textarea가 공유하는 자동저장 인디케이터
    let _saveIndicatorTimer;
    function flashSaveIndicator() {
      const el = document.getElementById('autosaveIndicator');
      if (!el) return;
      el.classList.add('is-visible');
      clearTimeout(_saveIndicatorTimer);
      _saveIndicatorTimer = setTimeout(() => {
        el.classList.remove('is-visible');
      }, 1500);
    }

    // textarea 자동 높이 조절 + debounced 저장
    function setupAutoSaveTextarea(textarea, opts) {
      const { onSave, maxHeight = 320 } = opts;
      autoResize();

      let saveTimer;
      textarea.addEventListener('input', () => {
        autoResize();
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => {
          onSave(textarea.value);
          flashSaveIndicator();
        }, 800);
      });

      function autoResize() {
        textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, maxHeight) + 'px';
      }
    }

    // ========== 감정 칩 ==========
    function renderEmotionChips() {
      const container = document.getElementById('emotionChips');
      container.innerHTML = EMOTIONS.map(e => `
        <button
          class="emotion-chip"
          type="button"
          data-id="${e.id}"
          data-color="${e.color}"
          aria-pressed="false"
        >
          <span class="emotion-chip__emoji">${e.emoji}</span>
          <span>${escapeHTML(e.label)}</span>
        </button>
      `).join('');

      container.querySelectorAll('.emotion-chip').forEach(btn => {
        btn.addEventListener('click', () => toggleEmotion(btn));
      });
    }

    function hydrateSelectedEmotions() {
      const record = Storage.getDailyRecord(TODAY);
      const selected = new Set(record.emotions || []);
      document.querySelectorAll('.emotion-chip').forEach(btn => {
        if (selected.has(btn.dataset.id)) {
          btn.classList.add('is-selected');
          btn.setAttribute('aria-pressed', 'true');
        }
      });
    }

    function toggleEmotion(btn) {
      const record = Storage.getDailyRecord(TODAY);
      const emotions = Array.isArray(record.emotions) ? [...record.emotions] : [];
      const id = btn.dataset.id;
      const idx = emotions.indexOf(id);
      if (idx >= 0) {
        emotions.splice(idx, 1);
        btn.classList.remove('is-selected');
        btn.setAttribute('aria-pressed', 'false');
      } else {
        emotions.push(id);
        btn.classList.add('is-selected');
        btn.setAttribute('aria-pressed', 'true');
      }
      Storage.setDailyRecord(TODAY, { emotions });
    }

    // ========== 느낀 점 (감정 카드 안 textarea) ==========
    function setupReflection() {
      const textarea = document.getElementById('reflectionInput');
      const record = Storage.getDailyRecord(TODAY);
      // 기존 사용자 데이터 호환: 새 reflection이 없으면 옛 memo 값을 한 번 로드
      textarea.value = record.reflection || record.memo || '';
      setupAutoSaveTextarea(textarea, {
        onSave: (val) => Storage.setDailyRecord(TODAY, { reflection: val }),
      });
    }

    // ========== 오늘의 질문 (주만나 크롤링) ==========
    async function setupQuestions() {
      const container = document.getElementById('questionsContainer');
      const data = await Common.loadJSON(`../data/qt/${TODAY}.json`);
      const questions = (data && Array.isArray(data.oryun_questions)) ? data.oryun_questions : [];

      if (questions.length === 0) {
        container.innerHTML = '<div class="questions-empty">오늘의 질문이 아직 준비되지 않았어요.</div>';
        return;
      }

      const record = Storage.getDailyRecord(TODAY);
      const savedAnswers = Array.isArray(record.questionAnswers) ? record.questionAnswers : [];

      container.innerHTML = questions.map((q, i) => `
        <div class="question-item">
          <span class="question-num">Q${i + 1}</span>
          <p class="question-text">${escapeHTML(q).replace(/\?\s+/g, '?<br>')}</p>
          <textarea
            class="memo-textarea question-answer"
            data-q-idx="${i}"
            placeholder="가볍게 답변을 적어보세요"
          >${escapeHTML(savedAnswers[i] || '')}</textarea>
        </div>
      `).join('');

      container.querySelectorAll('.question-answer').forEach(textarea => {
        const idx = Number(textarea.dataset.qIdx);
        setupAutoSaveTextarea(textarea, {
          maxHeight: 240,
          onSave: (val) => {
            const cur = Storage.getDailyRecord(TODAY);
            const arr = Array.isArray(cur.questionAnswers) ? [...cur.questionAnswers] : [];
            arr[idx] = val;
            Storage.setDailyRecord(TODAY, { questionAnswers: arr });
          },
        });
      });
    }

    // ========== 이벤트 ==========
    function setupEventListeners() {
      // 닫기 → 홈
      document.getElementById('closeBtn').addEventListener('click', () => {
        window.location.href = 'index.html';
      });

      // 이전 → 3단계
      document.getElementById('prevBtn').addEventListener('click', () => {
        window.location.href = 'step-3-prayer.html';
      });

      // 묵상 완료하기 → 5단계
      document.getElementById('completeBtn').addEventListener('click', async function () {
        if (this.dataset.saving) return;
        this.dataset.saving = '1';

        const record = Storage.getDailyRecord(TODAY);
        if (!record.completed) {
          Storage.setDailyRecord(TODAY, { completed: true });
          Storage.markCompleted();
        }
        Storage.setDailyRecord(TODAY, { progressStep: 5 });

        // 서버 동기화 (Supabase 설정된 경우에만)
        if (typeof SupabaseSync !== 'undefined' && SupabaseSync.isConfigured()) {
          try {
            const hash = await SupabaseSync.ensureUserHash();
            if (hash) {
              await SupabaseSync.syncRecord(hash, TODAY, Storage.getDailyRecord(TODAY));
            }
          } catch (e) {
            console.warn('서버 동기화 실패 (로컬 저장 완료):', e);
          }
        }

        window.location.href = 'step-5-done.html';
      });

      // 폰트 크기 토글
      document.getElementById('fontSizeBtn').addEventListener('click', toggleFontSize);
    }

    // ========== 폰트 크기 ==========
    function toggleFontSize() {
      const sizes = ['sm', 'md', 'lg'];
      const settings = Storage.getSettings();
      const currentIdx = sizes.indexOf(settings.fontSize);
      const nextIdx = (currentIdx + 1) % sizes.length;
      Storage.setSetting('fontSize', sizes[nextIdx]);
      applyFontSize();
    }

    function applyFontSize() {
      const size = Storage.getSettings().fontSize;
      document.documentElement.setAttribute('data-font-size', size);
    }

    // ========== 유틸 ==========
    function escapeHTML(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
  </script>
</body>
</html>
